            <!-- Saat balonu -->
            <div style="width:52px;height:52px;border-radius:12px;background:${saatnBg};color:${saatnCol};
                 display:flex;flex-direction:column;align-items:center;justify-content:center;
                 flex-shrink:0;line-height:1.2">
              <span style="font-size:18px;font-weight:800">${yokAlindi&&!kilitli?'✓':item.saat}</span>
              <span style="font-size:9px;font-weight:600;opacity:.85">${yokAlindi&&!kilitli?'Alındı':'Ders'}</span>
            </div>
            <!-- Bilgi -->
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                <span style="font-weight:700;font-size:13px;color:${saatCol}">${item.sinif.ad}</span>
                ${aktif&&!kilitli?`<span style="font-size:10px;background:var(--blue);color:#fff;padding:1px 6px;border-radius:8px">Şu an</span>`:''}
                ${kilitli?`<span style="font-size:10px;background:var(--red);color:#fff;padding:1px 6px;border-radius:8px">🔒 Kilitli</span>`:''}
              </div>
              <div style="font-size:12px;color:${saatCol};opacity:.85;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                <b>${item.saat}. Ders</b> · ${SAAT_LABELS[item.saat]||''}–${SAAT_BIT[item.saat]||''} · ${item.ders}
              </div>
              ${yokAlindi?`<div style="font-size:11px;color:var(--text2);margin-top:2px">
                <span style="color:var(--green)">&#9989; ${mv}</span>&nbsp;
                ${ab?`<span style="color:var(--red)">&#10060; ${ab}</span> `:''}
                ${lt?`<span style="color:var(--amber)">&#9200; ${lt}</span> `:''}
                <span style="color:#bbb">/ ${ogr.length} öğrenci</span>
              </div>`:`<div style="font-size:11px;color:var(--text2);margin-top:2px">Yoklama bekleniyor · ${ogr.length} öğrenci</div>`}
            </div>
            <!-- Ok veya kilit -->
            <i class="ti ti-${kilitli?'lock':'chevron-right'}"
               style="color:${saatCol};font-size:20px;flex-shrink:0;opacity:.6"></i>
          </div>`;
        }).join('')}
      </div>`}`;
}


function pgProgramim() {
  const u = APP.user;
  const benim = ogretmenSiniflari(u.id);
  const siniflar = APP.siniflar.filter(s=>benim.includes(s.id));
  const gun = bugunGun();
  const simdiki = simdikiSaat();
  const SAAT_LABELS = {1:'08:30-09:10',2:'09:20-10:00',3:'10:10-10:50',4:'11:00-11:40',5:'11:50-12:30',6:'13:20-14:00',7:'14:10-14:50',8:'15:00-15:40'};

  // Tüm sınıflardaki tüm dersleri topla: {gun: {saat: [{ders, sinifAdi}]}}
  const tumProgram = {};
  GUNLER.forEach(g => { tumProgram[g] = {}; });
  siniflar.forEach(s => {
    GUNLER.forEach(g => {
      SAATLER.forEach(saat => {
        const items = (APP.programlar[s.id]||{})[g]?.[saat];
        if (!items) return;
        const arr = Array.isArray(items)?items:(typeof items==='object'?[items]:[{ders:items,ogretmen:''}]);
        const adUpper = u.ad.toUpperCase().split(' ')[0];
        arr.forEach(it => {
          const benimMi = !it.ogretmen || (it.ogretmen||'').toUpperCase().includes(adUpper);
          if (!benimMi) return;
          if (!tumProgram[g][saat]) tumProgram[g][saat] = [];
          tumProgram[g][saat].push({ders: it.ders||'—', sinif: s.ad, _sinifId: s.id});
        });
      });
    });
  });

  // Dolu olan satırları bul (en az bir günde ders var)
  const doluSaatler = SAATLER.filter(saat => GUNLER.some(g => tumProgram[g][saat]));

  if (!doluSaatler.length) {
    return `<div class="page-header"><div class="page-title"><i class="ti ti-calendar"></i>Ders Programım</div></div>
    <div class="empty-state"><i class="ti ti-calendar-off"></i>Henüz ders programı girilmemiş.</div>`;
  }

  return `<div class="page-header">
    <div class="page-title"><i class="ti ti-calendar"></i>Ders Programım</div>
    ${simdiki ? `<span style="font-size:12px;color:var(--text2)">${simdiki}. saat · ${SAAT_LABELS[simdiki]||''}</span>` : ''}
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div class="tbl-wrap"><table class="prog-tbl">
      <tr>
        <th style="width:80px">Saat</th>
        ${GUNLER.map(g=>`<th style="${g===gun?'color:var(--blue);background:var(--blue-bg)':''}">${g}</th>`).join('')}
      </tr>
      ${doluSaatler.map(saat => {
        const aktifSatir = saat===simdiki && GUNLER.some(g=>tumProgram[g][saat]);
        return `<tr style="${aktifSatir?'background:var(--blue-bg)':''}">
          <td style="font-weight:700;color:${aktifSatir?'var(--blue)':'var(--text2)'};background:${aktifSatir?'var(--blue-bg)':'var(--bg2)'};text-align:center;white-space:nowrap;vertical-align:middle">
            <div style="font-size:13px">${saat}.</div>
            <div style="font-size:9px;color:#aaa;font-weight:400;margin-top:1px">${(SAAT_LABELS[saat]||'').replace('-','–')}</div>
            ${aktifSatir?`<div style="margin-top:3px"><span style="font-size:9px;background:var(--blue);color:#fff;padding:1px 5px;border-radius:8px">Şu an</span></div>`:''}
          </td>
          ${GUNLER.map(g => {
            const dersler = tumProgram[g][saat];
            const aktifHucre = saat===simdiki && g===gun;
            if (!dersler || !dersler.length) return `<td style="background:${aktifHucre?'var(--blue-bg)':'#fafaf7'}"></td>`;
            // Tıklanabilir: o günün sınıfını ve saati seç → yoklamaya git
            // Sadece bugünkü gün için yoklamaya gidilebilir
            const bugunMu = g === gun;
            const _sg6=sonGecenSaat(); const sinifId6=dersler[0]._sinifId;
            const yok6=bugunMu?bugunYoklamaSaat(sinifId6,saat,u.id):null;
            const eksik6=bugunMu&&_sg6&&saat<=_sg6&&saat!==(simdiki||0)&&!yok6;
            const tamam6=bugunMu&&!!yok6;
            const bg6=aktifHucre?'var(--blue-bg)':eksik6?'var(--red-bg)':tamam6?'var(--green-bg)':'';
            return `<td style="padding:5px 7px;vertical-align:top;background:${bg6};cursor:${bugunMu?'pointer':'default'}"
              ${bugunMu ? `onclick="APP.yokSinif=${dersler[0]._sinifId};APP.yokSaat=${saat};gp('yoklamaAl')"` : ''}>
              ${dersler.map(d=>`<div style="border-radius:6px;padding:4px 7px;margin-bottom:3px;border-left:3px solid ${aktifHucre?'var(--blue)':eksik6?'var(--red)':tamam6?'var(--green)':bugunMu?'var(--amber)':'#ccc'};background:${aktifHucre?'rgba(24,95,165,.08)':eksik6?'var(--red-bg)':tamam6?'var(--green-bg)':bugunMu?'var(--amber-bg)':'var(--bg2)'}">
                <div style="font-size:11px;font-weight:700;color:${aktifHucre?'var(--blue)':eksik6?'var(--red)':tamam6?'var(--green)':bugunMu?'var(--amber)':'var(--text2)'};line-height:1.3">${d.ders}</div>
                <div style="font-size:10px;color:${aktifHucre?'var(--blue)':eksik6?'var(--red)':tamam6?'var(--green)':bugunMu?'var(--amber)':'var(--text2)'};opacity:.7;margin-top:1px">${d.sinif}</div>
              </div>`).join('')}
              ${bugunMu?`<div style="font-size:9px;color:${eksik6?'var(--red)':aktifHucre?'var(--blue)':'var(--green)'};opacity:.8;text-align:right;margin-top:2px">${eksik6?'⚠ Alınmadı':tamam6?'✓ Alındı':'<i class="ti ti-clipboard-check" style="font-size:10px"></i>'}</div>`:''}
            </td>`;
          }).join('')}
        </tr>`;
      }).join('')}
    </table></div>
  </div>`;
}



function statSatirHtml(st) {
  const pct = st.toplam ? Math.round(st.P/st.toplam*100) : 0;
  return `<td style="text-align:center;color:var(--green);font-weight:700">${st.P}</td>
    <td style="text-align:center;color:var(--red);font-weight:700">${st.A}</td>
    <td style="text-align:center;color:var(--amber);font-weight:700">${st.L}</td>
    <td style="text-align:center"><span style="font-weight:700;color:${pct>=80?'var(--green)':pct>=60?'var(--amber)':'var(--red)'}">%${pct}</span></td>`;
}

function pgMudurIstatistik() {
  if (!APP._miFilter) APP._miFilter = {sinifId: '', ogretmenId: ''};
  const fSinif    = APP._miFilter.sinifId    ? parseInt(APP._miFilter.sinifId)    : null;
  const fOgretmen = APP._miFilter.ogretmenId ? parseInt(APP._miFilter.ogretmenId) : null;

  let ykler = Object.values(APP.yoklamalar);
  if (fSinif)    ykler = ykler.filter(y => y.sinif_id    === fSinif);
  if (fOgretmen) ykler = ykler.filter(y => y.ogretmen_id === fOgretmen);

  // İstatistikleri topla
  const sinifStat   = {};
  const ogrStat     = {};
  const ogretStat   = {};

  ykler.forEach(y => {
    const detay   = APP.yoklamaDetay[y.id] || {};
    const sinif   = APP.siniflar.find(s => s.id === y.sinif_id);
    const ogretmen= APP.kullanicilar.find(u => u.id === y.ogretmen_id);

    if (!sinifStat[y.sinif_id])
      sinifStat[y.sinif_id] = {ad: sinif?.ad||'?', P:0, A:0, L:0, toplam:0, yokSayisi:0};
    sinifStat[y.sinif_id].yokSayisi++;

    if (ogretmen && !ogretStat[y.ogretmen_id])
      ogretStat[y.ogretmen_id] = {ad: ogretmen.ad, P:0, A:0, L:0, toplam:0};

    Object.entries(detay).forEach(([ogrId, durum]) => {
      const ogr = APP.ogrenciler.find(o => o.id == ogrId);

      sinifStat[y.sinif_id].toplam++;
      if (durum==='P') sinifStat[y.sinif_id].P++;
      else if (durum==='A') sinifStat[y.sinif_id].A++;
      else if (durum==='L') sinifStat[y.sinif_id].L++;

      if (ogretmen && ogretStat[y.ogretmen_id]) {
        ogretStat[y.ogretmen_id].toplam++;
        if (durum==='P') ogretStat[y.ogretmen_id].P++;
        else if (durum==='A') ogretStat[y.ogretmen_id].A++;
        else if (durum==='L') ogretStat[y.ogretmen_id].L++;
      }

      if (!ogrStat[ogrId])
        ogrStat[ogrId] = {ad:ogr?.ad||'?', no:ogr?.no||'', sinifAd:sinif?.ad||'?', P:0, A:0, L:0, toplam:0};
      ogrStat[ogrId].toplam++;
      if (durum==='P') ogrStat[ogrId].P++;
      else if (durum==='A') ogrStat[ogrId].A++;
      else if (durum==='L') ogrStat[ogrId].L++;
    });
  });

  function pct(st) { return st.toplam ? Math.round(st.P/st.toplam*100) : 0; }
  function pctColor(p) { return p>=80?'var(--green)':p>=60?'var(--amber)':'var(--red)'; }
  function satir(st) {
    const p = pct(st);
    return '<td style="text-align:center;color:var(--green);font-weight:700">'+st.P+'</td>'
      + '<td style="text-align:center;color:var(--red);font-weight:700">'+st.A+'</td>'
      + '<td style="text-align:center;color:var(--amber);font-weight:700">'+st.L+'</td>'
      + '<td style="text-align:center"><span style="font-weight:700;color:'+pctColor(p)+'">%'+p+'</span></td>';
  }

  const sinifList  = Object.values(sinifStat).sort((a,b)=>a.ad.localeCompare(b.ad));
  const ogretList  = Object.values(ogretStat).sort((a,b)=>b.A-a.A);
  const ogrList    = Object.values(ogrStat).sort((a,b)=>b.A-a.A||b.L-a.L);

  // Filtre HTML
  const sinifOptions = '<option value="">Tüm Sınıflar</option>'
    + APP.siniflar.map(s=>'<option value="'+s.id+'"'+(fSinif===s.id?' selected':'')+'>'+s.ad+'</option>').join('');
  const ogretOptions = '<option value="">Tüm Öğretmenler</option>'
    + APP.kullanicilar.filter(u=>u.rol==='ogretmen')
        .map(u=>'<option value="'+u.id+'"'+(fOgretmen===u.id?' selected':'')+'>'+u.ad+'</option>').join('');

  // Sınıf tablosu
  const sinifRows = sinifList.map(st =>
    '<tr><td style="font-weight:700">'+st.ad+'</td><td style="text-align:center;color:var(--text2)">'+st.yokSayisi+'</td>'+satir(st)+'</tr>'
  ).join('');

  // Öğretmen tablosu
  const ogretRows = ogretList.length
    ? ogretList.map(st=>'<tr><td style="font-weight:600">'+st.ad+'</td>'+satir(st)+'</tr>').join('')
    : '<tr><td colspan="5" style="text-align:center;color:var(--text2);padding:16px">Kayıt yok</td></tr>';

  // Öğrenci tablosu
  const ogrRows = ogrList.map(o => {
    const p = pct(o); const s = o.A>=3||o.L>=5;
    return '<tr style="background:'+(s?'var(--red-bg)':'')+'"><td>'
      +'<div style="font-weight:600;color:'+(s?'var(--red)':'var(--text)')+'">'+o.ad+'</div>'
      +'<div style="font-size:11px;color:var(--text2)">No: '+o.no+'</div></td>'
      +'<td><span class="badge b-gray" style="font-size:10px">'+o.sinifAd+'</span></td>'
      +'<td style="text-align:center;color:var(--green);font-weight:700">'+o.P+'</td>'
      +'<td style="text-align:center;color:var(--red);font-weight:700">'+o.A+'</td>'
      +'<td style="text-align:center;color:var(--amber);font-weight:700">'+o.L+'</td>'
      +'<td style="text-align:center"><span style="font-weight:700;color:'+pctColor(p)+'">%'+p+'</span></td></tr>';
  }).join('');

  return `<div class="page-header">
    <div class="page-title"><i class="ti ti-chart-bar"></i>İstatistikler</div>
    <span style="font-size:12px;color:var(--text2)">${ykler.length} yoklama kaydı</span>
  </div>
  <div class="card" style="margin-bottom:14px;padding:12px 16px">
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
      <div class="form-group" style="margin:0;flex:1;min-width:140px">
        <label class="form-label">Sınıf</label>
        <select onchange="APP._miFilter.sinifId=this.value;refreshMain()"
          style="width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px">
          ${sinifOptions}
        </select>
      </div>
      <div class="form-group" style="margin:0;flex:1;min-width:140px">
        <label class="form-label">Öğretmen</label>
        <select onchange="APP._miFilter.ogretmenId=this.value;refreshMain()"
          style="width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px">
          ${ogretOptions}
        </select>
      </div>
      <button class="btn btn-sm" onclick="APP._miFilter={sinifId:'',ogretmenId:''};refreshMain()">
        <i class="ti ti-x"></i>Temizle
      </button>
    </div>
  </div>
  <div class="card" style="margin-bottom:14px">
    <div class="card-title"><i class="ti ti-door"></i>Sınıf Bazlı Devam</div>
    <div class="tbl-wrap"><table>
      <tr><th>Sınıf</th><th style="text-align:center">Yoklama</th>
        <th style="text-align:center;color:var(--green)">✅</th>
        <th style="text-align:center;color:var(--red)">❌</th>
        <th style="text-align:center;color:var(--amber)">⏰</th>
        <th style="text-align:center">% Devam</th></tr>
      ${sinifRows}
    </table></div>
  </div>
  <div class="card" style="margin-bottom:14px">
    <div class="card-title"><i class="ti ti-chalkboard"></i>Öğretmen Bazlı Yoklama</div>
    <div class="tbl-wrap"><table>
      <tr><th>Öğretmen</th>
        <th style="text-align:center;color:var(--green)">✅</th>
        <th style="text-align:center;color:var(--red)">❌</th>
        <th style="text-align:center;color:var(--amber)">⏰</th>
        <th style="text-align:center">% Devam</th></tr>
      ${ogretRows}
    </table></div>
  </div>
  <div class="card">
    <div class="card-title"><i class="ti ti-users"></i>Öğrenci Bazlı Devam
      <span style="font-size:12px;font-weight:400;color:var(--text2);margin-left:8px">Devamsız sayısına göre sıralı</span>
    </div>
    ${ogrList.length === 0
      ? '<div class="empty-state" style="padding:20px"><i class="ti ti-mood-happy"></i>Kayıt yok</div>'
      : '<div class="tbl-wrap"><table><tr><th>Öğrenci</th><th>Sınıf</th>'
        + '<th style="text-align:center;color:var(--green)">✅</th>'
        + '<th style="text-align:center;color:var(--red)">❌</th>'
        + '<th style="text-align:center;color:var(--amber)">⏰</th>'
        + '<th style="text-align:center">% Devam</th></tr>'
        + ogrRows + '</table></div>'}
  </div>`;
}


function pgIstatistik() {
  const u = APP.user;
  const benim = ogretmenSiniflari(u.id);
  const ykler = Object.values(APP.yoklamalar)
    .filter(y => benim.includes(y.sinif_id));

  if (!ykler.length) {
    return `<div class="page-header"><div class="page-title"><i class="ti ti-chart-bar"></i>İstatistikler</div></div>
    <div class="empty-state"><i class="ti ti-clipboard-x"></i>Henüz yoklama kaydı yok.</div>`;
  }

  const ogrStat = {};
  const dersStat = {};

  ykler.forEach(y => {
    const detay = APP.yoklamaDetay[y.id] || {};
    const sinif = APP.siniflar.find(s => s.id === y.sinif_id);
    let dersAd = '—';
    if (y.saat) {
      const d = new Date(y.tarih + 'T00:00:00');
      const gun = GUNLER[d.getDay()-1];
      if (gun) {
        const prog = (APP.programlar[y.sinif_id]||{})[gun]||{};
        const items = prog[y.saat];
        if (items) {
          const arr = Array.isArray(items)?items:(typeof items==='object'?[items]:[{ders:items,ogretmen:''}]);
          const adUpper = u.ad.toUpperCase().split(' ')[0];
          const eslesen = arr.find(it=>!it.ogretmen||(it.ogretmen||'').toUpperCase().includes(adUpper));
          if (eslesen) dersAd = eslesen.ders||'—';
        }
      }
    }
    if (!dersStat[dersAd]) dersStat[dersAd] = {P:0,A:0,L:0,toplam:0};
    Object.entries(detay).forEach(([ogrId, durum]) => {
      const ogr = APP.ogrenciler.find(o=>o.id==ogrId);
      dersStat[dersAd].toplam++;
      if (durum==='P') dersStat[dersAd].P++;
      else if (durum==='A') dersStat[dersAd].A++;
      else if (durum==='L') dersStat[dersAd].L++;
      if (!ogrStat[ogrId]) ogrStat[ogrId] = {ad:ogr?.ad||'?',no:ogr?.no||'',sinifAd:sinif?.ad||'?',P:0,A:0,L:0,toplam:0};
      ogrStat[ogrId].toplam++;
      if (durum==='P') ogrStat[ogrId].P++;
      else if (durum==='A') ogrStat[ogrId].A++;
      else if (durum==='L') ogrStat[ogrId].L++;
    });
  });

  const ogrList  = Object.values(ogrStat).sort((a,b)=>b.A-a.A||b.L-a.L);
  const dersList = Object.entries(dersStat).sort((a,b)=>b[1].A-a[1].A);

  return `<div class="page-header">
    <div class="page-title"><i class="ti ti-chart-bar"></i>İstatistikler</div>
    <span style="font-size:12px;color:var(--text2)">${ykler.length} ders kaydı</span>
  </div>
  <div class="card" style="margin-bottom:14px">
    <div class="card-title"><i class="ti ti-book"></i>Ders Bazlı Devam</div>
    <div class="tbl-wrap"><table>
      <tr><th>Ders</th><th style="text-align:center;color:var(--green)">✅</th><th style="text-align:center;color:var(--red)">❌</th><th style="text-align:center;color:var(--amber)">⏰</th><th style="text-align:center">% Devam</th></tr>
      ${dersList.map(([ders,st])=>{const pct=st.toplam?Math.round(st.P/st.toplam*100):0;return`<tr>
        <td style="font-weight:600;font-size:12px">${ders}</td>
        <td style="text-align:center;color:var(--green);font-weight:700">${st.P}</td>
        <td style="text-align:center;color:var(--red);font-weight:700">${st.A}</td>
        <td style="text-align:center;color:var(--amber);font-weight:700">${st.L}</td>
        <td style="text-align:center"><span style="font-weight:700;color:${pct>=80?'var(--green)':pct>=60?'var(--amber)':'var(--red)'}">%${pct}</span></td>
      </tr>`;}).join('')}

function bugunGun() {

const SAAT_ARALIK = [
  {s:1, bas:'08:30', bit:'09:10'},
  {s:2, bas:'09:20', bit:'10:00'},
  {s:3, bas:'10:10', bit:'10:50'},
  {s:4, bas:'11:00', bit:'11:40'},
  {s:5, bas:'11:50', bit:'12:30'},
  {s:6, bas:'13:20', bit:'14:00'},
  {s:7, bas:'14:10', bit:'14:50'},
  {s:8, bas:'15:00', bit:'15:40'},
];
function simdikiSaat() {
  const now = new Date();
  const hm = now.getHours() * 60 + now.getMinutes();
  const toMin = t => { const [h,m] = t.split(':').map(Number); return h*60+m; };
  const bugunAdi = bugunGun();
  const bugunAralik = (APP._saatAralikGunluk && APP._saatAralikGunluk[bugunAdi])
    ? APP._saatAralikGunluk[bugunAdi].filter(x => !x.pasif)
    : SAAT_ARALIK;
  for (const {s, bas, bit} of bugunAralik) {
    if (hm >= toMin(bas) && hm <= toMin(bit)) return s;
  }
  return null;
}

// Şu ana kadar başlamış olan en son ders saatini döndürür
function sonGecenSaat() {
  const now = new Date();
  const hm = now.getHours() * 60 + now.getMinutes();
  const toMin = t => { const [h,m] = t.split(':').map(Number); return h*60+m; };
  const bugunAdi = bugunGun();
  const bugunAralik = (APP._saatAralikGunluk && APP._saatAralikGunluk[bugunAdi])
    ? APP._saatAralikGunluk[bugunAdi].filter(x => !x.pasif)
    : SAAT_ARALIK;
  let son = null;
  for (const {s, bas} of bugunAralik) {
    if (hm >= toMin(bas)) son = s;
  }
  return son;
}

// Öğretmenin bu sınıfta bu günkü derslerini getir [{saat, ders, ogretmen}]
function ogretmenSinifDersleri(ogretmenAd, sinifId, gun) {
  const prog = (APP.programlar[sinifId]||{})[gun]||{};
  const sonuc = [];
  SAATLER.forEach(saat => {
    const items = prog[saat];
    if (!items) return;
    const arr = Array.isArray(items) ? items : (typeof items==='object' ? [items] : [{ders:items,ogretmen:''}]);

    // Bu saatte bu öğretmene ait dersi bul (ilk eşleşen)
    let eslesen = null;
    for (const it of arr) {
      if (!ogretmenAd || !it.ogretmen) {
        // Program öğretmensiz girilmişse hepsini göster (ilk)
        eslesen = it; break;
      }
      const ogrUpper = (it.ogretmen||'').toUpperCase();
      const adUpper  = ogretmenAd.toUpperCase().split(' ')[0];
      if (ogrUpper.includes(adUpper) || adUpper.includes(ogrUpper.split(' ')[0])) {
        eslesen = it; break;
      }
    }
    // Saat başına tek kayıt — öğretmenin dersi varsa ekle
    if (eslesen) {
      sonuc.push({saat, ders: eslesen.ders||'—', ogretmen: eslesen.ogretmen||''});
    }
  });
  return sonuc;
}

// ═══════════════════════════════════════════════
//  DATABASE ACTIONS
// ═══════════════════════════════════════════════
window.setAtt = function(ogrId, durum, sinifId, saat) {
  sinifId = sinifId || APP.yokSinif;
  saat    = saat    || APP.yokSaat;
  const k = sinifId + '_' + saat;
  if (!APP.yokDataMap[k]) APP.yokDataMap[k] = {};
  // 2. kez aynı butona tıklanırsa → Mevcut'a döner
  APP.yokDataMap[k][ogrId] = APP.yokDataMap[k][ogrId] === durum ? 'P' : durum;
  refreshMain();
};

window.tumunuAyarla = function(durum, sinifId, saat) {
  sinifId = sinifId || APP.yokSinif;
  saat    = saat    || APP.yokSaat;
  const k = sinifId + '_' + saat;
  const ogr = sinifOgr(sinifId);
  if (!APP.yokDataMap[k]) APP.yokDataMap[k] = {};
  ogr.forEach(o => { APP.yokDataMap[k][o.id] = durum; });
  refreshMain();
};

window.oncekiGibi = function(sinifId, saat) {
  sinifId = sinifId || APP.yokSinif;
  saat    = saat    || APP.yokSaat;
  const k = sinifId + '_' + saat;
  // Bir önceki DERS: bugün aynı sınıfta saat-1, yoksa bugünün en son önceki saati
  const bugunYoklar = Object.values(APP.yoklamalar)
    .filter(y => y.sinif_id == sinifId && y.tarih === bugunTarih() && y.saat < saat)
    .sort((a,b) => b.saat - a.saat);
  const oncekiYok = bugunYoklar[0] || Object.values(APP.yoklamalar)
    .filter(y => y.sinif_id == sinifId && y.tarih !== bugunTarih())
    .sort((a,b) => b.tarih.localeCompare(a.tarih) || b.saat - a.saat)[0];
  if (!oncekiYok) return showToast('Önceki ders yoklaması bulunamadı', 'warn');
  const detay = APP.yoklamaDetay[oncekiYok.id]||{};
  if (!APP.yokDataMap[k]) APP.yokDataMap[k] = {};
  const ogr = sinifOgr(sinifId);
  ogr.forEach(o => { APP.yokDataMap[k][o.id] = detay[o.id]||'P'; });
  const etiket = oncekiYok.tarih === bugunTarih()
    ? `${oncekiYok.saat}. ders`
    : tarihTam(oncekiYok.tarih);

window.kaydetYoklama = async function(sinifId, saat) {
  sinifId = sinifId || APP.yokSinif;
  saat    = saat    || APP.yokSaat;
  const k = sinifId + '_' + saat;
  const ogr = sinifOgr(sinifId);
  if (!ogr.length) return;

  // Kilitli mi kontrol et (öğretmen + saat bazlı)
  const mevcutYok = bugunYoklamaSaat(sinifId, saat, APP.user.id);
  if (mevcutYok && mevcutYok.kilitli) {
    return showToast('Bu yoklama kilitlenmiş, değişiklik yapamazsınız.', 'error');
  }

  try {
    const {data:yk, error:ykErr} = await sb.from('yoklamalar').upsert({
      sinif_id: sinifId,
      ogretmen_id: APP.user.id,
      tarih: bugunTarih(),
      saat: saat,
    }, {onConflict:'sinif_id,tarih,saat,ogretmen_id',ignoreDuplicates:false}).select().single();
    if (ykErr) throw ykErr;

    const sinifYokData = APP.yokDataMap[k] || {};
    const detaylar = ogr.map(o=>({
      yoklama_id: yk.id,
      ogrenci_id: o.id,
      durum: sinifYokData[o.id]||'P',
    }));
    const {error:detErr} = await sb.from('yoklama_detay').upsert(detaylar, {onConflict:'yoklama_id,ogrenci_id'});
    if (detErr) throw detErr;

    // Sadece bu saat+sınıf'ın key'ini temizle
    delete APP.yokDataMap[k];
    showToast(mevcutYok ? 'Yoklama güncellendi!' : 'Yoklama kaydedildi!');
    await loadAll();
    // Detay ekranından çıkıp listeye dön
    APP.yokSaat = null;
    APP.yokSinif = sinifId;
    render();
  } catch(e) {
    showToast('Hata: ' + e.message, 'error');
  }
};

// ═══════════════════════════════════════════════
//  EXCEL YÜKLEME — Çok sınıflı E-Okul formatı
//  Tek sheet içinde alt alta gelen tüm sınıfları
//  parse eder; kayıttan önce sınıf adı düzenleme
//  ve tümünü temizleme imkânı sunar.
// ═══════════════════════════════════════════════

// Tüm önizleme verisini global tut (modal kapanınca da erişilebilsin)
window._excelOnizleme = null;

window.yukleExcelOgrenci = async function() {
  const file = $('excelFile') && $('excelFile').files[0];
  if (!file) return showToast('Lütfen bir Excel dosyası seçin', 'warn');

  try {
    showToast('Excel dosyası okunuyor...', 'info');
    const arrayBuffer = await file.arrayBuffer();
    const workbook = XLSX.read(arrayBuffer, {type:'array', cellFormula:false, cellStyles:false});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];

    // Sheet'i düz dizi dizisine çevir
    // Satır/sütun sayısını XLSX'in kendi ref bilgisinden al → sınır yok
    const sheetRange = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
    const maxRow = sheetRange.e.r + 1;           // son dolu satır (0-tabanlı → +1)
    const maxCol = Math.min(sheetRange.e.c + 2, 20); // biraz pay bırak, max 20 sütun

    const raw = [];
    let ardinardanBos = 0;
    for (let r = 0; r < maxRow; r++) {
      const row = [];
      let hasVal = false;
      for (let c = 0; c < maxCol; c++) {
        const cell = sheet[XLSX.utils.encode_col(c) + (r + 1)];
        let v = cell ? cell.v : '';
        if (v === null || v === undefined) v = '';
        row.push(v);
        if (v !== '') hasVal = true;
      }
      if (hasVal) {
        raw.push({r, row});
        ardinardanBos = 0;
      } else {
        ardinardanBos++;
        // 15 üst üste tamamen boş satır ve zaten veri varsa dur
        if (ardinardanBos >= 15 && raw.length > 10) break;
      }
    }

    // ── Sınıf bloklarını bul ──────────────────────────────────────────────
    // Farklı okul formatlarını destekler:
    //  • "9. Sınıf / A Şubesi (PROGRAM ADI)"    → E-Okul standart
    //  • "9. Sınıf / A Şubesi"                  → parantez yok
    //  • "9/A Şubesi"                            → kısa format
    //  • "9-A"                                   → tire format
    // Blok başlangıcı: herhangi bir sütunda "Sınıf Listesi" geçen satır
    
    // Sınıf adı çıkarma: başlıktan olabildiğince tam adı al
    function sinifAdiCikar(text) {
      text = text.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
      // Tam E-Okul: "9. Sınıf / A Şubesi (PROGRAM)"
      let m = text.match(/(\d+)\.[\s]*Sınıf[\s]*\/[\s]*([A-ZÇĞİÖŞÜa-zçğışöüü])[\s]*Şubesi[\s]*(\([^)]+\))?/i);
      if (m) return `${m[1]}. Sınıf / ${m[2].toUpperCase()} Şubesi${m[3] ? ' ' + m[3] : ''}`.trim();
      // Kısa: "9/A" veya "9-A"
      m = text.match(/(\d+)[\s]*[\/\-][\s]*([A-ZÇĞİÖŞÜ])/);
      if (m) return `${m[1]}/${m[2]}`;
      return null;
    }

    // Sütun konumlarını header satırından bul
    function parseCols(headerRow) {
      let colNo=-1, colAd=-1, colSoyad=-1;
      for (let c = 0; c < headerRow.length; c++) {
        const h = String(headerRow[c]||'').toLowerCase().trim().replace(/\s+/g,' ');
        if (!h) continue;
        if (h.includes('öğrenci no') || h === 'no' || h === 's.no' || h === 'numara') colNo = c;
        if ((h === 'adı' || h === 'ad') && !h.includes('soyadı')) colAd = c;
        else if (h.includes('adı') && !h.includes('soyadı') && colAd === -1) colAd = c;
        if (h === 'soyadı' || h === 'soyad' || h.includes('soyadı')) colSoyad = c;
      }
      return {
        colNo:    colNo    >= 0 ? colNo    : 1,
        colAd:    colAd    >= 0 ? colAd    : 2,
        colSoyad: colSoyad >= 0 ? colSoyad : 3
      };
    }

    // Satırın "blok başlangıcı" olup olmadığını kontrol et
    function isSinifBasligi(row) {
      const full = row.map(v => String(v||'')).join(' ').replace(/\n/g,' ');
      return full.includes('Sınıf Listesi') ||
             (full.includes('Şubesi') && full.match(/\d+\.?\s*Sınıf/i));
    }

    const sinifBloklar = []; // [{sinifAdi, ogrenciler:[{no,ad}]}]

    let i = 0;
    while (i < raw.length) {
      const {row} = raw[i];

      if (isSinifBasligi(row)) {
        // Sınıf adını çıkar (tüm sütunları birleştirerek dene)
        const fullText = row.map(v => String(v||'')).join(' ');
        const sinifAdi = sinifAdiCikar(fullText);

        if (!sinifAdi) { i++; continue; }

        // Sonraki satırlarda header satırını bul (max 8 satır ilerle)
        let headerIdx = -1, cols = null;
        for (let j = i+1; j < Math.min(i+8, raw.length); j++) {
          const hrow = raw[j].row;
          const htext = hrow.map(v=>String(v||'').toLowerCase()).join('|');
          if (htext.includes('öğrenci no') || htext.includes('s.no') ||
              htext.includes('numara') || (htext.includes('adı') && htext.includes('soyadı'))) {
            headerIdx = j;
            cols = parseCols(hrow);
            break;
          }
        }
        if (headerIdx === -1) { i++; continue; }

        // Header'dan sonraki satırları oku
        const ogrenciler = [];
        for (let k = headerIdx+1; k < raw.length; k++) {
          const drow = raw[k].row;

          // Yeni blok başlıyorsa veya özet satırı geliyorsa dur
          if (isSinifBasligi(drow)) break;
          const col0str = String(drow[0]||'');
          if (col0str.includes('Öğrenci Sayısı') || col0str.includes('Toplam')) break;

          const no = drow[cols.colNo];
          const ad = String(drow[cols.colAd]||'').trim();
          const soyad = String(drow[cols.colSoyad]||'').trim();
          const noNum = parseInt(no);
          if (!noNum || isNaN(noNum) || !ad || !soyad) continue;

          ogrenciler.push({no: noNum, ad: ad + ' ' + soyad});
        }

        if (ogrenciler.length > 0) sinifBloklar.push({sinifAdi, ogrenciler});
      }
      i++;
    }

    if (sinifBloklar.length === 0) {
      return showToast('Hiç sınıf bloğu bulunamadı. E-Okul formatında mı?', 'error');
    }

    // ── Önizleme modalını göster ──────────────────────────────────────────
    window._excelOnizleme = sinifBloklar.map((b, idx) => ({
      idx,
      sinifAdi: b.sinifAdi,
      ogrenciler: b.ogrenciler,
      secili: true
    }));
    excelOnizlemeGoster();

  } catch(e) {
    console.error(e);
    showToast('Excel okuma hatası: ' + e.message, 'error');
  }
};

function excelOnizlemeGoster() {
  const bloklar = window._excelOnizleme;
  if (!bloklar) return;

  const toplamOgr = bloklar.reduce((s,b) => s + b.ogrenciler.length, 0);

  const satirlar = bloklar.map((b, i) => `
    <tr>
      <td style="text-align:center">
        <input type="checkbox" id="exc-cb-${i}" ${b.secili?'checked':''} onchange="window._excelOnizleme[${i}].secili=this.checked;excelOnizlemeSayiGuncelle()">
      </td>
      <td>
        <input id="exc-ad-${i}" value="${b.sinifAdi.replace(/"/g,'&quot;')}" style="font-size:12px;padding:5px 8px;width:100%"
          oninput="window._excelOnizleme[${i}].sinifAdi=this.value">
      </td>
      <td style="text-align:center;font-weight:700;color:var(--blue)">${b.ogrenciler.length}</td>
    </tr>
  `).join('');

  document.getElementById('app').insertAdjacentHTML('beforeend', `
    <div class="modal-bg" id="excel-onizleme-modal" onclick="if(event.target===this)excelOnizlemeKapat()">
      <div class="modal" style="max-width:600px" onclick="event.stopPropagation()">
        <div class="modal-title">
          <span><i class="ti ti-table-import" style="color:var(--blue)"></i> Excel Önizleme</span>
          <button class="btn btn-sm" onclick="excelOnizlemeKapat()"><i class="ti ti-x"></i></button>
        </div>

        <div class="notif n-info" style="margin-bottom:12px">
          <i class="ti ti-info-circle"></i>
          <div>Toplam <b>${bloklar.length}</b> sınıf, <b>${toplamOgr}</b> öğrenci bulundu.
          Sınıf adlarını düzenleyebilir, istemediğiniz sınıfların kutucuğunu kaldırabilirsiniz.</div>
        </div>

        <div style="display:flex;gap:8px;margin-bottom:10px">
          <button class="btn btn-sm" onclick="excelHepsiniSec(true)"><i class="ti ti-check-all"></i> Tümünü Seç</button>
          <button class="btn btn-sm btn-danger" onclick="excelHepsiniSec(false)"><i class="ti ti-x"></i> Tümünü Kaldır</button>
        </div>

        <div class="tbl-wrap" style="margin-bottom:14px;max-height:360px;overflow-y:auto">
          <table>
            <thead>
              <tr>
                <th style="width:40px">Yükle</th>
                <th>Sınıf Adı (düzenlenebilir)</th>
                <th style="width:70px;text-align:center">Öğrenci</th>
              </tr>
            </thead>
            <tbody id="exc-tablo">${satirlar}</tbody>
          </table>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
          <span id="exc-secili-bilgi" style="font-size:13px;color:var(--text2)"></span>
          <div style="display:flex;gap:8px">
            <button class="btn" onclick="excelOnizlemeKapat()"><i class="ti ti-x"></i> İptal</button>
            <button class="btn btn-primary" onclick="excelKaydet()"><i class="ti ti-cloud-upload"></i> Seçilileri Kaydet</button>
          </div>
        </div>
      </div>
    </div>
  `);
  excelOnizlemeSayiGuncelle();
}

window.excelOnizlemeSayiGuncelle = function() {
  const bloklar = window._excelOnizleme;
  if (!bloklar) return;
  const secBlok = bloklar.filter(b=>b.secili);
  const secOgr = secBlok.reduce((s,b)=>s+b.ogrenciler.length,0);
  const el = $('exc-secili-bilgi');
  if (el) el.textContent = `${secBlok.length} sınıf / ${secOgr} öğrenci seçili`;
};

window.excelHepsiniSec = function(durum) {
  const bloklar = window._excelOnizleme;
  if (!bloklar) return;
  bloklar.forEach((b,i) => {
    b.secili = durum;
    const cb = $(`exc-cb-${i}`);
    if (cb) cb.checked = durum;
  });
  excelOnizlemeSayiGuncelle();
};

window.excelOnizlemeKapat = function() {
  const m = $('excel-onizleme-modal');
  if (m) m.remove();
  window._excelOnizleme = null;
  if ($('excelFile')) $('excelFile').value = '';
};

window.excelKaydet = async function() {
  const bloklar = (window._excelOnizleme||[]).filter(b=>b.secili && b.ogrenciler.length>0);
  if (!bloklar.length) return showToast('Kayıt için en az bir sınıf seçin', 'warn');

  // Modal'daki input değerlerini son kez al
  bloklar.forEach(b => {
    const inp = $(`exc-ad-${b.idx}`);
    if (inp) b.sinifAdi = inp.value.trim() || b.sinifAdi;
  });

  // Adı boş olanları kontrol et
  const bossAdlar = bloklar.filter(b => !b.sinifAdi);
  if (bossAdlar.length) return showToast('Bazı sınıf adları boş, lütfen doldurun', 'error');

  const kaydetBtn = document.querySelector('#excel-onizleme-modal .btn-primary');
  if (kaydetBtn) { kaydetBtn.disabled = true; kaydetBtn.innerHTML = '<i class="ti ti-loader"></i> Kaydediliyor...'; }

  let toplamEklenen = 0, hatalar = [];

  for (const blok of bloklar) {
    try {
      // Sınıfı bul veya oluştur
      let sinif = APP.siniflar.find(s => s.ad === blok.sinifAdi);
      if (!sinif) {
        const {data: yeni, error: sinifErr} = await sb.from('siniflar').insert({ad: blok.sinifAdi}).select().single();
        if (sinifErr) throw sinifErr;
        sinif = yeni;
        APP.siniflar.push(sinif);
      }

      // Mevcut numaraları filtrele
      const mevcutNolar = new Set(APP.ogrenciler.filter(o=>o.sinif_id===sinif.id).map(o=>o.no));
      const yeniOgrenciler = blok.ogrenciler
        .filter(o => !mevcutNolar.has(o.no))
        .map(o => ({no:o.no, ad:o.ad, sinif_id:sinif.id, veli_ad:'', veli_tel:''}));

      if (yeniOgrenciler.length === 0) continue;

      const {error} = await sb.from('ogrenciler').insert(yeniOgrenciler);
      if (error) throw error;
      toplamEklenen += yeniOgrenciler.length;

    } catch(e) {
      hatalar.push(`${blok.sinifAdi}: ${e.message}`);
    }
  }

  excelOnizlemeKapat();
  await loadAll();
  render();

  if (hatalar.length) {
    showToast(`⚠ ${toplamEklenen} öğrenci eklendi, ${hatalar.length} hata: ${hatalar[0]}`, 'error');
  } else {
    showToast(`✅ ${toplamEklenen} öğrenci, ${bloklar.length} sınıfa başarıyla yüklendi`, 'success');
  }
};

// ═══════════════════════════════════════════════
//  E-OKUL DERS PROGRAMI PARSER  (v3)
//
//  E-Okul kopyala-yapıştır formatı:
//  • Satır ayırıcı : \n
//  • Sütun ayırıcı : \t (tab)
//  • Saat satırı   : col[0]=saat_no  col[1]=saat_aralığı  col[2..6]=günlerin ilk satırı
//  • Devam satırı  : col[0..4]=Paz,Sal,Çar,Per,Cum devam (saat_no içermez)
// ═══════════════════════════════════════════════

window._eOkulParsed = null;

function parseEOkulProgram(text) {
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const lines = text.split('\n');

  // Header satırını bul (Pazartesi/Salı içeren)
  let headerIdx = -1;
  for (let i = 0; i < Math.min(5, lines.length); i++) {
    const low = lines[i].toLowerCase();
    if (low.includes('pazartesi') || low.includes('salı') || low.includes('sali')) {
      headerIdx = i; break;
    }
  }
  if (headerIdx === -1) return null;

  const result = {};
  GUNLER.forEach(g => result[g] = {});

  // ── GERÇEK E-OKUL YAPISI ──────────────────────────────────────────────
  // Kopyala-yapıştırda hücre içi satır = \n, sütun ayırıcı = tab
  // Saat satırı : col[0]=saat_no  col[1]=saat_aralığı  col[2]=PAZ_satır1
  // Devam satırı: col[0]=aktif_gün_devamı  col[1]=sonraki_gün_satır1
  //   Yani her devam satırı aktif günü tamamlar, col[1] gelince aktif gün bir ilerler.
  //   Örnek (Saat 1):
  //     Satır0: [1, 08:30, SEÇMELİ DERS]          → PAZ başlar
  //     Satır1: [AYŞEGÜL - MAT, KELAM]             → PAZ biter, SAL başlar
  //     Satır2: [TEMEL ÇOBAN, SEÇMELİ DERS]        → SAL biter, ÇAR başlar
  //     Satır3: [ERBİL - SPOR, SEÇMELİ DERS]       → ÇAR biter, PER başlar
  //     Satır4: [UMUT+SEVCAN, SEÇMELİ DERS]        → PER biter, CUM başlar
  //     Satır5: [AYŞEGÜL - HEDEF]                  → CUM biter
  // ─────────────────────────────────────────────────────────────────────

  const dataLines = lines.slice(headerIdx + 1);

  // Saat bloklarını ayır
  const bloklar = []; // [{saatNum, lines:[...]}]
  let cur = null;
  for (const line of dataLines) {
    const cols = line.split('\t');
    const n = parseInt(cols[0].trim());
    if (!isNaN(n) && n >= 1 && n <= 8) {
      if (cur) bloklar.push(cur);
      cur = { saatNum: n, lines: [line] };
    } else if (cur) {
      cur.lines.push(line);
    }
  }
  if (cur) bloklar.push(cur);

  for (const { saatNum, lines: blokLines } of bloklar) {
    const gunSatirlar = GUNLER.map(() => []); // [[], [], [], [], []]

    // Saat satırı
    const cols0 = blokLines[0].split('\t');
    const offset = (cols0[1] && /^\d{1,2}:\d{2}/.test(cols0[1].trim())) ? 2 : 1;
    const ilkVal = (cols0[offset] || '').trim();
    if (ilkVal) gunSatirlar[0].push(ilkVal);

    // Devam satırları — kayan pencere
    let aktifGi = 0;
    for (const line of blokLines.slice(1)) {
      const cols = line.split('\t');
      const v0 = (cols[0] || '').trim();
      if (v0) gunSatirlar[aktifGi].push(v0);
      // col[1] varsa aktif gün bitti, bir sonrakine geç
      if (cols.length > 1 && cols[1].trim()) {
        aktifGi = Math.min(aktifGi + 1, 4);
        gunSatirlar[aktifGi].push(cols[1].trim());
      }
    }

    GUNLER.forEach((g, gi) => {
      const items = hucreIsle(gunSatirlar[gi]);
      if (items && items.length) result[g][saatNum] = items;
    });
  }
  return result;
}

// Bir hücrenin satır listesini [{ders, ogretmen},...] dizisine çevir
// Satır listesi örnekleri:
//   ["SEÇMELİ DERS", "AHMET - SEÇMELİ MAT"]           → [{ders:"SEÇMELİ MAT", ogretmen:"AHMET"}]
//   ["KUR`AN-I KERİM", "ALİ KURT", "KAMİL KARA"]       → [{ders:"KUR`AN-I KERİM", ogretmen:"ALİ KURT, KAMİL KARA"}]
//   ["AHMET - SEÇMELİ MAT MEHMET - SEÇMELİ FİZ"]       → iki çift (boşlukla birleşik, tab eksik)
//
// Ders adı prefix listesi — bir sonraki öğretmen adını bulmak için kullanılır
const DERS_PREFIXLER = [
  'SEÇMELİ ','T.C.','KUR`AN','TÜRK ','MESLEKİ ','YABANCI ',
  'DİN ','İSLAM ','DİNLER ','KELAM','FELSEFE','MATEMATİK',
  'FİZİK','KİMYA','BİYOLOJİ','TARİH','COĞRAFYA','EDEBİYAT',
  'ARAPÇA','BİYOLOJİ','GEOMETRİ','MANTIK','PSİKOLOJİ',
  'SOSYOLOJİ','FELSEFE','MÜZİK','BEDEN','İNKILÂP'
];

function dersPrefixiMi(s) {
  return DERS_PREFIXLER.some(p => s.toUpperCase().startsWith(p));
}

// Tek bir "OGR - DERS OGR2 - DERS2" string'ini çiftlere ayır
function tekSatirParcala(s) {
  const parcalar = s.split(' - ');
  if (parcalar.length < 2) return [{ders: s, ogretmen: ''}];

  const ciftler = [];
  let mevcutOgr = parcalar[0].trim();

  for (let i = 1; i < parcalar.length; i++) {
    const birlesik = parcalar[i].trim();
    if (i === parcalar.length - 1) {
      // Son parça = sadece ders
      ciftler.push({ogretmen: mevcutOgr, ders: birlesik});
    } else {
      // Bu parça: ders_mevcut + sonraki_ogr (birleşik)
      // Ders prefix'i arayarak ders bitişini bul
      const kelimeler = birlesik.split(' ');
      let bolunme = -1;
      // Sağdan sola tara: ders başlangıcını bul (prefix ile)
      for (let j = kelimeler.length - 1; j >= 1; j--) {
        const dersAdayi = kelimeler.slice(0, j).join(' ');
        const ogrAdayi  = kelimeler.slice(j).join(' ');
        if (dersPrefixiMi(dersAdayi) && ogrAdayi.split(' ').length >= 2) {
          bolunme = j; break;
        }
      }
      if (bolunme > 0) {
        ciftler.push({ogretmen: mevcutOgr, ders: kelimeler.slice(0, bolunme).join(' ')});
        mevcutOgr = kelimeler.slice(bolunme).join(' ');
      } else {
        // Bulunamazsa son 2 kelimeyi öğretmen yap
        const n = kelimeler.length;
        ciftler.push({ogretmen: mevcutOgr, ders: n > 2 ? kelimeler.slice(0, n-2).join(' ') : birlesik});
        mevcutOgr = n > 2 ? kelimeler.slice(n-2).join(' ') : '';
      }
    }
  }
  return ciftler;
}

function hucreIsle(satirlar) {
  satirlar = satirlar.map(s => s.trim()).filter(s => s && s !== '-' && s !== '—');
  if (!satirlar.length) return null;

  const baslik = satirlar[0];
  const altlar  = satirlar.slice(1);

  // Alt satır yoksa → sadece ders adı
  if (!altlar.length) return [{ders: baslik, ogretmen: ''}];

  const dersGruplari = [];
  const sadeceOgr   = [];

  altlar.forEach(satir => {
    if (satir.includes(' - ')) {
      // "OGR - DERS" veya "OGR - DERS OGR2 - DERS2" (tab eksik, boşlukla birleşik)
      const ciftler = tekSatirParcala(satir);
      dersGruplari.push(...ciftler);
    } else {
      sadeceOgr.push(satir);
    }
  });

  // Hiç "OGR - DERS" yoksa → baslik=ders, altlar=öğretmenler
  if (!dersGruplari.length) {
    return [{ders: baslik, ogretmen: sadeceOgr.join(', ')}];
  }

  return dersGruplari;
}

window.eOkulOnizle = function(sid) {
  const text = ($('eokul-paste')||{}).value || '';
  if (!text.trim()) return showToast('Lütfen E-Okul program metnini yapıştırın', 'warn');

  const parsed = parseEOkulProgram(text);
  if (!parsed) return showToast('Format tanınamadı — başlık satırı (Pazartesi, Salı...) bulunamadı', 'error');

  window._eOkulParsed = parsed;

  // Önizleme tablosu
  const SAAT_LABELS = {1:'08:30-09:10',2:'09:20-10:00',3:'10:10-10:50',4:'11:00-11:40',5:'11:50-12:30',6:'13:20-14:00',7:'14:10-14:50',8:'15:00-15:40'};
  let toplamDolu = 0;
  let html = `<div style="overflow-x:auto;border:1.5px solid var(--border);border-radius:8px;margin-bottom:10px">
    <table style="width:100%;border-collapse:collapse;font-size:11px;min-width:400px">
      <tr style="background:var(--bg2)">
        <th style="padding:6px;border:1px solid var(--border);width:60px">Saat</th>
        ${GUNLER.map(g=>`<th style="padding:6px;border:1px solid var(--border)">${g}</th>`).join('')}
      </tr>`;
  SAATLER.forEach(s => {
    html += `<tr><td style="padding:5px 6px;border:1px solid var(--border);text-align:center;font-weight:700;background:var(--bg2);font-size:10px">${s}<br><span style="font-weight:400;color:#aaa">${(SAAT_LABELS[s]||'').replace('-','‑')}</span></td>`;
    GUNLER.forEach(g => {
      const h = (parsed[g]||{})[s];
      if (h && h.length) {
        toplamDolu += h.length;
        const cellHtml = h.map(it => `
          <div style="background:#e8f5d4;border-left:2px solid var(--green);border-radius:4px;padding:3px 5px;margin-bottom:2px">
            <div style="font-size:10px;font-weight:700;color:var(--green);line-height:1.3">${it.ders}</div>
            ${it.ogretmen?`<div style="font-size:9px;color:#555;line-height:1.2">${it.ogretmen}</div>`:''}
          </div>`).join('');
        html += `<td style="padding:4px 5px;border:1px solid var(--border);vertical-align:top">${cellHtml}</td>`;
      } else {
        html += `<td style="border:1px solid var(--border);background:#fafaf7"></td>`;
      }
    });
    html += '</tr>';
  });
  html += '</table></div>';
  html += `<div class="notif n-success" style="margin:0"><i class="ti ti-check"></i><div><b>${toplamDolu}</b> ders saati başarıyla okundu. Beğendiyseniz "Kaydet" butonuna basın.</div></div>`;

  const onDiv = $('eokul-onizleme');
  if (onDiv) onDiv.innerHTML = html;
  const btn = $('eokul-kaydet-btn');
  if (btn) btn.style.display = '';
};

window.eOkulKaydet = async function(sid) {
  const parsed = window._eOkulParsed;
  if (!parsed) return showToast('Önce Önizle butonuna basın', 'warn');

  const btn = $('eokul-kaydet-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader"></i> Kaydediliyor...'; }

  try {
    // ── 1) Programı kaydet ───────────────────────────────────────────────
    const rows = [];
    GUNLER.forEach(gun => {
      SAATLER.forEach(saat => {
        const items = (parsed[gun]||{})[saat];
        rows.push({
          sinif_id: sid, gun, saat,
          ders_adi: items && items.length ? JSON.stringify(items) : ''
        });
      });
    });
    const {error} = await sb.from('ders_programi').upsert(rows, {onConflict:'sinif_id,gun,saat'});
    if (error) throw error;

    // ── 2) Parsed veriden tekil ders ve öğretmenleri çıkar ──────────────
    const yeniDersAdlari  = new Set();
    const yeniOgretmenler = new Set();

    GUNLER.forEach(gun => {
      SAATLER.forEach(saat => {
        const items = (parsed[gun]||{})[saat];
        if (!items) return;
        items.forEach(it => {
          if (it.ders   && it.ders.trim())    yeniDersAdlari.add(it.ders.trim());
          if (it.ogretmen && it.ogretmen.trim()) {
            // Virgülle ayrılmış birden fazla öğretmen olabilir
            it.ogretmen.split(',').forEach(o => {
              const oad = o.trim();
              if (oad) yeniOgretmenler.add(oad);
            });
          }
        });
      });
    });

    // ── 3) Eksik dersleri ekle ───────────────────────────────────────────
    const mevcutDersAdlari = new Set(APP.dersler.map(d => d.ad.toUpperCase()));
    const eklenecekDersler = [...yeniDersAdlari]
      .filter(ad => !mevcutDersAdlari.has(ad.toUpperCase()))
      .map(ad => ({
        ad,
        kod: ad.split(' ').map(w=>w[0]||'').join('').slice(0,4).toUpperCase() || 'DRS',
        renk: 'gray'
      }));

    if (eklenecekDersler.length) {
      await sb.from('dersler').insert(eklenecekDersler);
    }

    // ── 4) Eksik öğretmenleri kullanicilar tablosuna ekle ────────────────
    // Sadece rol='ogretmen' olan mevcut kullanıcılarla karşılaştır
    const mevcutOgretmenAdlari = new Set(
      APP.kullanicilar.filter(u=>u.rol==='ogretmen').map(u=>u.ad.toUpperCase())
    );
    const eklenecekOgretmenler = [...yeniOgretmenler]
      .filter(ad => !mevcutOgretmenAdlari.has(ad.toUpperCase()))
      .map(ad => {
        // Kullanıcı adı: adın küçük harfli kısaltması
        const parcalar = ad.toLowerCase().split(' ').filter(Boolean);
        const kullanici_adi = (parcalar[0]||'ogr') + (parcalar[1]||'').slice(0,3);
        return { ad, kullanici_adi, sifre:'1234', rol:'ogretmen', brans:'' };
      });

    if (eklenecekOgretmenler.length) {
      await sb.from('kullanicilar').insert(eklenecekOgretmenler);
    }

    // ── 5) Öğretmen-sınıf atamalarını otomatik yap ───────────────────────
    // Programda yer alan tüm öğretmenleri bu sınıfa ata (henüz atanmamışsa)
    await loadAll(); // yeni eklenen öğretmenleri çek

    // Bu sınıfa zaten atanmış öğretmen id'leri
    const mevcutAtamalar = new Set(
      APP.ogretmenSinif.filter(x => x.sinif_id === sid).map(x => x.kullanici_id)
    );

    // Programdaki öğretmen adlarını id'ye çevir
    const atanacaklar = [];
    yeniOgretmenler.forEach(ad => {
      const kul = APP.kullanicilar.find(
        u => u.rol === 'ogretmen' && u.ad.toUpperCase() === ad.toUpperCase()
      );
      if (kul && !mevcutAtamalar.has(kul.id)) {
        atanacaklar.push({ kullanici_id: kul.id, sinif_id: sid });
        mevcutAtamalar.add(kul.id); // tekrar eklemeyi önle
      }
    });

    if (atanacaklar.length) {
      await sb.from('ogretmen_sinif').insert(atanacaklar);
    }

    // ── 6) Bildir ve yenile ──────────────────────────────────────────────
    await loadAll();
    const ozet = [];
    if (eklenecekDersler.length)    ozet.push(`${eklenecekDersler.length} ders`);
    if (eklenecekOgretmenler.length) ozet.push(`${eklenecekOgretmenler.length} öğretmen`);
    if (atanacaklar.length)          ozet.push(`${atanacaklar.length} sınıf ataması`);
    const ozetStr = ozet.length ? ` · Otomatik: ${ozet.join(', ')}` : '';
    showToast(`✅ ${sinifAd(sid)} programı kaydedildi${ozetStr}`, 'success');

    window._eOkulParsed = null;
    cm();
  } catch(e) {
    showToast('Kayıt hatası: ' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-cloud-upload"></i>Kaydet'; }
  }
};

window.progSil = async function(sid) {
  if (!sid) return;
  const sinifAdi2 = sinifAd(sid);
  if (!confirm(`"${sinifAdi2}" sınıfının haftalık programı silinecek. Devam edilsin mi?`)) return;
  const {error} = await sb.from('ders_programi').delete().eq('sinif_id', sid);
  if (error) return showToast(error.message, 'error');
  showToast('Program temizlendi'); await loadAll(); render();
};


window.progKaydet = async function(sid, gun) {
  const rows = SAATLER.map(s=>({
    sinif_id:sid, gun, saat:s, ders_adi:($('ps-'+s)||{}).value||''
  }));
  const {error} = await sb.from('ders_programi').upsert(rows, {onConflict:'sinif_id,gun,saat'});
  if (error) return showToast(error.message,'error');
  showToast('Program kaydedildi'); await loadAll(); cm();
};

// URL parametreli başlatma
(async function() {
  const p = new URLSearchParams(window.location.search);
  const url = p.get('sb_url') ? decodeURIComponent(p.get('sb_url')) : (SUPABASE_URL !== 'https://PROJENIZ.supabase.co' ? SUPABASE_URL : null);
  const key = p.get('sb_key') ? decodeURIComponent(p.get('sb_key')) : (SUPABASE_ANON_KEY !== 'BURAYA_ANON_KEY_YAPISTIRIN' ? SUPABASE_ANON_KEY : null);

  if (!url || !key) { showSetup(); return; }
  try {
    sb = window.supabase.createClient(url, key);
    await loadAll();
    subscribeRealtime();
    render();
  } catch(e) {
    console.error('Init error:', e);
    // Hata olsa bile login ekranını göster — takılı kalmasın
    try { render(); } catch(e2) {}
    // Eğer kurulum hatası ise setup ekranını göster
    if (!APP.user) showSetup(e.message);
  }
})();

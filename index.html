<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>OkulYokla — Dijital Yoklama Sistemi</title>
<meta name="theme-color" content="#185FA5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="OkulYokla">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --blue:#185FA5; --blue-bg:#E6F1FB; --blue-dark:#0C447C;
  --green:#3B6D11; --green-bg:#EAF3DE;
  --red:#A32D2D; --red-bg:#FCEBEB;
  --amber:#854F0B; --amber-bg:#FAEEDA;
  --purple:#3C3489; --purple-bg:#EEEDFE;
  --teal:#085041; --teal-bg:#E1F5EE;
  --gray-bg:#F1EFE8;
  --bg:#fff; --bg2:#f7f7f3; --bg3:#ebebeb;
  --border:#e2e2da; --text:#1a1a1a; --text2:#666;
  --radius:8px; --radius-lg:14px;
  --shadow:0 1px 4px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;color:var(--text);background:var(--bg2)}
input,select,textarea,button{font-family:inherit;font-size:14px}
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;transition:border .15s}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.1)}
.btn{padding:9px 16px;border-radius:var(--radius);cursor:pointer;border:1.5px solid var(--border);background:var(--bg);color:var(--text);display:inline-flex;align-items:center;gap:7px;font-weight:500;transition:all .15s;white-space:nowrap;user-select:none}
.btn:hover{background:var(--bg3)}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:var(--blue-dark);border-color:var(--blue-dark)}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:#f5c6c6}
.btn-success{background:var(--green-bg);color:var(--green);border-color:#c3dda0}
.btn-sm{padding:6px 11px;font-size:13px}
.btn-block{width:100%;justify-content:center}
.badge{padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block;line-height:1.4}
.b-blue{background:var(--blue-bg);color:var(--blue-dark)}
.b-green{background:var(--green-bg);color:var(--green)}
.b-red{background:var(--red-bg);color:var(--red)}
.b-amber{background:var(--amber-bg);color:var(--amber)}
.b-gray{background:var(--gray-bg);color:var(--text2)}
.b-purple{background:var(--purple-bg);color:var(--purple)}
.b-teal{background:var(--teal-bg);color:var(--teal)}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg);border-bottom:1.5px solid var(--border);padding:0 10px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--shadow);gap:6px;overflow:hidden}
.logo-txt{display:inline}
@media(max-width:380px){.logo-txt{display:none}}
.logo{font-size:17px;font-weight:700;color:var(--blue);display:flex;align-items:center;gap:8px}
.user-chip{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.layout{display:flex;flex:1;min-height:0}
.sidebar{width:210px;flex-shrink:0;background:var(--bg);border-right:1.5px solid var(--border);padding:8px 0;overflow-y:auto}
.main-content{flex:1;padding:20px;overflow-y:auto;min-width:0}

/* ── NAV ── */
.nav-sec{font-size:10px;font-weight:700;color:var(--text2);padding:12px 16px 4px;text-transform:uppercase;letter-spacing:.07em}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);border-left:3px solid transparent;transition:all .12s}
.nav-item:hover{background:var(--bg2);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--blue);border-left-color:var(--blue)}
.nav-item i{font-size:17px;width:20px;flex-shrink:0}

/* ── CARDS ── */
.card{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:14px}
.stat{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat-n{font-size:28px;font-weight:700;line-height:1}
.stat-l{font-size:11px;color:var(--text2);margin-top:4px}
.n-blue{color:var(--blue)}.n-green{color:var(--green)}.n-red{color:var(--red)}.n-amber{color:var(--amber)}.n-purple{color:var(--purple)}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--radius);border:1.5px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:400px}
th{text-align:left;padding:9px 12px;border-bottom:1.5px solid var(--border);font-weight:700;font-size:11px;color:var(--text2);background:var(--bg2);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf7}

/* ── ROW ── */
.row{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);gap:10px}
.row:last-child{border-bottom:none}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}

/* ── ATTENDANCE BTNS ── */
.att-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.att-btn:active{transform:scale(.9)}
.sel-P{background:var(--green-bg);border-color:#aad67c;box-shadow:0 0 0 3px rgba(59,109,17,.15)}
.sel-A{background:var(--red-bg);border-color:#f5a0a0;box-shadow:0 0 0 3px rgba(163,45,45,.15)}
.sel-L{background:var(--amber-bg);border-color:#f5c97a;box-shadow:0 0 0 3px rgba(133,79,11,.15)}
.sel-E{background:var(--blue-bg);border-color:#90c4f5;box-shadow:0 0 0 3px rgba(24,95,165,.15)}

/* ── SUMBAR ── */
.sumbar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.sum-item{text-align:center;padding:10px 6px;border-radius:var(--radius);font-size:12px;font-weight:600}
.sum-n{font-size:22px;font-weight:700;display:block;line-height:1.1;margin-bottom:3px}

/* ── NOTIF ── */
.notif{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:12px;line-height:1.5}
.n-info{background:var(--blue-bg);color:var(--blue-dark);border:1.5px solid #b0d4f5}
.n-warn{background:var(--amber-bg);color:var(--amber);border:1.5px solid #f5c97a}
.n-success{background:var(--green-bg);color:var(--green);border:1.5px solid #aad67c}
.n-error{background:var(--red-bg);color:var(--red);border:1.5px solid #f5a0a0}

/* ── PAGE HEADER ── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.page-title{font-size:20px;font-weight:700;display:flex;align-items:center;gap:9px}

/* ── PROGRESS ── */
.pbar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:5px}
.pbar-fill{height:100%;border-radius:3px;transition:width .4s}

/* ── MODAL ── */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box;backdrop-filter:blur(2px)}
.modal{background:var(--bg);border-radius:var(--radius-lg);padding:22px;width:100%;max-width:480px;max-height:76vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.28);position:relative;margin:auto}
@media(max-width:480px){.modal{padding:16px;max-height:72vh}}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.form-group{margin-bottom:13px}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.04em}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-hint{font-size:11px;color:var(--text2);margin-top:4px}

/* ── LOGIN ── */
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#f0f6ff 0%,#f7f7f3 100%)}
.login-box{width:100%;max-width:380px}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-icon{width:64px;height:64px;background:var(--blue);border-radius:16px;margin:0 auto 12px;display:flex;align-items:center;justify-content:center}
.role-btns{display:flex;gap:10px;margin-bottom:18px}
.role-btn{flex:1;padding:14px;border:2px solid var(--border);border-radius:var(--radius);background:var(--bg);cursor:pointer;text-align:center;transition:all .15s}
.role-btn:hover{background:var(--bg2)}
.role-btn.active{border-color:var(--blue);background:var(--blue-bg)}
.role-btn i{font-size:24px;color:var(--blue);display:block;margin-bottom:5px}
.role-btn span{font-size:13px;font-weight:600;color:var(--text)}

/* ── PROG TABLE ── */
.prog-tbl{border-collapse:collapse;width:100%;min-width:550px;font-size:12px}
.prog-tbl th,.prog-tbl td{border:1px solid var(--border);padding:8px 6px;text-align:center;vertical-align:middle}
.prog-tbl th{background:var(--bg2);font-weight:700;font-size:11px;color:var(--text2);text-transform:uppercase}
.ders-chip{display:inline-block;padding:3px 7px;border-radius:5px;font-size:11px;font-weight:600;white-space:nowrap}

/* ── SETUP SCREEN ── */
.setup-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg2)}
.setup-box{max-width:520px;width:100%}

/* ── LOADING ── */
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;color:var(--text2);font-size:15px}

/* ── MOBILE ── */
@media(max-width:640px){
  .sidebar{display:none}
  .main-content{padding:14px}
  .bottom-nav{display:block!important}
  .form-row{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .sumbar{grid-template-columns:repeat(2,1fr)}
  .page-title{font-size:17px}
  .card{padding:13px}
}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1.5px solid var(--border);z-index:100;padding-bottom:env(safe-area-inset-bottom);overflow-x:auto;-webkit-overflow-scrolling:touch}
.bottom-nav-inner{display:flex;min-width:max-content;width:100%}
.bottom-nav-item{flex:0 0 auto;min-width:60px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 10px;font-size:10px;font-weight:600;color:var(--text2);cursor:pointer;transition:color .12s;border:none;background:none}
.bottom-nav-item i{font-size:22px}
.bottom-nav-item.active{color:var(--blue)}
/* push content above bottom nav on mobile */
@media(max-width:640px){.main-content{padding-bottom:80px}}

/* ── MAZERET ── */
.maz-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;cursor:default}
.maz-sevk{background:#e0f2fe;color:#0369a1}
.maz-izin{background:#fef9c3;color:#854d0e}
.maz-rapor{background:#dcfce7;color:#166534}
.maz-faaliyet{background:#f3e8ff;color:#7c3aed}
.maz-diger{background:#f1f5f9;color:#475569}
@media print{
  .sidebar,.bottom-nav,.top-bar,.page-header button,.btn,.no-print{display:none!important}
  body{background:#fff}
  .main-content{padding:0;padding-bottom:0}
  .card{box-shadow:none;border:1px solid #ccc;break-inside:avoid}
  table{width:100%;border-collapse:collapse}
  th,td{border:1px solid #ccc;padding:5px 8px;font-size:11px}
  .print-header{display:block!important}
}
.print-header{display:none}
/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:var(--radius);font-size:12px;font-weight:500;background:var(--bg2);border:1px solid var(--border);color:var(--text2);margin:2px}
.search-wrap{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search-wrap input,.search-wrap select{max-width:200px}

/* ── REALTIME DOT ── */
.live-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}

/* ── MISC ── */
.divider{height:1px;background:var(--border);margin:14px 0}
.empty-state{text-align:center;padding:48px 20px;color:var(--text2)}
.empty-state i{font-size:44px;display:block;margin-bottom:12px;opacity:.4}
code{background:var(--bg3);padding:2px 6px;border-radius:4px;font-size:12px;font-family:monospace}
</style>
</head>
<body>
<div id="app">
  <div class="loading-screen" id="loading">
    <div class="spinner"></div>
    <span>Sistem yükleniyor...</span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  SUPABASE BAĞLANTI AYARLARI
//  !! Bu değerleri kendi Supabase projenizden alın !!
// ═══════════════════════════════════════════════
const SUPABASE_URL = 'https://aqakusrgwpzusrguprrl.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_S-RlIpMJIN0w4ckKetejgw_L_H6aWEJ';

// ─── Renk haritası ───
const RENK_MAP = {
  blue:['#E6F1FB','#0C447C'], teal:['#E1F5EE','#085041'],
  purple:['#EEEDFE','#3C3489'], amber:['#FAEEDA','#633806'],
  green:['#EAF3DE','#27500A'], red:['#FCEBEB','#A32D2D'], gray:['#F1EFE8','#444441']
};
const GUNLER = ['Pazartesi','Salı','Çarşamba','Perşembe','Cuma'];
const SAATLER = [1,2,3,4,5,6,7,8];
const DURUM_LABEL = {P:'Mevcut',A:'Devamsız',L:'Geç'};

// ─── State ───
let sb, APP = {
  user:null, page:'', modal:null,
  siniflar:[], ogrenciler:[], dersler:[], kullanicilar:[], ogretmenSinif:[],
  programlar:{}, yoklamalar:{}, yoklamaDetay:{},
  filter:{ogrSinif:'', ogrArama:''},
  yokDataMap:{}, yokSinif:null, yokSaat:null, // yokDataMap: {sinifId: {ogrId: durum}}
  progSinif:null, tProgSinif:null, editGun:'Pazartesi',
  loading:false, toast:null, toastTimer:null,
  configured: SUPABASE_URL !== 'https://PROJENIZ.supabase.co',
};

// ═══════════════════════════════════════════════
//  INIT — Tek başlatma noktası: sayfanın altındaki IIFE
// ═══════════════════════════════════════════════

async function loadAll() {
  const [s, o, d, k, os, yk, yd, prog] = await Promise.all([
    sb.from('siniflar').select('*').order('id'),
    sb.from('ogrenciler').select('*').order('sinif_id').order('no'),
    sb.from('dersler').select('*').order('id'),
    sb.from('kullanicilar').select('*').order('id'),
    sb.from('ogretmen_sinif').select('*'),
    sb.from('yoklamalar').select('*').order('tarih', {ascending:false}),
    sb.from('yoklama_detay').select('*'),
    sb.from('ders_programi').select('*'),
  ]);
  APP.siniflar = s.data||[];
  APP.ogrenciler = o.data||[];
  APP.dersler = d.data||[];
  APP.kullanicilar = k.data||[];
  APP.ogretmenSinif = os.data||[];
  // Yoklama map
  APP.yoklamalar = {};
  (yk.data||[]).forEach(y => APP.yoklamalar[y.id] = y);
  APP.yoklamaDetay = {};
  (yd.data||[]).forEach(d => {
    if (!APP.yoklamaDetay[d.yoklama_id]) APP.yoklamaDetay[d.yoklama_id] = {};
    APP.yoklamaDetay[d.yoklama_id][d.ogrenci_id] = d.durum;
  });
  // Program map: {sinif_id: {Gun: {saat: ders_adi_or_obj}}}
  APP.programlar = {};
  (prog.data||[]).forEach(p => {
    if (!APP.programlar[p.sinif_id]) APP.programlar[p.sinif_id] = {};
    if (!APP.programlar[p.sinif_id][p.gun]) APP.programlar[p.sinif_id][p.gun] = {};
    // ders_adi: JSON array "[{ders,ogretmen}...]" veya eski string
    let val = p.ders_adi || '';
    if (val.startsWith('[') || val.startsWith('{')) {
      try {
        const parsed = JSON.parse(val);
        // Eski format {ders,ogretmen} → array'e çevir
        val = Array.isArray(parsed) ? parsed : [parsed];
      } catch(e) { /* string kalsın */ }
    }
    APP.programlar[p.sinif_id][p.gun][p.saat] = val;
  });
  if (!APP.progSinif && APP.siniflar[0]) APP.progSinif = APP.siniflar[0].id;
  if (!APP.tProgSinif && APP.siniflar[0]) APP.tProgSinif = APP.siniflar[0].id;
  // ── Supabase'den kalıcı veriler ──
  APP.mazeretler = {};
  APP.importDevamsizlik = {};
  APP.iletisim = {};
  APP._turKuralOverride = {};
  try {
    // Mazeretler — 1000 limit aşılabilir, tümünü sayfalayarak çek
    const tumMazeretler = [];
    let mazSayfa = 0;
    const mazSayfaBoyut = 1000;
    while(true) {
      const {data:mazData, error:mazErr} = await sb.from('mazeretler')
        .select('*')
        .range(mazSayfa*mazSayfaBoyut, (mazSayfa+1)*mazSayfaBoyut-1);
      if (mazErr || !mazData || mazData.length===0) break;
      tumMazeretler.push(...mazData);
      if (mazData.length < mazSayfaBoyut) break;
      mazSayfa++;
    }
    const [r2,r3] = await Promise.all([
      sb.from('okul_ayarlari').select('*'),
      sb.from('tur_kurallari').select('*'),
    ]);
    const r1 = {data: tumMazeretler};
    (r1.data||[]).forEach(m=>{
      const t=String(m.tarih).slice(0,10);
      if(!APP.mazeretler[t]) APP.mazeretler[t]={};
      // Her iki key'e de kaydet (number ve string uyumsuzluğunu önlemek için)
      const ogrKey = Number(m.ogr_id);
      APP.mazeretler[t][ogrKey]={tur:m.tur,not:m.not_text||'',_import:m.import||false,devTip:m.dev_tip,gun:m.gun,ts:Date.now()};
      if(m.import){
        const oid=String(m.ogr_id);
        if(!APP.importDevamsizlik[oid]) APP.importDevamsizlik[oid]=[];
        const ex=APP.importDevamsizlik[oid].findIndex(x=>x.tarih===t);
        const en={tarih:t,devTip:m.dev_tip,ozurlu:m.tur!=='__ozursuz__',gun:m.gun,kaynak:m.kaynak};
        if(ex>=0) APP.importDevamsizlik[oid][ex]=en; else APP.importDevamsizlik[oid].push(en);
      }
    });
    (r2.data||[]).forEach(a=>{
      try{APP.iletisim[a.anahtar]=JSON.parse(a.deger);}catch(e){APP.iletisim[a.anahtar]=a.deger;}
    });
    (r3.data||[]).forEach(t=>{ APP._turKuralOverride[t.kod]={ozurlu:t.ozurlu,say:t.say}; });
  } catch(e){ console.warn('Kalıcı veri yükleme hatası:',e); }
  // localStorage'dan tek seferlik migrate
  await migrateLocalStorage();
  
  // Demo verileri oluştur (ilk kez ise)
  if (APP.kullanicilar.length === 0) {
    console.log('Demo verileri oluşturuluyor...');
    const demoUsers = [
      { ad: 'Müdür Demo', kullanici_adi: 'mudur', sifre: '1234', rol: 'mudur' },
      { ad: 'Ayşe Yılmaz', kullanici_adi: 'ayse', sifre: '1234', rol: 'ogretmen' },

let _realtimeChannel = null;
function subscribeRealtime() {
  if (_realtimeChannel) { sb.removeChannel(_realtimeChannel); _realtimeChannel = null; }
  // localStorage değişikliği (import) anlık yansısın
  window.addEventListener('storage', (e) => {
    if (e.key === 'okulYokla_mazeretler' && APP.user && APP.user.rol !== 'veli') {
      try { APP.mazeretler = JSON.parse(e.newValue||'{}'); } catch(ex) {}
      render();
    }
  });
  _realtimeChannel = sb.channel('yoklama-changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'yoklamalar'}, async () => {
      const {data} = await sb.from('yoklamalar').select('*').order('tarih', {ascending:false});
      APP.yoklamalar = {};
      (data||[]).forEach(y => APP.yoklamalar[y.id] = y);
      render();
    })
    .on('postgres_changes', {event:'*', schema:'public', table:'yoklama_detay'}, async () => {
      const {data} = await sb.from('yoklama_detay').select('*');
      APP.yoklamaDetay = {};
      (data||[]).forEach(d => {
        if (!APP.yoklamaDetay[d.yoklama_id]) APP.yoklamaDetay[d.yoklama_id] = {};
        APP.yoklamaDetay[d.yoklama_id][d.ogrenci_id] = d.durum;
      });
      render();
    })
    .subscribe();
}

window.testBaglan = async function() {
  const url = document.getElementById('s-url').value.trim();
  const key = document.getElementById('s-key').value.trim();
  if (!url || !key) { document.getElementById('setup-msg').innerHTML = `<div class="notif n-warn"><i class="ti ti-alert-triangle"></i>URL ve Key giriniz.</div>`; return; }
  document.getElementById('setup-msg').innerHTML = `<div class="notif n-info"><i class="ti ti-loader"></i>Test ediliyor...</div>`;
  try {
    const testSb = window.supabase.createClient(url, key);
    const {error} = await testSb.from('siniflar').select('count');
    if (error) throw error;
    document.getElementById('setup-msg').innerHTML = `<div class="notif n-success"><i class="ti ti-check"></i>Bağlantı başarılı! Sayfa yenileniyor...</div>`;
    // URL'e parametreleri ekle ve yenile
    const newUrl = new URL(window.location.href);
    newUrl.searchParams.set('sb_url', encodeURIComponent(url));
    newUrl.searchParams.set('sb_key', encodeURIComponent(key));
    setTimeout(() => { window.location.href = newUrl.toString(); }, 1200);
  } catch(e) {
    document.getElementById('setup-msg').innerHTML = `<div class="notif n-error"><i class="ti ti-x"></i><b>Hata:</b> ${e.message}</div>`;
  }
};

function bugunYoklama(sid) {
  // Geriye dönük uyumluluk — saat parametresiz çağrılar için ilk bulunanı döner
  const tarih = bugunTarih();
  return Object.values(APP.yoklamalar).find(y=>y.sinif_id==sid&&y.tarih===tarih)||null;
}
function bugunYoklamaSaat(sid, saat, ogretmenId) {
  // Saat + isteğe bağlı öğretmen bazlı arama
  const tarih = bugunTarih();
  const all = Object.values(APP.yoklamalar).filter(y=>y.sinif_id==sid&&y.tarih===tarih&&y.saat==saat);
  if (ogretmenId !== undefined) {
    return all.find(y=>y.ogretmen_id==ogretmenId) || null;
  }
  return all[0] || Object.values(APP.yoklamalar).find(y=>y.sinif_id==sid&&y.tarih===tarih&&!y.saat) || null;
}
function bugunTarih() {
  const n = new Date(); 
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}
function tarihTam(t) {
  if (!t) return '—';
  const d = new Date(t+'T00:00:00');
  const gunler = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  const aylar  = ['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
  return `${gunler[d.getDay()]} ${d.getDate()} ${aylar[d.getMonth()]} ${d.getFullYear()}`;
}
function tarihDMY(t) {
  // YYYY-MM-DD → DD.MM.YYYY
  if (!t) return '—';
  const p = String(t).slice(0,10).split('-');
  if (p.length!==3) return t;
  return p[2]+'.'+p[1]+'.'+p[0];
}
function tarihGoster(t) {
  if (!t) return '—';
  const d = new Date(t+'T00:00:00');
  return d.toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'});
}
function showToast(msg, type='success') {

// Öğretmenin bugün almadığı yoklamaları hesapla
function alinanmayanDersler() {
  const u = APP.user;
  if (!u || u.rol !== 'ogretmen') return [];
  const gun = bugunGun();
  const benim = ogretmenSiniflari(u.id);
  const siniflar = APP.siniflar.filter(s => benim.includes(s.id));
  const eksik = [];
  siniflar.forEach(s => {
    const dersler = ogretmenSinifDersleri(u.ad, s.id, gun);
    dersler.forEach(d => {
      const yok = bugunYoklamaSaat(s.id, d.saat);
      if (!yok) {
        eksik.push({sinifAd: s.ad, saat: d.saat, ders: d.ders, sinifId: s.id});
      }
    });
  });
  return eksik.sort((a,b) => a.saat - b.saat);
}

function renderOgretmenUyari() {
  const eksik = alinanmayanDersler();
  if (!eksik.length) return '';
  const simdiki = simdikiSaat();

  const gecmisEksik = eksik.filter(e => e.saat <= (simdiki || 0));
  if (!gecmisEksik.length) return '';

  const liste = gecmisEksik.map(e =>
    `<span onclick="APP.yokSinif=${e.sinifId};APP.yokSaat=${e.saat};gp('yoklamaAl')"

      ${e.saat}. Ders · ${e.sinifAd}

  ).join('');

  return `<div style="background:var(--red);color:#fff;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:13px">
    <i class="ti ti-bell-ringing" style="font-size:20px;flex-shrink:0;animation:pulse 1.2s infinite"></i>

}

function bindLoginEvents() {
  const btn = $('login-btn'); if (btn) btn.onclick = doLogin;
  const up = $('l-p'); if (up) up.onkeydown = e => { if(e.key==='Enter') doLogin(); };
  // Kayıtlı giriş bilgilerini doldur
  try {
    const saved = JSON.parse(localStorage.getItem('okulYokla_remember') || 'null');
    if (saved) {
      const lu = $('l-u'); const lp = $('l-p'); const lr = $('l-remember');
      if (lu) lu.value = saved.u || '';
      if (lp) lp.value = saved.p || '';
      if (lr) lr.checked = true;
      // Kaydedilen rolle sekmeyi güncelle — yanlış sekme seçiliyken düzelt
      if (saved.rol && APP._loginRol !== saved.rol) {
        APP._loginRol = saved.rol;
        // Sekme güncellemesi için yeniden render gerekmez, sadece state'i güncelle
      }
    }
  } catch(e) {}
}
window.setLoginRol = function(r) { APP._loginRol=r; render(); };
async function doLogin() {
  const u = ($('l-u')||{}).value?.trim();
  const p = ($('l-p')||{}).value?.trim();
  if (!u||!p) return;
  const rol = APP._loginRol||'mudur';
  
  // Eğer kullanıcı listesi boşsa, veriyi yükle
  if (!APP.kullanicilar || APP.kullanicilar.length === 0) {
    try {
      const {data} = await sb.from('kullanicilar').select('*').order('id');
      APP.kullanicilar = data || [];
    } catch(e) {
      APP.loginErr = 'Veritabanı bağlantı hatası: ' + e.message;
      render();
      bindLoginEvents();
      return;
    }
  }
  
  // Önce kullanıcılar tablosunda ara (mudur/ogretmen)
  let found = APP.kullanicilar.find(x=>x.kullanici_adi===u&&x.sifre===p);
  let veliOgrenci = null;

  // Bulunamazsa ogrenciler tablosunda veli_tel/veli_ad ile ara
  // Giriş: kullanici_adi=öğrenci no, sifre=veli telefon son 4 hanesi
  if (!found) {
    const ogrList = APP.ogrenciler.length ? APP.ogrenciler : (await sb.from('ogrenciler').select('*')).data||[];
    // Öğrenci no + veli tel son 4 hane ile eşleştir
    const veliMatch = ogrList.find(o => {
      const tel = (o.veli_tel||'').replace(/\D/g,'');
      const son4 = tel.slice(-4);
      return String(o.no)===u && son4===p;
    });
    if (veliMatch) {
      veliOgrenci = veliMatch;
      found = {id: 'veli_'+veliMatch.id, ad: veliMatch.veli_ad||'Veli', rol: 'veli', kullanici_adi: u, _ogrId: veliMatch.id};
    }
  }

  if (found) {
    const remember = ($('l-remember')||{}).checked;
    if (remember) {
      localStorage.setItem('okulYokla_remember', JSON.stringify({u, p, rol: found.rol}));
    } else {
      localStorage.removeItem('okulYokla_remember');
    }
    APP.user=found;
    APP._loginRol=found.rol;
    APP.loginErr='';
    APP.page=found.rol==='mudur'?'ozet':found.rol==='veli'?'veliOzet':'yoklamaAl';
    await loadAll();
    // Veli bildirim aboneliği — realtime
    if (found.rol==='veli') subscribeVeliRealtime(found._ogrId);
    render();
  } else {
    APP.loginErr='Kullanıcı adı veya şifre hatalı!';
    render();
    bindLoginEvents();
  }
}

async function migrateLocalStorage() {
  if (localStorage.getItem('okulYokla_migrated_v3')) return;
  try {
    const mazStr = localStorage.getItem('okulYokla_mazeretler');
    if (mazStr) {
      const mazObj = JSON.parse(mazStr);
      for (const [tarih,ogrMap] of Object.entries(mazObj)) {
        for (const [ogrId,maz] of Object.entries(ogrMap)) {
          if (!maz||!maz.tur) continue;
          await sb.from('mazeretler').delete().eq('ogr_id',Number(ogrId)).eq('tarih',tarih);
          await sb.from('mazeretler').insert({ogr_id:Number(ogrId),tarih,tur:maz.tur,not_text:maz.not||'',import:maz._import||false,dev_tip:maz.devTip||null,gun:maz.gun||null,kaynak:maz.kaynak||null});
        }
      }
    }
    const ilStr = localStorage.getItem('okulYokla_iletisim');
    if (ilStr) {
      const ilObj = JSON.parse(ilStr);
      for (const [k,v] of Object.entries(ilObj)) {
        await sb.from('okul_ayarlari').delete().eq('anahtar',k);
        await sb.from('okul_ayarlari').insert({anahtar:k,deger:typeof v==='string'?v:JSON.stringify(v)});
      }
    }
    localStorage.setItem('okulYokla_migrated_v3','1');
  } catch(e){ console.warn('Migrate hatası:',e); }
}

function pgOzet() {
  const bugunStr = bugunTarih();
  if (!APP._ozetTarih) APP._ozetTarih = bugunStr;
  const tarih = APP._ozetTarih;
  // Seçili tarihin gününü hesapla
  const GUNLER = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  const gun = GUNLER[new Date(tarih + 'T12:00:00').getDay()];

  // ── Yardımcı: bir sınıfın bugün olması gereken TÜM ders+yoklama durumu ──
  // Her sınıf için {bekleyen, alinan, toplam} saatlerini hesapla
  function sinifYoklamaDurumu(sinifId) {
    // Programdan bugünkü saatleri bul (tekil saat bazlı)
    const prog = (APP.programlar[sinifId]||{})[gun]||{};
    const doluSaatler = new Set();
    SAATLER.forEach(saat => {
      const items = prog[saat];
      if (!items) return;
      const arr = Array.isArray(items) ? items : (typeof items==='object'&&!Array.isArray(items) ? [items] : [{ders:String(items)}]);
      if (arr.some(it => it && (it.ders||'').trim())) doluSaatler.add(saat);
    });

    // Eğer programdan saat bulunamazsa, bugün alınan yoklamalardan saatleri çek
    if (doluSaatler.size === 0) {
      const bugunYoklar = Object.values(APP.yoklamalar).filter(y => y.sinif_id==sinifId && y.tarih===tarih && y.saat);
      bugunYoklar.forEach(y => doluSaatler.add(Number(y.saat)));
    }

    const toplam = doluSaatler.size;
    let alinan = 0;
    doluSaatler.forEach(saat => {
      // Seçili tarihe göre yoklama var mı (bugunYoklamaSaat yerine direkt filtre)
      const var_ = Object.values(APP.yoklamalar).some(y => y.sinif_id==sinifId && y.tarih===tarih && y.saat==saat);
      if (var_) alinan++;
    });

    return {toplam, alinan, bekleyen: toplam - alinan};
  }

  // ── Bir öğretmenin seçili günkü tüm ders+yoklama durumu ──
  function ogretmenYoklamaDurumu(ogretmenId, ogretmenAd) {
    const benim = ogretmenSiniflari(ogretmenId);
    const siniflar = APP.siniflar.filter(s => benim.includes(s.id));
    const saatler = []; // [{sinifId, sinifAd, saat, ders, alindi}]

    siniflar.forEach(s => {
      const dersler = ogretmenSinifDersleri(ogretmenAd, s.id, gun);
      dersler.forEach(d => {
        const yok = Object.values(APP.yoklamalar).find(y => y.sinif_id==s.id && y.tarih===tarih && y.saat==d.saat);
        saatler.push({sinifId: s.id, sinifAd: s.ad, saat: d.saat, ders: d.ders, alindi: !!yok});
      });
    });

    const alinan  = saatler.filter(x => x.alindi).length;
    const toplam  = saatler.length;
    return {saatler, alinan, toplam, bekleyen: toplam - alinan};
  }

  // ── İstatistikler — seçili tarihe göre ──
  const tarihYoklar = Object.values(APP.yoklamalar).filter(y => y.tarih===tarih);
  const tarihDetay  = tarihYoklar.flatMap(y => Object.values(APP.yoklamaDetay[y.id]||{}));
  const devamsiz    = tarihDetay.filter(x => x === 'A').length;

  // Sınıfların tamamlanma oranı
  const tamAlindi   = APP.siniflar.filter(s => { const d = sinifYoklamaDurumu(s.id); return d.toplam > 0 && d.bekleyen === 0; }).length;
  const kismiAlindi = APP.siniflar.filter(s => { const d = sinifYoklamaDurumu(s.id); return d.alinan > 0 && d.bekleyen > 0; }).length;

  return `
    <div class="page-header">
      <div class="page-title"><i class="ti ti-layout-dashboard"></i>Genel Bakış</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <button class="btn btn-sm" onclick="APP._ozetTarih=tarihDelta(APP._ozetTarih,-1);refreshMain()" title="Önceki gün"><i class="ti ti-chevron-left"></i></button>
        <div style="position:relative;display:inline-block">
          <input type="date" value="${tarih}" max="${bugunStr}"
            onchange="APP._ozetTarih=this.value;refreshMain()"
            style="padding:5px 10px;border:1.5px solid ${Object.values(APP.yoklamalar).some(y=>y.tarih===tarih)?'var(--green)':'var(--border)'};border-radius:8px;font-size:13px;font-weight:600;color:var(--text);background:var(--bg);cursor:pointer">
          ${Object.values(APP.yoklamalar).some(y=>y.tarih===tarih)
            ? `<span style="position:absolute;top:-4px;right:-4px;width:10px;height:10px;background:var(--green);border-radius:50%;border:2px solid var(--bg)" title="Bu tarihte yoklama alındı"></span>`
            : ''}
        </div>
        <div style="font-size:10px;color:var(--text2);margin-top:2px;text-align:center">
          ${(()=>{
            // Son 7 günde yoklama alınan günleri göster
            const son7 = [];
            for(let i=0;i<7;i++){
              const d=new Date(new Date(bugunStr+'T12:00:00').getTime()-i*86400000);
              const t=d.toISOString().slice(0,10);
              const var2 = Object.values(APP.yoklamalar).some(y=>y.tarih===t);
              if(var2) son7.push(tarihDMY(t));
            }
            return son7.length>0?'<span style="color:var(--green)">📋 Yoklama: '+son7.slice(0,3).join(', ')+(son7.length>3?' +'+( son7.length-3):'')+'</span>':'';
          })()}
        </div>
        <button class="btn btn-sm" onclick="APP._ozetTarih=tarihDelta(APP._ozetTarih,1);refreshMain()" ${tarih>=bugunStr?'disabled':''} title="Sonraki gün"><i class="ti ti-chevron-right"></i></button>
        ${tarih!==bugunStr?`<button class="btn btn-sm" onclick="APP._ozetTarih=null;refreshMain()"><i class="ti ti-calendar-today"></i>Bugün</button>`:''}
      </div>
    </div>
    ${(()=>{
      // SY/ÖY/Tam Gün sayıları — seçili tarihin yoklamaları (tarihYoklar zaten tanımlı)
      const tarihYoklar2 = tarihYoklar;
      let syCount=0, oyCount=0, tamGunCount=0, gecCount=0;
      const ogrIslem = new Set();
      tarihYoklar2.forEach(y => {
        const det = APP.yoklamaDetay[y.id]||{};
        Object.keys(det).forEach(ogrId => {
          // Geç sayısı — her öğrenci için L olan kayıt varsa say (bir kez)
          if (!ogrIslem.has('L_'+ogrId) && det[ogrId]==='L') { gecCount++; ogrIslem.add('L_'+ogrId); }
        });
      });
      tarihYoklar2.forEach(y => {
        const det = APP.yoklamaDetay[y.id]||{};
        Object.keys(det).forEach(ogrId => {
          if (ogrIslem.has(ogrId)) return;
          const ogrSaatler = tarihYoklar2.map(yy => ({saat:Number(yy.saat), d:(APP.yoklamaDetay[yy.id]||{})[ogrId]}));
          const devSaatler = ogrSaatler.filter(x=>x.d==='A').map(x=>x.saat);
          const mevcutSaatler = ogrSaatler.filter(x=>x.d==='P'||x.d==='L');
          const alinanSaatSayisi = ogrSaatler.filter(x=>x.d).length;
          if (devSaatler.length === 0) return;
          const sabahDev = devSaatler.filter(s=>s<=5).length;
          const oglenDev = devSaatler.filter(s=>s>=6).length;
          let tip;
          if (mevcutSaatler.length===0 || devSaatler.length >= Math.ceil(alinanSaatSayisi*2/3)) tip='TG';
          else if (sabahDev>0 && oglenDev===0) tip='SY';
          else if (oglenDev>0 && sabahDev===0) tip='OY';
          else tip='TG';
          ogrIslem.add(ogrId);
          if (tip==='TG') tamGunCount++;
          else if (tip==='SY') syCount++;
          else oyCount++;
        });
      });
      return '<div class="stat-grid" style="grid-template-columns:repeat(auto-fit,minmax(90px,1fr))">'
        + '<div class="stat"><div class="stat-n n-blue">'+APP.siniflar.length+'</div><div class="stat-l">Sınıf</div></div>'
        + '<div class="stat"><div class="stat-n n-purple">'+APP.ogrenciler.length+'</div><div class="stat-l">Öğrenci</div></div>'
        + '<div class="stat"><div class="stat-n n-green">'+tamAlindi+'/'+APP.siniflar.length+'</div><div class="stat-l">Tam Alındı</div></div>'
        + '<div class="stat"><div class="stat-n n-red">'+devamsiz+'</div><div class="stat-l">Devamsız</div></div>'
        + '<div class="stat"><div class="stat-n" style="color:var(--amber)">'+gecCount+'</div><div class="stat-l">Geç</div></div>'
        + '<div class="stat"><div class="stat-n" style="color:#b8860b">'+syCount+'</div><div class="stat-l">SY</div></div>'
        + '<div class="stat"><div class="stat-n" style="color:#7c3aed">'+oyCount+'</div><div class="stat-l">ÖY</div></div>'
        + '<div class="stat"><div class="stat-n" style="color:#dc2626">'+tamGunCount+'</div><div class="stat-l">Tam Gün</div></div>'
        + '</div>';
    })()}

    <!-- Art arda 2 iş günü devamsız — tüm okul -->
    ${(()=>{
      const tumOgrDevOzet = APP.ogrenciler.map(ogr=>{
        const devListesi = ogrDevamsizlikGetir(ogr.id, ogr.sinif_id);
        const ozurlu  = devListesi.filter(v=>v.ozurlu).reduce((s,v)=>s+(v.gun||1),0);
        const ozursuz = devListesi.filter(v=>!v.ozurlu).reduce((s,v)=>s+(v.gun||1),0);
        return {ogr, devListesi, ozurlu, ozursuz, toplam:ozurlu+ozursuz};
      });
      return artArdaKarti(tumOgrDevOzet, tarih);
    })()}

    <!-- Bugünkü Sınıf Durumu -->
    <div class="card">
      <div class="card-title"><i class="ti ti-sun"></i>Bugünkü Durum — Canlı <span class="live-dot"></span></div>
      ${APP.siniflar.map(s => {
        const ogr    = sinifOgr(s.id);
        const dur    = sinifYoklamaDurumu(s.id);
        // Devam % hesabı: tüm alınan yoklamalardaki mevcut öğrenciler
        const tumYoklar = Object.values(APP.yoklamalar).filter(y => y.sinif_id===s.id && y.tarih===tarih);
        let topMv = 0, topToplam = 0;
        tumYoklar.forEach(y => {
          const det = APP.yoklamaDetay[y.id]||{};
          topMv     += Object.values(det).filter(x=>x==='P').length;
          topToplam += Object.keys(det).length;
        });
        const devamPct = topToplam > 0 ? Math.round(topMv / topToplam * 100) : null;

        // Durum rozeti
        let rozetRenk, rozetYazi;
        if (dur.toplam === 0 && tumYoklar.length === 0) { rozetRenk='b-gray'; rozetYazi='Program yok'; }
        else if (dur.toplam > 0 && dur.bekleyen === 0) { rozetRenk='b-green'; rozetYazi='✓ Tam Alındı'; }
        else if (dur.alinan > 0) { rozetRenk='b-amber'; rozetYazi=dur.toplam>0?`${dur.alinan}/${dur.toplam} Alındı`:`${tumYoklar.length} Yoklama`; }
        else if (tumYoklar.length > 0) { rozetRenk='b-blue'; rozetYazi=`${tumYoklar.length} Yoklama`; }
        else { rozetRenk='b-gray'; rozetYazi='Bekliyor'; }

        // ── Öğrenci bazlı devamsızlık hesabı ──
        // Her öğrenci için bugünkü alınan yoklamalara göre devam durumunu hesapla
        const ogrDevamsizlik = [];
        if (tumYoklar.length > 0) {
          const toplamSaatBugün = dur.toplam; // programdaki toplam ders saati sayısı
          const saatBasiYok = {}; // saat → yoklama detay
          tumYoklar.forEach(y => {
            const det = APP.yoklamaDetay[y.id]||{};
            saatBasiYok[y.saat] = det;
          });
          const alinanSaatler = Object.keys(saatBasiYok).map(Number);

          // Import verisi — bugünkü tarihte kayıt varsa ekle
          const tarihImport = {};
          ogr.forEach(o => {
            const impList = (APP.importDevamsizlik||{})[String(o.id)]||[];
            impList.forEach(imp => {
              if(imp.tarih===tarih) tarihImport[o.id] = imp;
            });
          });

          ogr.forEach(o => {
            // Kaç saatte devamsız?
            let devamsizSaatler = [], mevcutSaatler = [];
            alinanSaatler.forEach(saat => {
              const durum = saatBasiYok[saat][o.id];
              if (durum === 'A') devamsizSaatler.push(saat);
              else if (durum === 'P' || durum === 'L') mevcutSaatler.push(saat);
            });

            // Import verisi varsa ve yoklamada yoksa ekle
            if (devamsizSaatler.length === 0 && tarihImport[o.id]) {
              const imp = tarihImport[o.id];
              ogrDevamsizlik.push({
                ogr: o, tip: imp.devTip==='TAM'?'TAM GÜN':imp.devTip==='SY'?'SY':'ÖY',
                devamsizSaatler: [], kaynak: 'import', gun: imp.gun,
              });
              return;
            }

            if (devamsizSaatler.length === 0) return; // devamsız değil

            // 2/3 kuralı: hiçbir derse girmemişse (yoklama alınan tüm saatlerde A)
            const hicGirmedi = mevcutSaatler.length === 0 && alinanSaatler.length > 0;
            // Öğlen sınırı: 5. ders = öğleden öncenin son dersi
            const sabahSaatler = devamsizSaatler.filter(s => s <= 5);
            const oglenSaatler = devamsizSaatler.filter(s => s >= 6);

            let devTip = null;
            if (hicGirmedi) {
              devTip = 'TAM GÜN';
            } else if (devamsizSaatler.length >= Math.ceil(alinanSaatler.length * 2/3)) {
              devTip = 'TAM GÜN';
            } else if (sabahSaatler.length > 0 && oglenSaatler.length === 0) {
              devTip = 'SY'; // Sabah Yarım
            } else if (oglenSaatler.length > 0 && sabahSaatler.length === 0) {
              devTip = 'ÖY'; // Öğleden Sonra Yarım
            } else if (sabahSaatler.length > 0 && oglenSaatler.length > 0) {
              devTip = 'TAM GÜN';
            }

            if (devTip) ogrDevamsizlik.push({o, devTip, devamsizSaatler});
          });
        }

        const tamGunDev = ogrDevamsizlik.filter(x=>x.devTip==='TAM GÜN');
        const syDev     = ogrDevamsizlik.filter(x=>x.devTip==='SY');
        const oyDev     = ogrDevamsizlik.filter(x=>x.devTip==='ÖY');

        return `<div class="row" style="align-items:flex-start">
          <div style="width:48px;min-height:38px;background:var(--blue-bg);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--blue);flex-shrink:0;text-align:center;padding:4px">${s.ad}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600">${s.ad}
              <span style="font-weight:400;color:var(--text2)"> · ${ogr.length} öğrenci</span>
            </div>
            ${(dur.toplam > 0 || tumYoklar.length > 0) ? `
              ${dur.toplam > 0 ? `<div class="pbar" style="margin:4px 0">
                <div class="pbar-fill" style="width:${Math.round(dur.alinan/dur.toplam*100)}%;background:${dur.bekleyen===0?'var(--green)':dur.alinan>0?'var(--amber)':'var(--red)'}"></div>
              </div>` : ''}
              <div style="font-size:11px;color:var(--text2)">${dur.toplam > 0 ? dur.alinan+'/'+dur.toplam+' ders yoklaması' : tumYoklar.length+' yoklama alındı'}${devamPct!==null?' · %'+devamPct+' devam':''}</div>
              ${ogrDevamsizlik.length > 0 ? `<div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:4px">
                ${tamGunDev.length?`<span style="font-size:10px;padding:2px 7px;border-radius:10px;background:var(--red-bg);color:var(--red);font-weight:700">TAM GÜN: ${tamGunDev.map(x=>x.o.ad.split(' ')[0]).join(', ')}</span>`:''}
                ${syDev.length?`<span style="font-size:10px;padding:2px 7px;border-radius:10px;background:var(--amber-bg);color:var(--amber);font-weight:700">SY: ${syDev.map(x=>x.o.ad.split(' ')[0]).join(', ')}</span>`:''}
                ${oyDev.length?`<span style="font-size:10px;padding:2px 7px;border-radius:10px;background:var(--purple-bg);color:var(--purple);font-weight:700">ÖY: ${oyDev.map(x=>x.o.ad.split(' ')[0]).join(', ')}</span>`:''}
              </div>` : ''}
            ` : '<div style="font-size:12px;color:var(--text2);margin-top:3px;display:flex;align-items:center;gap:4px"><i class=\"ti ti-calendar-off\" style=\"font-size:13px\"></i>Bugün bu sınıfın dersi yoktur</div>'}
          </div>
          <span class="badge ${rozetRenk}">${rozetYazi}</span>
        </div>`;
      }).join('')}
    </div>

    <!-- Öğretmen Durumu -->
    <div class="card">
      <div class="card-title"><i class="ti ti-chalkboard"></i>Öğretmen Durumu</div>
      ${[...APP.kullanicilar].filter(u => u.rol==='ogretmen').sort((a,b)=>a.ad.localeCompare(b.ad,'tr')).map(o => {
        const dur = ogretmenYoklamaDurumu(o.id, o.ad);

        // Öğretmenin bugün dersi yoksa gösterme veya gri göster
        if (dur.toplam === 0) return `<div class="row" style="opacity:.5">
          ${ava(o.ad,'#f0f0eb','#999')}
          <div style="flex:1;min-width:0">
            <div style="font-weight:600">${o.ad}</div>
            <div style="font-size:12px;color:var(--text2)">Bugün dersi yok</div>
          </div>
          <span class="badge b-gray">—</span>
        </div>`;

        const pct = Math.round(dur.alinan / dur.toplam * 100);
        const renk = dur.bekleyen===0 ? 'var(--green)' : dur.alinan>0 ? 'var(--amber)' : 'var(--red)';
        const rozetRenk = dur.bekleyen===0 ? 'b-green' : dur.alinan>0 ? 'b-amber' : 'b-red';

        // Sınıf bazlı durum etiketleri — saat sırasına göre sıralı
        const sinifEtiketler = [...dur.saatler].sort((a,b)=>a.saat-b.saat).map(x =>
          `<span style="font-size:10px;padding:2px 6px;border-radius:10px;background:${x.alindi?'var(--green-bg)':'var(--red-bg)'};color:${x.alindi?'var(--green)':'var(--red)'};margin:1px;font-weight:600">${x.saat}. Ders · ${x.sinifAd}${x.ders?` (${x.ders})`:''}</span>`
        ).join('');

        return `<div class="row" style="align-items:flex-start">
          ${ava(o.ad,'#E6F1FB','#0C447C')}
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;margin-bottom:3px">${o.ad}</div>
            <div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:4px">${sinifEtiketler}</div>
            <div class="pbar" style="height:5px;margin-bottom:3px">
              <div class="pbar-fill" style="width:${pct}%;background:${renk}"></div>
            </div>
            <div style="font-size:11px;color:var(--text2)">${dur.alinan}/${dur.toplam} yoklama tamamlandı · %${pct}</div>
          </div>
          <span class="badge ${rozetRenk}" style="flex-shrink:0;margin-left:8px">
            ${dur.bekleyen===0?'✓ Tam':''+dur.alinan+'/'+dur.toplam}
          </span>
        </div>`;
      }).join('')}
    </div>`;
}

function pgSiniflar() {
  if (!APP._sinifTakvim) APP._sinifTakvim = {}; // {sinifId: secilenAy}
  const bugunStr = bugunTarih();
  const gun = bugunGun();

  // Bir sınıfın aktif gün için yoklama durumu — SAAT BAZLI tekil sayım
  function sinifBugunDurum(sinifId) {
    const prog = (APP.programlar[sinifId]||{})[gun]||{};
    const doluSaatler = new Set();
    SAATLER.forEach(saat => {
      const items = prog[saat];
      if (!items) return;
      const arr = Array.isArray(items) ? items : (typeof items==='object' ? [items] : [{ders:String(items)}]);
      if (arr.some(it => it && (it.ders||'').trim())) doluSaatler.add(saat);
    });
    // Fallback: yoklama alınmış saatlerden çek
    if (doluSaatler.size === 0) {
      Object.values(APP.yoklamalar).filter(y=>y.sinif_id==sinifId&&y.tarih===bugunStr&&y.saat)
        .forEach(y=>doluSaatler.add(Number(y.saat)));
    }
    const toplam = doluSaatler.size;
    let alinan = 0;
    doluSaatler.forEach(saat => { if (bugunYoklamaSaat(sinifId, saat)) alinan++; });
    return { toplam, alinan, bekleyen: toplam - alinan };
  }

  // Bir sınıf için öğretmen bazlı yoklama durumu (Fix 5)
  function sinifOgretmenDurum(sinifId) {
    const ogretmenler = APP.kullanicilar.filter(u => u.rol === 'ogretmen');
    return ogretmenler.map(o => {
      const dersler = ogretmenSinifDersleri(o.ad, sinifId, gun);
      if (dersler.length === 0) return null;
      let ali = 0;
      dersler.forEach(d => { if (bugunYoklamaSaat(sinifId, d.saat, o.id)) ali++; });
      const toplam = dersler.length;
      let durum;
      if (ali === 0) durum = 'yok';
      else if (ali < toplam) durum = 'kismi';
      else durum = 'tam';
      return { ad: o.ad, toplam, alinan: ali, durum };
    }).filter(Boolean);
  }

  // Takvim: belirli ay için günlük yoklama var mı
  function sinifTakvimHtml(sinifId) {
    const now = new Date();
    const ayKey = APP._sinifTakvim[sinifId] || `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const [yil, ay] = ayKey.split('-').map(Number);
    const ilkGun = new Date(yil, ay-1, 1);
    const sonGun = new Date(yil, ay, 0);
    const gunSayisi = sonGun.getDate();
    const baslangicHaftaGunu = ilkGun.getDay(); // 0=Paz

    // Bu ay+sınıf için yoklamaları topla: {tarih: {alinan, toplam}}
    const ayYoklamalari = {};
    Object.values(APP.yoklamalar).forEach(y => {
      if (y.sinif_id != sinifId) return;
      if (!y.tarih.startsWith(ayKey)) return;
      if (!ayYoklamalari[y.tarih]) ayYoklamalari[y.tarih] = {alinan: 0, toplam: 0};
      ayYoklamalari[y.tarih].toplam++;
      ayYoklamalari[y.tarih].alinan++;
    });

    const ayAdlari = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
    const oncekiAy = ay === 1 ? `${yil-1}-12` : `${yil}-${String(ay-1).padStart(2,'0')}`;
    const sonrakiAy = ay === 12 ? `${yil+1}-01` : `${yil}-${String(ay+1).padStart(2,'0')}`;

    let html = `<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <button class="btn btn-sm" onclick="APP._sinifTakvim[${sinifId}]='${oncekiAy}';refreshMain()"><i class="ti ti-chevron-left"></i></button>
        <span style="font-size:13px;font-weight:700">${ayAdlari[ay-1]} ${yil}</span>
        <button class="btn btn-sm" onclick="APP._sinifTakvim[${sinifId}]='${sonrakiAy}';refreshMain()"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center">
        ${['P','Pt','S','Ç','Pe','C','Ct'].map(g=>`<div style="font-size:10px;font-weight:700;color:var(--text2);padding:2px">${g}</div>`).join('')}`;

    // Başlangıç boşlukları (Pazar=0)
    for (let i = 0; i < baslangicHaftaGunu; i++) {
      html += `<div></div>`;
    }

    for (let d = 1; d <= gunSayisi; d++) {
      const tarihStr = `${ayKey}-${String(d).padStart(2,'0')}`;
      const tarihObj = new Date(yil, ay-1, d);
      const haftaGunu = tarihObj.getDay(); // 0=Paz, 6=Cmt
      const isWeekend = haftaGunu === 0 || haftaGunu === 6;
      const isToday = tarihStr === bugunStr;
      const yok = ayYoklamalari[tarihStr];

      let bg = 'transparent', color = isWeekend ? '#bbb' : 'var(--text2)', border = 'none', fontW = '400';
      if (yok) {
        bg = 'var(--green-bg)'; color = 'var(--green)'; fontW = '700';
        border = '1px solid #aad67c';
      }
      if (isToday) { border = '2px solid var(--blue)'; color = yok ? 'var(--green)' : 'var(--blue)'; fontW = '700'; }

      html += `<div style="padding:4px 2px;border-radius:6px;font-size:11px;background:${bg};color:${color};border:${border};font-weight:${fontW};cursor:${yok?'pointer':'default'}"
        ${yok ? `title="${tarihStr}: ${yok.alinan} yoklama"` : ''}>${d}</div>`;
    }

    html += `</div>
      <div style="margin-top:8px;display:flex;gap:10px;font-size:11px;color:var(--text2)">
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:var(--green-bg);border:1px solid #aad67c;margin-right:3px"></span>Yoklama alındı</span>
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;border:2px solid var(--blue);margin-right:3px"></span>Bugün</span>
      </div>
    </div>`;
    return html;
  }

  return `<div class="page-header">
    <div class="page-title"><i class="ti ti-door"></i>Sınıf Yönetimi</div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-danger btn-sm" onclick="tumSiniflariSil()"><i class="ti ti-trash"></i>Tüm Sınıfları Sil</button>
      <button class="btn btn-primary btn-sm" onclick="om('sinifEkle')"><i class="ti ti-plus"></i>Sınıf Ekle</button>
    </div>
  </div>
  ${APP.siniflar.map(s=>{
    const ogr = sinifOgr(s.id);
    const ogrs = sinifOgretmenler(s.id);
    const dur = sinifBugunDurum(s.id);
    const ogretmenDurumlari = sinifOgretmenDurum(s.id); // Fix 5

    // Renk kodu: yoklama durumuna göre
    let cardBg, cardBorder, rozetRenk, rozetYazi, durumIkonu;
    if (dur.toplam === 0) {
      cardBg='var(--bg)'; cardBorder='var(--border)';
      rozetRenk='b-gray'; rozetYazi='Ders yok'; durumIkonu='ti-calendar-off';
    } else if (dur.bekleyen === 0) {
      cardBg='var(--green-bg)'; cardBorder='#aad67c';
      rozetRenk='b-green'; rozetYazi='✓ Tam Alındı'; durumIkonu='ti-circle-check';
    } else if (dur.alinan > 0) {
      cardBg='var(--amber-bg)'; cardBorder='#f5c97a';
      rozetRenk='b-amber'; rozetYazi=`${dur.alinan}/${dur.toplam} Alındı`; durumIkonu='ti-clock';
    } else {
      cardBg='var(--red-bg)'; cardBorder='#f5a0a0';
      rozetRenk='b-red'; rozetYazi='Yoklama Yok'; durumIkonu='ti-alert-circle';
    }

    const takvimAcik = APP._sinifTakvim && APP._sinifTakvim['_acik_'+s.id];

    // Fix 5: öğretmen renkli etiketler
    const ogretmenRenkliEtiket = o => {
      const od = ogretmenDurumlari.find(x=>x.ad===o.ad);
      if (!od) return `<span class="tag" style="opacity:.6"><i class="ti ti-chalkboard" style="font-size:11px"></i>${o.ad}</span>`;
      const [bg,clr,ico] = od.durum==='tam'
        ? ['var(--green-bg)','var(--green)','ti-circle-check']
        : od.durum==='kismi'
        ? ['var(--amber-bg)','var(--amber)','ti-clock']
        : ['var(--red-bg)','var(--red)','ti-alert-circle'];
      return `<span class="tag" style="background:${bg};color:${clr};font-weight:600"><i class="ti ${ico}" style="font-size:11px"></i>${o.ad} <span style="font-weight:400;font-size:10px">${od.alinan}/${od.toplam}</span></span>`;
    };

    return `<div class="card" style="background:${cardBg};border-color:${cardBorder}">
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start">
        <div style="width:52px;height:52px;background:${dur.toplam===0?'var(--blue-bg)':dur.bekleyen===0?'var(--green-bg)':dur.alinan>0?'var(--amber-bg)':'var(--red-bg)'};
          color:${dur.toplam===0?'var(--blue)':dur.bekleyen===0?'var(--green)':dur.alinan>0?'var(--amber)':'var(--red)'};
          border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0">${s.ad}</div>
        <div style="flex:1;min-width:120px">
          <div style="font-size:16px;font-weight:700">${s.ad} Sınıfı</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">${ogr.length} öğrenci</div>
          <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:2px">
            ${ogrs.map(ogretmenRenkliEtiket).join('')||'<span style="font-size:12px;color:#bbb">Öğretmen atanmamış</span>'}
          </div>
          ${dur.toplam > 0 ? `
            <div class="pbar" style="margin-top:8px">
              <div class="pbar-fill" style="width:${Math.round(dur.alinan/dur.toplam*100)}%;background:${dur.bekleyen===0?'var(--green)':dur.alinan>0?'var(--amber)':'var(--red)'}"></div>
            </div>
            <div style="font-size:11px;color:var(--text2);margin-top:3px">${dur.alinan}/${dur.toplam} ders saati yoklaması alındı</div>
          ` : '<div style="font-size:11px;color:var(--text2);margin-top:6px;display:flex;align-items:center;gap:4px"><i class=\"ti ti-calendar-off\" style=\"font-size:12px\"></i>Bugün bu sınıfın dersi yoktur</div>'}
          ${takvimAcik ? sinifTakvimHtml(s.id) : ''}
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:flex-start">
          <span class="badge ${rozetRenk}" style="display:flex;align-items:center;gap:4px"><i class="ti ${durumIkonu}" style="font-size:11px"></i>${rozetYazi}</span>
          <div style="display:flex;gap:4px;flex-wrap:wrap">
            <button class="btn btn-sm${takvimAcik?' btn-primary':''}" onclick="APP._sinifTakvim['_acik_${s.id}']=${!takvimAcik};refreshMain()" title="Yoklama Takvimi">
              <i class="ti ti-calendar"></i>${takvimAcik?'Kapat':'Takvim'}
            </button>
            <button class="btn btn-sm" onclick="om('sinifOgretmeni',${s.id})"><i class="ti ti-chalkboard"></i>S.Öğrt.</button>
            <button class="btn btn-sm" onclick="om('sinifAtama',${s.id})"><i class="ti ti-link"></i>Atama</button>
            <button class="btn btn-sm" onclick="om('sinifDetay',${s.id})"><i class="ti ti-eye"></i>Detay</button>
            <button class="btn btn-sm" onclick="om('sinifDuzenle',${s.id})"><i class="ti ti-edit"></i></button>
            <button class="btn btn-sm btn-danger" onclick="sinifSil(${s.id})"><i class="ti ti-trash"></i></button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('')}`;
}

    ${liste.length ? liste.map((o,i)=>{

      const importYuklendi = Object.keys(APP.importDevamsizlik||{}).length > 0;
      return `<tr>

        <button class="btn btn-sm" onclick="om('ogrVeliDuzenle',${o.id})" title="İletişim"><i class="ti ti-phone"></i></button>
        <button class="btn btn-sm" onclick="om('ogrMazeret',${o.id})" title="Mazeret"><i class="ti ti-file-certificate"></i></button>

  </table></div></div>`;
}

      <button class="btn btn-sm btn-danger" onclick="progSil(${APP.progSinif||0})"><i class="ti ti-trash"></i>Programı Temizle</button>
    </div>
    <div class="tbl-wrap" style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table class="prog-tbl">
      <tr>
        <th style="width:90px">Saat</th>
        ${GUNLER.map(g=>`<th style="${g===bugun?'color:var(--blue);background:var(--blue-bg)':''}">

        const label = getSaatLabels(refGun)[s] || '';
        return `<tr>
          <td style="font-weight:700;color:var(--text2);background:var(--bg2);text-align:center;line-height:1.3;white-space:nowrap">
            <div style="font-size:13px">${s}.</div>
            <div style="font-size:10px;color:#aaa;font-weight:400">${label}</div>

            const hucre = (prog[g]||{})[s];

            🍽 ÖĞLE ARASI (${(()=>{const s5=aralik.find(x=>x.s===5),s6=aralik.find(x=>x.s===6);return(s5&&s6)?s5.bit+' – '+s6.bas:'12:30 – 13:20';})()})

            ${sa.pasif?'disabled style="width:90px;padding:5px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;opacity:.4"':''}

          <td><span class="ders-chip" style="background:${r[0]};color:${r[1]}">${d.ad}</span></td>
          <td><button class="btn btn-sm btn-danger" onclick="dersSil(${d.id})"><i class="ti ti-trash"></i></button></td>
        </tr>`;}).join('')}
    </table></div>
  </div>`;
}

window.toggleSaatAktif = function(s) {
  const gun = APP._saatGun || 'Pazartesi';
  if (!APP._saatAralikGunluk) return;
  const aralik = APP._saatAralikGunluk[gun];
  const sa = aralik.find(x => x.s === s);
  if (sa) sa.pasif = !sa.pasif;
  refreshMain();
};

window.saatTumGunlereUygula = function() {
  const gun = APP._saatGun || 'Pazartesi';
  // Önce kaydet (mevcut input değerlerini güncelle)
  const aralik = APP._saatAralikGunluk[gun];
  for (const sa of aralik) {
    const bas = ($(`saat-bas-${sa.s}`)||{}).value?.trim();
    const bit = ($(`saat-bit-${sa.s}`)||{}).value?.trim();
    if (bas) sa.bas = bas;
    if (bit) sa.bit = bit;
  }
  // Şimdiki günü diğer tüm günlere kopyala
  GUNLER.forEach(g => {
    if (g !== gun) {
      APP._saatAralikGunluk[g] = aralik.map(x => ({...x}));
    }
  });
  showToast(`✅ ${gun} saatleri tüm günlere kopyalandı`, 'success');
  refreshMain();
};

window.saatleriKaydet = function() {
  const gun = APP._saatGun || 'Pazartesi';
  if (!APP._saatAralikGunluk) return;
  const aralik = APP._saatAralikGunluk[gun];
  const yeni = [];
  for (const sa of aralik) {
    const bas = ($(`saat-bas-${sa.s}`)||{}).value?.trim() || sa.bas;
    const bit = ($(`saat-bit-${sa.s}`)||{}).value?.trim() || sa.bit;
    if (!sa.pasif) {
      if (!/^\d{2}:\d{2}$/.test(bas) || !/^\d{2}:\d{2}$/.test(bit))
        return showToast(`${sa.s}. saat formatı hatalı (SS:DD olmalı)`, 'error');
    }
    yeni.push({s: sa.s, bas, bit, pasif: !!sa.pasif});
  }
  APP._saatAralikGunluk[gun] = yeni;

  // Genel SAAT_ARALIK'ı bugünün gününe göre (veya Pazartesi) güncelle
  const bugunGunAdi = bugunGun();
  const referansGun = APP._saatAralikGunluk[bugunGunAdi] || APP._saatAralikGunluk['Pazartesi'];
  APP._saatAralik = referansGun.filter(x => !x.pasif);
  SAAT_ARALIK.length = 0;
  APP._saatAralik.forEach(x => SAAT_ARALIK.push(x));

  // localStorage'a kaydet
  try { localStorage.setItem('okulYokla_saatlerGunluk', JSON.stringify(APP._saatAralikGunluk)); } catch(e) {}
  showToast(`✅ ${gun} ders saatleri kaydedildi`);
  refreshMain();
};


function pgTumYoklamalar() {
  const ykler = Object.values(APP.yoklamalar).sort((a,b)=>b.tarih.localeCompare(a.tarih));
  return `<div class="page-header">
    <div class="page-title"><i class="ti ti-clipboard-list"></i>Tüm Yoklamalar</div>
  </div>
  ${ykler.length===0 ? `<div class="empty-state"><i class="ti ti-clipboard-x"></i>Henüz yoklama alınmadı.</div>` :
  ykler.map(y=>{
    const s = APP.siniflar.find(x=>x.id===y.sinif_id);if(!s)return '';
    const ogr = sinifOgr(s.id);
    const detay = APP.yoklamaDetay[y.id]||{};
    const mv=Object.values(detay).filter(x=>x==='P').length;
    const ab=Object.values(detay).filter(x=>x==='A').length;
    const lt=Object.values(detay).filter(x=>x==='L').length;
    const pct=ogr.length?Math.round(mv/ogr.length*100):0;
    const ogrArr = ogr.filter(o=>detay[o.id]==='A');
    const kilitli = !!y.kilitli;
    return `<div class="card" style="${kilitli?'border-color:#f5a0a0;background:var(--red-bg)':''}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
        <span style="font-size:15px;font-weight:700">${s.ad} Sınıfı</span>
        <span class="badge b-gray">${tarihTam(y.tarih)}${y.saat ? ` · ${y.saat}. Ders` : ''}</span>
        ${kilitli?`<span class="badge b-red"><i class="ti ti-lock" style="font-size:10px"></i> Kilitli</span>`:''}
        <span class="badge b-green" style="margin-left:auto">%${pct} devam</span>
        <button class="btn btn-sm ${kilitli?'btn-success':'btn-danger'}" onclick="yoklamaKilitle(${y.id},${!kilitli})">
          <i class="ti ti-${kilitli?'lock-open':'lock'}"></i>${kilitli?'Kilidi Kaldır':'Kilitle'}
        </button>
      </div>
      <div class="sumbar" style="grid-template-columns:repeat(3,1fr)">
        <div class="sum-item" style="background:var(--green-bg);color:var(--green)"><span class="sum-n">${mv}</span>Mevcut</div>
        <div class="sum-item" style="background:var(--red-bg);color:var(--red)"><span class="sum-n">${ab}</span>Devamsız</div>
        <div class="sum-item" style="background:var(--amber-bg);color:var(--amber)"><span class="sum-n">${lt}</span>Geç</div>
      </div>
      ${ogrArr.length ? `<div style="font-size:12px;color:var(--red);margin-top:4px"><b>Devamsız:</b> ${ogrArr.map(o=>o.ad).join(', ')}</div>` : ''}
    </div>`;
  }).join('')}`;
}

// ══════════════════════════════════════════════
//  DEVAMSIZLIk YARDIMCI — yoklama + import birleşik

// Bir öğrencinin tüm devamsızlıklarını getir (yoklama + excel import birleşik)
// Döndürür: [{tarih, devTip, saatler, maz, kaynak, ozurlu}]
function ogrDevamsizlikGetir(ogrId, sinifId) {
  // ogrId hem number hem string olabilir — her iki formatta bak
  const ogrIdStr = String(ogrId);
  const ogrIdNum = Number(ogrId);
  const map = {}; // tarih → entry
  const kural = getTurKural();

  // Mazeret yardımcısı — hem number hem string key dene
  const getMaz = (tarih) =>
    (APP.mazeretler[tarih]||{})[ogrIdNum] ||
    (APP.mazeretler[tarih]||{})[ogrIdStr] || null;

  // 1) Yoklama_detay'dan gelen gerçek yoklamalar
  const tumYoklar = Object.values(APP.yoklamalar).filter(y=>y.sinif_id==sinifId);
  tumYoklar.forEach(y=>{
    // yoklamaDetay key'i hem string hem number olabilir
    const det = APP.yoklamaDetay[y.id]||{};
    const d = det[ogrIdNum] || det[ogrIdStr];
    if(d==='A'){
      if(!map[y.tarih]) map[y.tarih]={tarih:y.tarih, saatler:[], kaynak:'yoklama'};
      map[y.tarih].saatler.push(Number(y.saat));
    }
  });
  // devTip hesapla
  Object.values(map).forEach(info=>{
    const sab=info.saatler.filter(s=>s<=5).length, ogl=info.saatler.filter(s=>s>=6).length;
    if(sab>0&&ogl>0) info.devTip='Tam Gün';
    else if(sab>0) info.devTip='Sabah (SY)';
    else info.devTip='Öğleden Sonra (ÖY)';
    info.maz = getMaz(info.tarih);
    info.ozurlu = !!(info.maz && info.maz.tur && info.maz.tur!=='__ozursuz__');
  });

  // 2) Excel import'tan gelen devamsızlıklar
  // Her iki key formatında da ara
  const importListesi = [
    ...((APP.importDevamsizlik||{})[ogrIdStr]||[]),
    ...((APP.importDevamsizlik||{})[ogrIdNum]||[]),
  ];
  // Tekrar eden tarihleri filtrele
  const goruldu = new Set(Object.keys(map));
  importListesi.forEach(imp=>{
    if(goruldu.has(imp.tarih)) return; // yoklamada zaten var
    goruldu.add(imp.tarih);
    const maz = getMaz(imp.tarih);
    // say:false olan türler devamsızlığa dahil değil
    const k = kural[imp.kaynak||''];
    if (k && k.say === false) return;
    map[imp.tarih] = {
      tarih: imp.tarih,
      saatler: [],
      devTip: imp.devTip==='OY'?'Öğleden Sonra (ÖY)':imp.devTip==='SY'?'Sabah (SY)':'Tam Gün',
      kaynak: 'import',
      gun: imp.gun,
      maz,
      ozurlu: imp.ozurlu || !!(maz && maz.tur && maz.tur!=='__ozursuz__'),
    };
  });

  return Object.values(map).sort((a,b)=>b.tarih.localeCompare(a.tarih));
}

// Öğretmenin sınıf öğretmeni olduğu sınıfı bul
// Art arda 2 iş günü devamsız öğrenci kartı (hem sınıfım hem yönetici için)
function artArdaKarti(ogrDevOzet, secilenTarih) {
  const oncekiIsGunu = t => {
    let d = new Date(t+'T12:00:00');
    do { d = new Date(d.getTime()-86400000); } while(d.getDay()===0||d.getDay()===6);
    return d.toISOString().slice(0,10);
  };
  const bugun   = secilenTarih || bugunTarih();
  const dun2    = oncekiIsGunu(bugun); // seçilen tarihten önceki iş günü

  // Bugün VE dün (seçilen tarih + önceki iş günü) devamsız olanlar
  const artArdaGelmeyen = ogrDevOzet.filter(({devListesi})=>{
    const tarihler = new Set(devListesi.map(v=>v.tarih));
    return tarihler.has(bugun) && tarihler.has(dun2);
  });

  if(artArdaGelmeyen.length===0) return `<div class="card" style="margin-bottom:14px;background:var(--green-bg);border-color:#aad67c">
    <div class="card-title"><i class="ti ti-calendar-check" style="color:var(--green)"></i>Art Arda 2 İş Günü Devamsız</div>
    <div style="font-size:13px;color:var(--green);font-weight:600">✅ Yok — ${tarihDMY(dun2)} ve ${tarihDMY(bugun)} tarihlerinde art arda devamsız öğrenci yok.</div>
  </div>`;

  return `<div class="card" style="margin-bottom:14px;background:var(--amber-bg);border-color:#f5c97a">
    <div class="card-title" style="flex-wrap:wrap;gap:6px">
      <span><i class="ti ti-calendar-exclamation" style="color:var(--amber)"></i>Art Arda 2 İş Günü Devamsız</span>
      <span class="badge b-amber">${artArdaGelmeyen.length} öğrenci</span>
    </div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:8px">${tarihDMY(dun2)} ve ${tarihDMY(bugun)} tarihlerinde devamsız</div>
    ${artArdaGelmeyen.map(({ogr,ozursuz,ozurlu,toplam})=>{
      const tel=(ogr.veli_tel||'').replace(/[^0-9]/g,'');
      let wt=tel; if(wt.startsWith('0')) wt='90'+wt.slice(1); else if(!wt.startsWith('90')&&wt) wt='90'+wt;
      const telLink = tel ? `tel:+9${tel.startsWith('0')?tel:'0'+tel}` : '';
      const msg=encodeURIComponent('Sayın '+(ogr.veli_ad||'Veli')+', '+ogr.ad+' son 2 iş günüdür devamsız görünmektedir. Bilginize.');
      return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(0,0,0,.05)">
        ${ava(ogr.ad,'var(--amber-bg)','var(--amber)',28)}
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${ogr.ad} <span style="font-size:11px;font-weight:400;color:var(--text2)">No:${ogr.no||'—'}</span></div>
          <div style="font-size:11px;color:var(--text2)">Özürsüz: ${ozursuz} · Özürlü: ${ozurlu} · Toplam: ${toplam}</div>
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0">
          ${telLink?`<a href="${telLink}" style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;background:var(--blue-bg);color:var(--blue);border-radius:6px;text-decoration:none" title="Veli Ara"><i class="ti ti-phone" style="font-size:14px"></i></a>`:''}
          ${wt?`<a href="https://wa.me/${wt}?text=${msg}" target="_blank" style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;background:#dcfce7;color:#16a34a;border-radius:6px;text-decoration:none" title="WhatsApp"><i class="ti ti-brand-whatsapp" style="font-size:14px"></i></a>`:''}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function sinifOgretmenlikSinifi(ogretmenId) {
  const ogr = APP.kullanicilar.find(u=>u.id==ogretmenId);
  if (!ogr) return null;
  const il = APP.iletisim||{};
  // iletisim'de adı eşleşen sınıfı bul
  for (const s of APP.siniflar) {
    if (il['sinif_ogr_'+s.id] === ogr.ad) return s;
  }
  return null;
}

function pgSinifOgretmeniDevam() {
  const u = APP.user;
  const sinif = sinifOgretmenlikSinifi(u.id);
  if (!sinif) return `<div class="empty-state" style="padding:40px 20px">
    <i class="ti ti-chalkboard-off" style="font-size:48px;color:var(--border);display:block;margin-bottom:12px"></i>
    <div style="font-size:16px;font-weight:600;color:var(--text2)">Sınıf öğretmenliğiniz yok</div>
    <div style="font-size:13px;color:var(--text2);margin-top:6px">Yönetici sizi bir sınıfa atadığında burada devamsızlık bilgileri görünecek.</div>
  </div>`;

  const OZURSUZ_HAK = Number((APP.iletisim||{}).ozursuz_hak)||10;
  const TOPLAM_HAK  = Number((APP.iletisim||{}).toplam_hak)||30;
  const MAZ_ICONS = {sevk:'🚑',izin:'📅',rapor:'📋',faaliyet:'⭐',diger:'📌'};
  const MAZ_TUR   = {sevk:'Sevk',izin:'İzin',rapor:'Rapor',faaliyet:'Faaliyet',diger:'Diğer'};
  const GUNLER = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];

  const ogrenciler = APP.ogrenciler.filter(o=>o.sinif_id==sinif.id);
  // Her öğrenci için devamsızlık özeti (yoklama + import birleşik)
  const ogrDevOzet = ogrenciler.map(ogr => {
    const devListesi = ogrDevamsizlikGetir(ogr.id, sinif.id);
    const ozurlu  = devListesi.filter(v=>v.ozurlu).reduce((s,v)=>s+(v.gun||1),0);
    const ozursuz = devListesi.filter(v=>!v.ozurlu).reduce((s,v)=>s+(v.gun||1),0);
    // Eski format uyumu için gunler array
    const gunler = devListesi.map(v=>[v.tarih, v]);
    return {ogr, gunler, devListesi, ozurlu, ozursuz, toplam:ozurlu+ozursuz};
  }).sort((a,b)=>b.ozursuz-a.ozursuz||b.toplam-a.toplam);

  const devamsizlar   = ogrDevOzet.filter(x=>x.toplam>0);
  const hakkiDolanlar = ogrDevOzet.filter(x=>x.ozursuz>=OZURSUZ_HAK||x.toplam>=TOPLAM_HAK);

  // ── Bugünkü canlı yoklama ──
  const bugun    = bugunTarih();
  const gun      = bugunGun();
  const simdiki  = simdikiSaat();
  const bugunYoklar = Object.values(APP.yoklamalar).filter(y=>y.sinif_id==sinif.id&&y.tarih===bugun);
  const alinanSaatler = [...new Set(bugunYoklar.map(y=>Number(y.saat)))].sort((a,b)=>a-b);
  const prog = (APP.programlar[sinif.id]||{})[gun]||{};
  const programSaatler = [];
  SAATLER.forEach(s=>{
    const it=prog[s]; if(!it) return;
    const arr=Array.isArray(it)?it:(typeof it==='object'?[it]:[{ders:String(it)}]);
    if(arr.some(x=>x&&(x.ders||'').trim())) programSaatler.push(s);
  });
  // Saat bazlı öğrenci durum haritası — tüm saatleri tara
  const ogrSaatMap = {}; // {ogrId: {saat: durum}}
  alinanSaatler.forEach(saat => {
    const yList = bugunYoklar.filter(y => y.saat == saat);
    yList.forEach(y => {
      const det = APP.yoklamaDetay[y.id]||{};
      ogrenciler.forEach(o => {
        if (!ogrSaatMap[o.id]) ogrSaatMap[o.id] = {};
        if (det[o.id]) ogrSaatMap[o.id][saat] = det[o.id];
      });
    });
  });
  // Herhangi bir derste A/L olan öğrencileri say
  const canliSay = {P:0, A:0, L:0};
  const canliDetay = {};
  ogrenciler.forEach(o => {
    const durumlar = Object.values(ogrSaatMap[o.id]||{});
    if (durumlar.includes('A'))      { canliSay.A++; canliDetay[o.id]='A'; }
    else if (durumlar.includes('L')) { canliSay.L++; canliDetay[o.id]='L'; }
    else if (durumlar.includes('P')) { canliSay.P++; canliDetay[o.id]='P'; }
  });


  return `<div class="page-header">
    <div class="page-title"><i class="ti ti-users-group"></i>${sinif.ad} — Sınıfım</div>
    <div style="display:flex;align-items:center;gap:5px"><span class="live-dot"></span><span style="font-size:12px;color:var(--green);font-weight:600">Canlı</span></div>
  </div>

  <!-- BUGÜNKÜ CANLI YOKLAMA -->
  <div class="card" style="margin-bottom:14px;${alinanSaatler.length>0?'background:var(--green-bg);border-color:#aad67c':''}">
    <div class="card-title" style="justify-content:space-between">
      <span><i class="ti ti-clipboard-check"></i>Bugün — ${tarihTam(bugun)}</span>
      ${simdiki?`<span class="badge b-blue">⭐ ${simdiki}. Ders Aktif</span>`:'<span class="badge b-gray">Aktif ders yok</span>'}
    </div>
    ${alinanSaatler.length===0
      ? `<div style="font-size:13px;color:var(--text2)"><i class="ti ti-clock"></i> Henüz yoklama alınmadı.</div>`
      : `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
          ${(programSaatler.length?programSaatler:alinanSaatler).map(saat=>{
            const alinan=bugunYoklar.find(y=>y.saat==saat);
            return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px">
              <div style="width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;
                background:${alinan?'var(--green)':saat==simdiki?'var(--blue)':'var(--border)'};
                color:${alinan||saat==simdiki?'#fff':'var(--text2)'}">
                ${saat}
              </div>
              <span style="font-size:9px;color:var(--text2)">${alinan?'✓':saat==simdiki?'▶':'—'}</span>
            </div>`;
          }).join('')}
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px">
          <div style="background:var(--green-bg);border-radius:8px;padding:8px;text-align:center">
            <div style="font-size:20px;font-weight:800;color:var(--green)">${canliSay.P||0}</div>
            <div style="font-size:11px;color:var(--green)">Mevcut</div>
          </div>
          <div style="background:var(--red-bg);border-radius:8px;padding:8px;text-align:center">
            <div style="font-size:20px;font-weight:800;color:var(--red)">${canliSay.A||0}</div>
            <div style="font-size:11px;color:var(--red)">Devamsız</div>
          </div>
          <div style="background:var(--amber-bg);border-radius:8px;padding:8px;text-align:center">
            <div style="font-size:20px;font-weight:800;color:var(--amber)">${canliSay.L||0}</div>
            <div style="font-size:11px;color:var(--amber)">Geç</div>
          </div>
        </div>
        ${(canliSay.A||0)>0||(canliSay.L||0)>0 ? `<div style="border-top:1px solid var(--border);padding-top:8px">
          ${ogrenciler.filter(o=>canliDetay[o.id]==='A'||canliDetay[o.id]==='L').map(o=>{
            const ogrSaatDetay = alinanSaatler.map(saat=>{
              const d = (ogrSaatMap[o.id]||{})[saat];
              return (d==='A'||d==='L')?{saat,durum:d}:null;
            }).filter(Boolean);
            // İletişim
            const tel=(o.veli_tel||'').replace(/[^0-9]/g,'');
            const telLink=tel?`tel:+9${tel.startsWith('0')?tel:'0'+tel}`:'';
            let waTel=tel; if(waTel.startsWith('0')) waTel='90'+waTel.slice(1); else if(!waTel.startsWith('90')) waTel='90'+waTel;
            const yok  = ogrSaatDetay.filter(x=>x.durum==='A').map(x=>x.saat);
            const gec  = ogrSaatDetay.filter(x=>x.durum==='L').map(x=>x.saat);
            const tamGunMu = yok.length >= alinanSaatler.length && alinanSaatler.length > 0;
            let devBilgi = tamGunMu ? 'Tam gün yok yazılmıştır' : '';
            if (!tamGunMu && yok.length > 0)  devBilgi += yok.join('. - ')+'.'+(yok.length>0?'':'')+'Ders yok yazılmıştır';
            if (!tamGunMu && gec.length > 0)  devBilgi += (devBilgi?' | ':'')+gec.join('. - ')+'.Ders geç girişi yapılmıştır';
            const waMsg = encodeURIComponent('Sayın Velimiz,\n'+o.ad+' adlı öğrencimiz bugünkü derse katılamamıştır.\nDevamsızlık: '+devBilgi+'\nBilginize saygılarımızla.');
            return `<div style="padding:6px 0;border-bottom:1px solid rgba(0,0,0,.05)">

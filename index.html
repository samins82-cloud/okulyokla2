                ${tel ? `
                <a href="${telLink}" style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;background:var(--blue-bg);color:var(--blue);border-radius:6px;text-decoration:none;flex-shrink:0" title="Veli Ara"><i class="ti ti-phone" style="font-size:14px"></i></a>
                <a href="https://wa.me/${waTel}?text=${waMsg}" target="_blank" style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;background:#dcfce7;color:#16a34a;border-radius:6px;text-decoration:none;flex-shrink:0" title="WhatsApp"><i class="ti ti-brand-whatsapp" style="font-size:14px"></i></a>
                ` : ''}
              </div>
              <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;padding-left:36px">
                ${ogrSaatDetay.map(x=>`<span style="font-size:10px;padding:2px 6px;border-radius:6px;font-weight:700;
                  background:${x.durum==='A'?'var(--red-bg)':'var(--amber-bg)'};
                  color:${x.durum==='A'?'var(--red)':'var(--amber)'}">${x.saat}.ders ${x.durum==='A'?'Yok':'Geç'}</span>`).join('')}
              </div>
            </div>`;
          }).join('')}
        </div>` : alinanSaatler.length>0?`<div style="font-size:12px;color:var(--green);font-weight:600">✅ Tüm öğrenciler mevcut</div>`:''}
      `
    }
  </div>

  ${hakkiDolanlar.length ? `<div class="notif n-error" style="margin-bottom:14px">
    <i class="ti ti-alert-triangle"></i>
    <div><b>${hakkiDolanlar.length} öğrencinin devamsızlık hakkı dolmak üzere veya doldu:</b>
    ${hakkiDolanlar.map(x=>x.ogr.ad).join(', ')}</div>
  </div>` : ''}

  ${(()=>{
    const sinifTekrari = ogrDevOzet.filter(x=>x.toplam>=TOPLAM_HAK);
    const ozursuzAsan  = ogrDevOzet.filter(x=>x.ozursuz>=OZURSUZ_HAK);
    return `<div class="stat-grid" style="margin-bottom:14px;grid-template-columns:repeat(2,1fr)">
      <div class="stat"><div class="stat-n n-blue">${ogrenciler.length}</div><div class="stat-l">Toplam Öğrenci</div></div>
      <div class="stat"><div class="stat-n" style="color:var(--amber)">${devamsizlar.length}</div><div class="stat-l">Devamsız Olan</div></div>
      <div class="stat" style="background:var(--red-bg)"><div class="stat-n" style="color:var(--red)">${ozursuzAsan.length}</div><div class="stat-l" style="color:var(--red)">10 Özürsüz Aşan</div></div>
      <div class="stat" style="background:var(--red-bg)"><div class="stat-n" style="color:var(--red)">${sinifTekrari.length}</div><div class="stat-l" style="color:var(--red)">Sınıf Tekrarı Riski</div></div>
    </div>
    ${sinifTekrari.length>0?`<div class="notif n-error" style="margin-bottom:14px"><i class="ti ti-alert-triangle"></i><div><b>30+ gün devamsız (sınıf tekrarı riski):</b> ${sinifTekrari.map(x=>x.ogr.ad).join(', ')}</div></div>`:''}
    ${ozursuzAsan.length>0?`<div class="notif n-error" style="margin-bottom:14px"><i class="ti ti-alert-triangle"></i><div><b>10 özürsüz günü aşan:</b> ${ozursuzAsan.map(x=>x.ogr.ad).join(', ')}</div></div>`:''}`;
  })()}

  <!-- Bugün ve dün gelmeyen öğrenciler -->
  ${artArdaKarti(ogrDevOzet)}

  <div class="card">
    <div class="card-title"><i class="ti ti-users"></i>Öğrenci Devamsızlık Özeti</div>
    ${ogrDevOzet.map(({ogr, gunler, devListesi, ozurlu, ozursuz, toplam})=>{
      const veliTel = (ogr.veli_tel||'').replace(/[^0-9]/g,'');
      const telLink = veliTel ? `tel:+9${veliTel.startsWith('0')?veliTel:'0'+veliTel}` : '';
      let waTel = veliTel;
      if(waTel.startsWith('0')) waTel='90'+waTel.slice(1); else if(!waTel.startsWith('90')) waTel='90'+waTel;
      // WA mesajı — devamsızlık özeti
      // Ayrıntılı devamsızlık satırları
      const devAyrintiSatir = devListesi.map(v=>{
        const tip = v.ozurlu ? ('Özürlü'+(v.maz&&v.maz.tur&&v.maz.tur!=='__ozursuz__'?' ('+({sevk:'Sevk',izin:'İzin',rapor:'Rapor',faaliyet:'Faaliyet',diger:'Diğer'}[v.maz.tur]||v.maz.tur)+')':'')) : 'Özürsüz';
        return v.tarih+' - '+tip;
      }).join('\n');
      const waMesaj = 'Sayın '+(ogr.veli_ad||'Veli')+',\n\n'+ogr.ad+' adlı öğrencimizin devamsızlık durumu:\n\n'
        +'Özürsüz: '+ozursuz+' gün\nÖzürlü: '+ozurlu+' gün\nToplam: '+toplam+'/'+TOPLAM_HAK+' gün\n\nAyrıntı:\n'+devAyrintiSatir+'\n\nBilginize saygılarımızla.';
      return `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          ${ava(ogr.ad,'#E6F1FB','#185FA5',32)}
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              ${ogr.ad}
              <span style="font-size:11px;font-weight:400;color:var(--text2)">No:${ogr.no||'—'}</span>
              ${veliTel ? `
              <a href="${telLink}" style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:var(--blue-bg);color:var(--blue);border-radius:5px;text-decoration:none" title="Veli Ara"><i class="ti ti-phone" style="font-size:12px"></i></a>
              <a href="https://wa.me/${waTel}?text=${encodeURIComponent(waMesaj)}" target="_blank" style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:#dcfce7;color:#16a34a;border-radius:5px;text-decoration:none" title="WA Özet"><i class="ti ti-brand-whatsapp" style="font-size:12px"></i></a>
              ` : ''}
            </div>
            <div style="display:flex;gap:8px;margin-top:3px;flex-wrap:wrap">
              <span style="font-size:11px;color:var(--red)">Özürsüz: ${ozursuz}</span>
              <span style="font-size:11px;color:var(--amber)">Özürlü: ${ozurlu}</span>
              <span style="font-size:11px;font-weight:700;color:${ozursuz>=OZURSUZ_HAK||toplam>=TOPLAM_HAK?'var(--red)':'var(--text2)'}">Toplam: ${toplam}/${TOPLAM_HAK}</span>
            </div>
          </div>
        </div>
        ${toplam>0 ? `
        <div style="margin-bottom:6px">
          <div style="background:var(--border);border-radius:99px;height:5px;overflow:hidden">
            <div style="height:100%;border-radius:99px;background:${ozursuz>=OZURSUZ_HAK?'var(--red)':toplam>TOPLAM_HAK*0.7?'var(--amber)':'var(--blue)'};width:${Math.min(100,toplam/TOPLAM_HAK*100)}%"></div>
          </div>
        </div>
        <details style="margin-left:2px">
          <summary style="font-size:11px;color:var(--blue);cursor:pointer;list-style:none;display:flex;align-items:center;gap:4px">
            <i class="ti ti-chevron-right" style="font-size:11px"></i>${toplam} gün — Ayrıntı
          </summary>
          <div style="margin-top:6px;padding-left:8px;font-size:11px;max-height:150px;overflow-y:auto">
            ${gunler.map(([t,v])=>`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border)">
              <span style="color:var(--text2);min-width:90px">${tarihDMY(t)}</span>
              <span style="color:var(--text);font-size:10px">${v.devTip||''}</span>
              ${v.maz&&v.maz.tur&&v.maz.tur!=='__ozursuz__'
                ? `<span class="maz-chip maz-${v.maz.tur}" style="font-size:10px">${MAZ_ICONS[v.maz.tur]||'📌'} ${MAZ_TUR[v.maz.tur]||v.maz.tur}</span>`
                : '<span style="font-size:10px;color:var(--red);font-weight:600">Özürsüz</span>'}
            </div>`).join('')}
          </div>
        </details>` : '<span style="font-size:11px;color:var(--green)">✓ Devamsız yok</span>'}
      </div>`;
    }).join('')}
  </div>`;
}

// ══════════════════════════════════════════════
//  VELİ SAYFASI
// ══════════════════════════════════════════════
function pgVeliOzet() {
  const u = APP.user;
  const ogrId = u._ogrId;
  const ogr = APP.ogrenciler.find(x=>x.id==ogrId);
  if (!ogr) return '<div class="empty-state"><i class="ti ti-user-off"></i>Öğrenci bulunamadı.</div>';

  const sinif = APP.siniflar.find(x=>x.id==ogr.sinif_id);
  const bugun = bugunTarih();
  const GUNLER = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  const MAZ_ICONS = {sevk:'🚑',izin:'📅',rapor:'📋',faaliyet:'⭐',diger:'📌'};
  const MAZ_TUR   = {sevk:'Sevk',izin:'İzin',rapor:'Rapor',faaliyet:'Faaliyet',diger:'Diğer'};
  // Devamsızlık hakları
  const OZURSUZ_HAK = Number((APP.iletisim||{}).ozursuz_hak)||10;
  const TOPLAM_HAK  = Number((APP.iletisim||{}).toplam_hak)||30;

  // ── Bugünkü durum ──
  const bugunYoklar = Object.values(APP.yoklamalar).filter(y=>y.sinif_id==ogr.sinif_id&&y.tarih===bugun);
  const bugunDevSaatler=[], bugunGecSaatler=[], bugunMevSaatler=[];
  bugunYoklar.forEach(y=>{
    const d=(APP.yoklamaDetay[y.id]||{})[ogrId];
    if(d==='A') bugunDevSaatler.push(Number(y.saat));
    else if(d==='L') bugunGecSaatler.push(Number(y.saat));
    else if(d==='P') bugunMevSaatler.push(Number(y.saat));
  });

  // ── Tüm devamsızlık geçmişi (yoklama + excel import birleşik) ──
  const devGunlerRaw = ogrDevamsizlikGetir(ogrId, ogr.sinif_id);
  // devGunler: [{tarih, devTip, saatler, maz, ozurlu, kaynak}]
  const devGunler = devGunlerRaw.map(x=>[x.tarih, x]); // eski format uyumu

  const ozurluGun  = devGunlerRaw.filter(v=>v.ozurlu).reduce((s,v)=>s+(v.gun||1),0);
  const ozursuzGun = devGunlerRaw.filter(v=>!v.ozurlu).reduce((s,v)=>s+(v.gun||1),0);
  const toplamGun  = ozurluGun + ozursuzGun;

  // Haklar
  const kalanOzursuz = Math.max(0, OZURSUZ_HAK - ozursuzGun);
  const kalanToplam  = Math.max(0, TOPLAM_HAK  - toplamGun);
  const ozursuzDoldu = ozursuzGun >= OZURSUZ_HAK;
  const toplamDoldu  = toplamGun  >= TOPLAM_HAK;

  const bugunDev = bugunDevSaatler.length > 0;
  const bugunGec = bugunGecSaatler.length > 0;
  const mazBugun = (APP.mazeretler[bugun]||{})[ogrId]||null;

  // İletişim bilgileri
  const il = APP.iletisim||{};
  const okulTel  = il.okul_tel||'';
  const idareTel = il.idare_tel||'';
  const sinifOgr = il['sinif_ogr_'+(ogr.sinif_id)]||'';
  const sinifOgrTel = il['sinif_ogr_tel_'+(ogr.sinif_id)]||'';

  const normalTel = t => {
    if (!t) return '';
    let n = t.replace(/[^0-9]/g,'');
    if (n.startsWith('0')) n = '90'+n.slice(1);
    else if (!n.startsWith('90')) n = '90'+n;
    return n;
  };
  const waLink = (tel, mesaj) => {
    const n = normalTel(tel);
    if (!n) return null;
    return 'https://wa.me/'+n+'?text='+encodeURIComponent(mesaj);
  };
  const telLink = tel => {
    const n = normalTel(tel);
    return n ? 'tel:+'+n : null;
  };
  const ogrBilgi = 'Merhaba, '+ogr.ad+' ('+(sinif?sinif.ad:'')+', No:'+( ogr.no||'')+') hakkında bilgi almak istiyorum.';
  const waOkul    = waLink(idareTel||okulTel, ogrBilgi);
  const waSinif   = waLink(sinifOgrTel, ogrBilgi);
  const telOkul   = telLink(idareTel||okulTel);
  const telSinif  = telLink(sinifOgrTel);

  return `
  <div style="padding:0 0 32px 0">

    <!-- Öğrenci kartı -->
    <div class="card" style="background:var(--blue-bg);border-color:#b3d1f0;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:52px;height:52px;background:var(--blue);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0">${ogr.ad.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</div>
        <div style="flex:1">
          <div style="font-size:17px;font-weight:800;color:var(--blue)">${ogr.ad}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px">${sinif?sinif.ad+' Sınıfı':''} · No: ${ogr.no||'—'}</div>
        </div>
        <button onclick="cikisYap()" style="border:none;background:none;color:var(--text2);cursor:pointer;font-size:22px;padding:4px" title="Çıkış">⎋</button>
      </div>
    </div>

    <!-- Bugünkü durum -->
    <div class="card" style="margin-bottom:12px;${bugunDev?'background:var(--red-bg);border-color:#f5a0a0':bugunGec?'background:var(--amber-bg);border-color:#f5c97a':'background:var(--green-bg);border-color:#aad67c'}">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px">
        <i class="ti ti-calendar-today"></i>Bugün — ${tarihTam(bugun)} (${GUNLER[new Date(bugun+'T12:00:00').getDay()]})
      </div>
      ${bugunYoklar.length===0
        ? `<div style="font-size:13px;color:var(--text2)"><i class="ti ti-clock"></i> Henüz yoklama alınmadı.</div>`
        : bugunDev
          ? `<div style="font-size:15px;font-weight:700;color:var(--red);margin-bottom:6px">⚠️ Devamsız</div>
             <div style="font-size:12px">Devamsız dersler: ${[...bugunDevSaatler].sort((a,b)=>a-b).map(s=>s+'.ders').join(', ')}</div>
             ${mazBugun?`<div style="margin-top:6px"><span class="maz-chip maz-${mazBugun.tur}">${MAZ_ICONS[mazBugun.tur]} ${MAZ_TUR[mazBugun.tur]}${mazBugun.not?' — '+mazBugun.not:''}</span></div>`:''}
             ${bugunGecSaatler.length?`<div style="font-size:12px;color:var(--amber);margin-top:4px">Geç girilen: ${[...bugunGecSaatler].sort((a,b)=>a-b).map(s=>s+'.ders').join(', ')}</div>`:''}`
          : bugunGec
          ? `<div style="font-size:15px;font-weight:700;color:var(--amber);margin-bottom:6px">⏰ Geç Giriş</div>
             <div style="font-size:12px">Geç girilen dersler: ${[...bugunGecSaatler].sort((a,b)=>a-b).map(s=>s+'.ders').join(', ')}</div>`
          : `<div style="font-size:15px;font-weight:700;color:var(--green)">✅ Devam Ediyor</div>
             <div style="font-size:12px;margin-top:4px">Mevcut dersler: ${[...bugunMevSaatler].sort((a,b)=>a-b).map(s=>s+'.ders').join(', ')}</div>`
      }
    </div>

    <!-- İletişim butonları -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">

      <!-- Okul İdaresi -->
      <div style="display:flex;flex-direction:column;gap:6px">
        <div style="font-size:11px;font-weight:600;color:var(--text2);text-align:center">Okul İdaresi</div>
        <div style="display:flex;gap:6px">
          ${telOkul
            ? `<a href="${telOkul}" style="flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:10px 6px;background:var(--blue);color:#fff;border-radius:10px;font-size:12px;font-weight:700;text-decoration:none">
                <i class="ti ti-phone" style="font-size:15px"></i>Ara
              </a>`
            : `<div style="flex:1;padding:10px 6px;background:var(--bg);border:1.5px dashed var(--border);border-radius:10px;font-size:10px;color:var(--text2);text-align:center">Tel yok</div>`
          }
          ${waOkul
            ? `<a href="${waOkul}" target="_blank" rel="noopener" style="flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:10px 6px;background:#25D366;color:#fff;border-radius:10px;font-size:12px;font-weight:700;text-decoration:none">
                <i class="ti ti-brand-whatsapp" style="font-size:15px"></i>WA
              </a>`
            : `<div style="flex:1;padding:10px 6px;background:var(--bg);border:1.5px dashed var(--border);border-radius:10px;font-size:10px;color:var(--text2);text-align:center">WA yok</div>`
          }
        </div>
      </div>

      <!-- Sınıf Öğretmeni -->
      <div style="display:flex;flex-direction:column;gap:6px">
        <div style="font-size:11px;font-weight:600;color:var(--text2);text-align:center">${sinifOgr?sinifOgr.split(' ')[0]+' Öğretmen':'Sınıf Öğretmeni'}</div>
        <div style="display:flex;gap:6px">
          ${telSinif
            ? `<a href="${telSinif}" style="flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:10px 6px;background:var(--blue);color:#fff;border-radius:10px;font-size:12px;font-weight:700;text-decoration:none">
                <i class="ti ti-phone" style="font-size:15px"></i>Ara
              </a>`
            : `<div style="flex:1;padding:10px 6px;background:var(--bg);border:1.5px dashed var(--border);border-radius:10px;font-size:10px;color:var(--text2);text-align:center">Tel yok</div>`
          }
          ${waSinif
            ? `<a href="${waSinif}" target="_blank" rel="noopener" style="flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:10px 6px;background:#128C7E;color:#fff;border-radius:10px;font-size:12px;font-weight:700;text-decoration:none">
                <i class="ti ti-brand-whatsapp" style="font-size:15px"></i>WA
              </a>`
            : `<div style="flex:1;padding:10px 6px;background:var(--bg);border:1.5px dashed var(--border);border-radius:10px;font-size:10px;color:var(--text2);text-align:center">WA yok</div>`
          }
        </div>
      </div>

    </div>

    <!-- Devamsızlık özeti + haklar -->
    <div class="card" style="margin-bottom:12px">
      <div class="card-title" style="justify-content:space-between;flex-wrap:wrap;gap:4px">
        <span><i class="ti ti-chart-bar"></i>Devamsızlık Özeti</span>
        <span style="font-size:10px;color:var(--text2)">
          ${devGunlerRaw.filter(v=>v.kaynak==='import').length>0?'📊 E-Okul: '+devGunlerRaw.filter(v=>v.kaynak==='import').length+' kayıt':''}
          ${devGunlerRaw.filter(v=>v.kaynak==='yoklama').length>0?' · 📋 Yoklama: '+devGunlerRaw.filter(v=>v.kaynak==='yoklama').length+' kayıt':''}
        </span>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <div style="background:var(--red-bg);border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:24px;font-weight:800;color:var(--red)">${ozursuzGun}</div>
          <div style="font-size:11px;color:var(--red);font-weight:600">Özürsüz Devamsızlık</div>
        </div>
        <div style="background:var(--amber-bg);border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:24px;font-weight:800;color:var(--amber)">${ozurluGun}</div>
          <div style="font-size:11px;color:var(--amber);font-weight:600">Özürlü Devamsızlık</div>
        </div>
      </div>

      <!-- Özürsüz hak barı -->
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
          <span style="font-weight:600;color:${ozursuzDoldu?'var(--red)':'var(--text)'}">Özürsüz Hak (${ozursuzGun}/${OZURSUZ_HAK} gün)</span>
          <span style="font-weight:700;color:${ozursuzDoldu?'var(--red)':'var(--green)'}">${ozursuzDoldu?'⚠️ DOLDU':'Kalan: '+kalanOzursuz+' gün'}</span>
        </div>
        <div style="background:var(--border);border-radius:99px;height:8px;overflow:hidden">
          <div style="height:100%;border-radius:99px;background:${ozursuzDoldu?'var(--red)':'var(--amber)'};width:${Math.min(100,ozursuzGun/OZURSUZ_HAK*100)}%;transition:width .3s"></div>
        </div>
      </div>

      <!-- Toplam hak barı -->
      <div>
        <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
          <span style="font-weight:600;color:${toplamDoldu?'var(--red)':'var(--text)'}">Toplam Hak (${toplamGun}/${TOPLAM_HAK} gün)</span>
          <span style="font-weight:700;color:${toplamDoldu?'var(--red)':'var(--green)'}">${toplamDoldu?'⚠️ DOLDU':'Kalan: '+kalanToplam+' gün'}</span>
        </div>
        <div style="background:var(--border);border-radius:99px;height:8px;overflow:hidden">
          <div style="height:100%;border-radius:99px;background:${toplamDoldu?'var(--red)':toplamGun>20?'var(--amber)':'var(--blue)'};width:${Math.min(100,toplamGun/TOPLAM_HAK*100)}%;transition:width .3s"></div>
        </div>
      </div>

      ${(ozursuzDoldu||toplamDoldu)?`<div class="notif n-error" style="margin-top:10px;font-size:12px"><i class="ti ti-alert-triangle"></i>
        ${ozursuzDoldu?'Özürsüz devamsızlık hakkı doldu! ':''}${toplamDoldu?'Toplam devamsızlık hakkı doldu!':''}
      </div>`:''}
      <div style="font-size:10px;color:var(--text2);margin-top:8px">* Özürsüz: ${OZURSUZ_HAK} gün · Toplam (özürlü+özürsüz): ${TOPLAM_HAK} gün</div>
    </div>

    <!-- Devamsızlık geçmişi -->
    <div class="card">
      <div class="card-title"><i class="ti ti-history"></i>Devamsızlık Geçmişi
        <span class="badge b-red" style="margin-left:6px">${toplamGun} gün</span>
      </div>
      ${devGunler.length===0

// Veli için realtime bildirim — öğrenci devamsız yazıldığında bildirim
function subscribeVeliRealtime(ogrId) {
  if (window._veliChannel) { sb.removeChannel(window._veliChannel); }
  window._veliChannel = sb.channel('veli-bildirim-'+ogrId)
    .on('postgres_changes', {event:'*', schema:'public', table:'yoklama_detay'}, async (payload) => {
      // Verimi yenile
      const {data} = await sb.from('yoklama_detay').select('*');
      APP.yoklamaDetay = {};
      (data||[]).forEach(d=>{
        if(!APP.yoklamaDetay[d.yoklama_id]) APP.yoklamaDetay[d.yoklama_id]={};
        APP.yoklamaDetay[d.yoklama_id][d.ogrenci_id]=d.durum;
      });
      // Bu öğrenciye ait değişiklik mi?
      const newDurum = payload.new;
      if (newDurum && String(newDurum.ogrenci_id)===String(ogrId)) {
        const ogr = APP.ogrenciler.find(x=>x.id==ogrId);
        const ad = ogr?ogr.ad:'Öğrenciniz';
        if (newDurum.durum==='A') {
          showToast('⚠️ '+ad+' '+newDurum.yoklama_id+'. ders devamsız yazıldı!', 'error');
          // Tarayıcı bildirimi
          if (Notification && Notification.permission==='granted') {
            new Notification('Devamsızlık Bildirimi', {body: ad+' devamsız yazıldı.', icon:''});
          }
        } else if (newDurum.durum==='L') {
          showToast('⏰ '+ad+' derse geç girdi.', 'warn');
        }
      }
      render();
    })
    .subscribe();

  // localStorage'dan gelen import güncellemelerini dinle
  window.addEventListener('storage', (e) => {
    if (e.key === 'okulYokla_mazeretler') {
      try { APP.mazeretler = JSON.parse(e.newValue||'{}'); } catch(ex) {}
      render();
      showToast('📋 Devamsızlık bilgileri güncellendi');
    }
  });

  // Bildirim izni iste
  if (Notification && Notification.permission==='default') {
    Notification.requestPermission();
  }
}

// ═══════════════════════════════════════════════
//  DEVAMSIZLIk İÇE AKTARMA (E-Okul XLS)
// ═══════════════════════════════════════════════
/*
  Tür kuralları:
  F, N  → Devamsızlıktan SAYILMAZ
  ÖY    → Özürsüz devamsızlık (öğleden sonra yarım gün)
  SY    → Özürsüz devamsızlık (sabah yarım gün)
  D     → Özürsüz devamsızlık (tam gün)
  SV    → Özürlü devamsızlık (sevk)
  İ     → Özürlü devamsızlık (izin)
  S     → Özürlü devamsızlık (sağlık/rapor)
  G     → Her 5 adet = 0.5 gün özürsüz devamsızlık (geç gelme)
  Diğerleri (C,V,DA...) → Özürlü (diğer)
*/
// E-Okul resmi devamsızlık tür tablosu — localStorage'dan yüklenebilir
// say:true=dahil, say:false=dahil değil, say:'gec'=5 adet=0.5 gün özürsüz
const TUR_KURAL_VARSAYILAN = {
  // ── ÖZÜRSÜZ + SAYILAN ──
  'ÖY': {say:true,  ozurlu:false, mazTur:null,       devTip:'OY',  label:'Öğleden Sonra Yarım Gün'},
  'SY': {say:true,  ozurlu:false, mazTur:null,       devTip:'SY',  label:'Sabahtan Yarım Gün'},
  'D':  {say:true,  ozurlu:false, mazTur:null,       devTip:'TAM', label:'Tam Gün'},
  'Y':  {say:true,  ozurlu:false, mazTur:null,       devTip:'SY',  label:'Yarım Gün'},
  // ── ÖZÜRLÜ + SAYILAN ──
  'V':  {say:true,  ozurlu:true,  mazTur:'diger',    devTip:'TAM', label:'1. Derece Yakını Vefat'},
  'GÖ': {say:true,  ozurlu:true,  mazTur:'diger',    devTip:'TAM', label:'Göz Altına Alınma'},
  'İ':  {say:true,  ozurlu:true,  mazTur:'izin',     devTip:'TAM', label:'İzinli'},
  'C':  {say:true,  ozurlu:true,  mazTur:'diger',    devTip:'TAM', label:'Okuldan Uzaklaştırma'},
  'S':  {say:true,  ozurlu:true,  mazTur:'rapor',    devTip:'TAM', label:'Raporlu'},
  'SH': {say:true,  ozurlu:true,  mazTur:'rapor',    devTip:'TAM', label:'Sağlık Kurulu'},
  'SV': {say:true,  ozurlu:true,  mazTur:'sevk',     devTip:'TAM', label:'Sevkli'},
  'TU': {say:true,  ozurlu:true,  mazTur:'diger',    devTip:'TAM', label:'Tutuklanma'},
  // ── ÖZÜRLÜ + SAYILMAYAN ──
  'DA': {say:false, ozurlu:true,  mazTur:'diger',    devTip:'TAM', label:'Doğal Afet'},
  'F':  {say:false, ozurlu:true,  mazTur:'faaliyet', devTip:'TAM', label:'Faaliyet'},
  'G':  {say:'gec', ozurlu:false, mazTur:null,       devTip:'SY',  label:'Geç (5 adet=0.5 gün özürsüz)'},
  'K':  {say:false, ozurlu:true,  mazTur:'rapor',    devTip:'TAM', label:'Karantina/Temaslı Raporu'},
  'N':  {say:false, ozurlu:true,  mazTur:'diger',    devTip:'TAM', label:'Nöbetçi'},
  'T':  {say:false, ozurlu:true,  mazTur:'diger',    devTip:'TAM', label:'Tedbir Kararı'},
  'YA': {say:false, ozurlu:true,  mazTur:'diger',    devTip:'TAM', label:'Yangın'},
};

// Aktif TUR_KURAL — localStorage override varsa kullan
function getTurKural() {
  if (APP._turKuralOverride && Object.keys(APP._turKuralOverride).length > 0) {
    return Object.assign({}, TUR_KURAL_VARSAYILAN, APP._turKuralOverride);
  }
  return TUR_KURAL_VARSAYILAN;
}
// Global alias
let TUR_KURAL = getTurKural();

function xlsKayitlariIsle(records) {
  const KURAL = getTurKural(); // her seferinde güncel kuralı al
  const gecSayac = {};
  const sonuc = [];

  // G geç gelme sayacı
  records.forEach(r => {
    if (r.tur === 'G') gecSayac[r.no] = (gecSayac[r.no]||0) + 1;
  });

  // G → her 5 adet için 0.5 gün özürsüz
  Object.entries(gecSayac).forEach(([no, cnt]) => {
    const tamBlok = Math.floor(cnt / 5);
    if (tamBlok > 0) {
      const gecKayitlar = records.filter(r => r.no == no && r.tur === 'G');
      for (let i = 0; i < tamBlok; i++) {
        const ref = gecKayitlar[Math.min(i*5+4, gecKayitlar.length-1)];
        sonuc.push({no:Number(no), tarih:ref.tarih, devTip:'SY', ozurlu:false, mazTur:null, gun:0.5, kaynak:'G×5', ad:ref.ad});
      }
    }
  });

  // Diğer kayıtları işle
  records.forEach(r => {
    const kural = KURAL[r.tur] || {say:true, ozurlu:true, mazTur:'diger', devTip:'TAM', label:'Diğer'};
    if (!kural.say || kural.say === 'gec') return;
    const gun = (r.tur==='ÖY'||r.tur==='SY'||r.tur==='Y') ? 0.5 : Number(r.gun)||1;
    sonuc.push({no:Number(r.no), tarih:r.tarih, devTip:kural.devTip, ozurlu:kural.ozurlu, mazTur:kural.mazTur, gun, kaynak:r.tur, ad:r.ad});
  });

  return sonuc;
}

window.importXlsOku = async function(input) {
  const file = input.files[0];
  if (!file) return;
  showToast('Dosya okunuyor...');

  try {
    const buf = await file.arrayBuffer();
    const wb  = XLSX.read(buf, {type:'array', cellDates:true});
    const ws  = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:null, raw:true});

    // XLSX değer → YYYY-MM-DD
    function xlsSerial(val) {
      if (val == null) return null;
      // Date objesi (cellDates:true)
      if (val instanceof Date) {
        const mm = String(val.getMonth()+1).padStart(2,'0');
        const dd = String(val.getDate()).padStart(2,'0');
        return `${val.getFullYear()}-${mm}-${dd}`;
      }
      const s = String(val).trim();
      if (!s || s==='null') return null;
      // YYYY-MM-DD
      if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
      // DD.MM.YYYY
      if (/^\d{2}\.\d{2}\.\d{4}/.test(s)) { const [d,m,y]=s.split('.'); return `${y}-${m}-${d}`; }
      // DD/MM/YYYY veya YYYY/MM/DD
      if (s.includes('/')) {
        const p = s.split('/');
        if (p[0].length===4) return `${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`;
        return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
      }
      // Excel serial number
      const n = Number(val);
      if (!isNaN(n) && n > 40000 && n < 60000) {
        const d = new Date(Math.round((n - 25569) * 86400 * 1000));
        const mm = String(d.getUTCMonth()+1).padStart(2,'0');
        const dd = String(d.getUTCDate()).padStart(2,'0');
        return `${d.getUTCFullYear()}-${mm}-${dd}`;
      }
      return null;
    }

    // Ham kayıtları çıkar
    const raw = [];
    rows.forEach(r => {
      const no = r[3];
      const tarihVal = r[9];
      const tur = r[11];
      const gun = r[13];
      const noNum = Number(no);
      if (!no || isNaN(noNum) || noNum <= 0) return;
      const turStr = String(tur||'').trim();
      if (!turStr || turStr === 'TÜRÜ' || turStr === 'undefined') return;
      const tarih = xlsSerial(tarihVal);
      if (!tarih || tarih < '2020-01-01') return; // geçersiz tarih filtresi
      const ad = [r[4],r[5],r[6]].filter(v=>v!=null&&String(v).trim()).join(' ').trim();
      const gunNum = parseFloat(String(gun||'1').replace(',','.')) || 1;
      raw.push({no:noNum, ad, tarih, tur:turStr, gun:gunNum});
    });

    if (raw.length === 0) {
      showToast('Dosyada uygun kayıt bulunamadı. Sütun yapısı farklı olabilir.', 'error');
      return;
    }

    // Kuralları uygula
    const processed = xlsKayitlariIsle(raw);

    // Eşleşme analizi
    const noSet = new Set(processed.map(r=>r.no));
    const eslesdi = [...noSet].filter(no=>APP.ogrenciler.find(o=>String(o.no)===String(no))).length;
    const eslesmeyenler = [...noSet].filter(no=>!APP.ogrenciler.find(o=>String(o.no)===String(no)));
    const ozursuz = processed.filter(r=>!r.ozurlu).length;
    const ozurlu  = processed.filter(r=>r.ozurlu).length;

    APP._importPreview  = processed;
    APP._importEslesme  = {eslesdi, eslesmedi:eslesmeyenler.length, eslesmeyenler, ozursuz, ozurlu, kayit:processed.length};
    APP._importSonuc    = null;
    refreshMain();
  } catch(e) {
    console.error('XLS okuma hatası:', e);
    showToast('Dosya okunamadı: ' + e.message, 'error');
  }
};

window.turTablosuKaydet = async function() {
  const KURAL = getTurKural();
  const override = {};
  Object.entries(KURAL).forEach(([kod, k]) => {
    if (k.say === 'gec') return; // G sabit
    const ozurluEl = document.getElementById('tur-ozurlu-'+kod);
    const sayEl    = document.getElementById('tur-say-'+kod);
    if (!ozurluEl || !sayEl) return;
    const ozurlu = ozurluEl.value === '1';
    const say    = sayEl.value === '1';
    // Sadece varsayılandan farklıysa kaydet
    const v = TUR_KURAL_VARSAYILAN[kod];
    if (!v || ozurlu !== v.ozurlu || say !== v.say) {
      override[kod] = {...k, ozurlu, say};
    }
  });
  // Tüm overrideları kaydet
  const tumKural = {};
  Object.entries(KURAL).forEach(([kod,k]) => {
    const ozurluEl = document.getElementById('tur-ozurlu-'+kod);
    const sayEl    = document.getElementById('tur-say-'+kod);
    if (k.say==='gec' || !ozurluEl) { tumKural[kod]=k; return; }
    tumKural[kod] = {...k, ozurlu:ozurluEl.value==='1', say:sayEl.value==='1'};
  });
  APP._turKuralOverride=tumKural;
  const turRows=Object.entries(tumKural).filter(([,k])=>k.say!=='gec').map(([kod,k])=>({kod,ozurlu:k.ozurlu,say:!!k.say}));

window.importUygula = async function() {
  const records = APP._importPreview||[];
  if (!records.length) return;

  // Progress bar göster
  const showProgress = (yuzde, metin) => {
    const el = document.getElementById('import-progress');
    if (!el) return;
    el.style.display = 'block';
    el.innerHTML = `
      <div style="margin-bottom:6px;font-size:13px;font-weight:600;color:var(--blue)">${metin}</div>
      <div style="background:var(--border);border-radius:99px;height:10px;overflow:hidden">
        <div style="height:100%;border-radius:99px;background:var(--blue);width:${yuzde}%;transition:width .2s"></div>
      </div>
      <div style="font-size:11px;color:var(--text2);margin-top:4px">${yuzde}% tamamlandı</div>`;
  };

  let eklendi = 0, atlandi = 0, guncellendi = 0;
  const supabaseRows = [];

  // Adım 1: Verileri hazırla
  showProgress(5, 'Veriler hazırlanıyor...');
  await new Promise(r=>setTimeout(r,30));

  records.forEach(r => {
    const ogr = APP.ogrenciler.find(o=>String(o.no)===String(r.no));
    if (!ogr) { atlandi++; return; }
    if (!APP.mazeretler[r.tarih]) APP.mazeretler[r.tarih] = {};
    const mevcutMaz = APP.mazeretler[r.tarih][ogr.id];
    const tur = r.ozurlu ? (r.mazTur||'diger') : '__ozursuz__';
    if (mevcutMaz && !mevcutMaz._import) {
      eklendi++;
    } else {
      const mazObj = {tur, not:'E-Okul: '+r.kaynak, ts:Date.now(), _import:true, devTip:r.devTip, gun:r.gun};
      if (!mevcutMaz) eklendi++; else guncellendi++;
      APP.mazeretler[r.tarih][ogr.id] = mazObj;
      supabaseRows.push({ogr_id:Number(ogr.id), tarih:r.tarih, tur, not_text:'E-Okul: '+r.kaynak, import:true, dev_tip:r.devTip, gun:r.gun, kaynak:r.kaynak});
    }
    if (!APP.importDevamsizlik) APP.importDevamsizlik = {};
    const ogrId = String(ogr.id);
    if (!APP.importDevamsizlik[ogrId]) APP.importDevamsizlik[ogrId] = [];
    const existing = APP.importDevamsizlik[ogrId].findIndex(x=>x.tarih===r.tarih);
    const entry = {tarih:r.tarih, devTip:r.devTip, ozurlu:r.ozurlu, gun:r.gun, kaynak:r.kaynak};
    if (existing>=0) APP.importDevamsizlik[ogrId][existing] = entry;
    else APP.importDevamsizlik[ogrId].push(entry);
  });

  // Adım 2: Supabase'e kaydet — progress ile
  const toplam = supabaseRows.length;
  showProgress(10, `Veritabanına kaydediliyor... (0/${toplam})`);
  await new Promise(r=>setTimeout(r,30));

  // Toplu upsert — 50'lik batch'ler halinde (unique constraint var)
  const batchSize = 50;
  for (let i=0; i<supabaseRows.length; i+=batchSize) {
    const batch = supabaseRows.slice(i, i+batchSize);
    try {
      await sb.from('mazeretler').upsert(batch, {onConflict:'ogr_id,tarih'});
    } catch(e) {
      // upsert başarısız olursa tek tek dene
      for (const row of batch) {
        try {
          await sb.from('mazeretler').delete().eq('ogr_id',row.ogr_id).eq('tarih',row.tarih);
          await sb.from('mazeretler').insert(row);
        } catch(e2) { console.warn('Import kayıt hatası:', e2); }
      }
    }
    const pct = Math.round(10 + (i+batchSize)/Math.max(toplam,1)*85);
    showProgress(Math.min(pct,95), `Veritabanına kaydediliyor... (${Math.min(i+batchSize,toplam)}/${toplam})`);
    await new Promise(r=>setTimeout(r,0));
  }

  showProgress(100, 'Tamamlandı!');
  await new Promise(r=>setTimeout(r,500));

  const mesaj = `✅ ${eklendi} yeni kayıt${guncellendi>0?', '+guncellendi+' güncellendi':''}${atlandi>0?', '+atlandi+' eşleşmedi':''}`;
  APP._importSonuc = {ok:true, mesaj};
  APP._importPreview = null;
  APP._importEslesme = null;
  showToast(mesaj);
  render();
};

window.yedekAl = async function(tur) {
  showToast('Yedek hazırlanıyor...');
  const tarih = bugunTarih();
  let data = {};

  try {
    if (tur === 'tum' || tur === 'ogrenciler') {
      const {data:d} = await sb.from('ogrenciler').select('*');
      data.ogrenciler = d||[];
    }
    if (tur === 'tum' || tur === 'yoklamalar') {
      const {data:d1} = await sb.from('yoklamalar').select('*');
      const {data:d2} = await sb.from('yoklama_detay').select('*');
      data.yoklamalar = d1||[];
      data.yoklama_detay = d2||[];
    }
    if (tur === 'tum' || tur === 'mazeretler') {
      const {data:d} = await sb.from('mazeretler').select('*');
      data.mazeretler = d||[];
    }
    if (tur === 'tum') {
      const {data:d1} = await sb.from('ders_programi').select('*');
      const {data:d2} = await sb.from('okul_ayarlari').select('*');
      const {data:d3} = await sb.from('tur_kurallari').select('*');
      const {data:d4} = await sb.from('kullanicilar').select('id,ad,rol,kullanici_adi,sinif_id');
      const {data:d5} = await sb.from('siniflar').select('*');
      data.ders_programi = d1||[];
      data.okul_ayarlari = d2||[];
      data.tur_kurallari = d3||[];
      data.kullanicilar  = d4||[];
      data.siniflar      = d5||[];
    }
    data._meta = {tarih, tur, versiyon:'1.0', olusturuldu: new Date().toISOString()};

    // İndir
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `okulyokla_yedek_${tur}_${tarih}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('✅ Yedek indirildi');
  } catch(e) {
    showToast('Yedek hatası: '+e.message, 'error');
  }
};

window.yedekYukle = async function(input) {
  const file = input.files[0];
  if (!file) return;
  const text = await file.text();
  let data;
  try { data = JSON.parse(text); }
  catch(e) { return showToast('Geçersiz JSON dosyası', 'error'); }

  const meta = data._meta||{};
  const tablolar = Object.keys(data).filter(k=>k!=='_meta');
  const div = document.getElementById('yedek-onizleme');
  div.style.display = 'block';
  div.innerHTML = `<div class="notif n-info" style="margin-bottom:8px">
    <i class="ti ti-info-circle"></i>
    <div>Yedek: <b>${meta.tarih||'?'}</b> · Tür: <b>${meta.tur||'?'}</b> · Tablolar: ${tablolar.join(', ')}</div>
  </div>
  <button class="btn btn-primary" onclick="yedekYukleOnayla(${JSON.stringify(data).replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').length} byte)">
    <i class="ti ti-upload"></i>Geri Yükle (${tablolar.length} tablo)
  </button>`;
  // Store in memory
  window._yedekData = data;
};

window.yedekYukleOnayla = async function() {
  const data = window._yedekData;
  if (!data) return;
  if (!confirm('Bu işlem mevcut verileri değiştirir. Devam edilsin mi?')) return;
  showToast('Yükleniyor...');
  try {
    if (data.ogrenciler?.length) {
      for (const r of data.ogrenciler) {
        await sb.from('ogrenciler').upsert(r, {onConflict:'id'});
      }
    }
    if (data.yoklamalar?.length) {
      for (const r of data.yoklamalar) await sb.from('yoklamalar').upsert(r, {onConflict:'id'});
    }
    if (data.yoklama_detay?.length) {
      for (const r of data.yoklama_detay) await sb.from('yoklama_detay').upsert(r, {onConflict:'id'});
    }
    if (data.mazeretler?.length) {
      for (const r of data.mazeretler) {
        await sb.from('mazeretler').delete().eq('ogr_id',r.ogr_id).eq('tarih',r.tarih);
        await sb.from('mazeretler').insert(r);

    }
    await loadAll();
    render();
    showToast('✅ Yedek geri yüklendi');
  } catch(e) {
    showToast('Geri yükleme hatası: '+e.message, 'error');

// Tüm satırları silen yardımcı — sayfalayarak sil
async function tumSatirlarSil(tablo, kolonFiltreleri) {
  // Önce id'leri çek, sonra sil
  let silinenToplam = 0;
  while(true) {
    let q = sb.from(tablo).select('id').limit(500);
    if (kolonFiltreleri) {
      for (const [k,v] of Object.entries(kolonFiltreleri)) q = q.eq(k, v);
    }
    const {data, error} = await q;
    if (error || !data || data.length === 0) break;
    const ids = data.map(r=>r.id);
    let delQ = sb.from(tablo).delete().in('id', ids);
    await delQ;
    silinenToplam += ids.length;
    if (data.length < 500) break;
  }
  return silinenToplam;
}

window.veriSilYap = async function(tur) {
  APP.modal = null;
  render();
  showToast('Siliniyor...');
  try {
    if (tur === 'yoklamalar_bugun') {
      const bugun = bugunTarih();
      const {data:yList} = await sb.from('yoklamalar').select('id').eq('tarih', bugun);
      if (yList?.length) {
        const ids = yList.map(y=>y.id);
        await sb.from('yoklama_detay').delete().in('yoklama_id', ids);
        await sb.from('yoklamalar').delete().in('id', ids);
      }
    } else if (tur === 'yoklamalar_tum') {
      await tumSatirlarSil('yoklama_detay');
      await tumSatirlarSil('yoklamalar');
    } else if (tur === 'mazeretler_tum') {
      await tumSatirlarSil('mazeretler');
    } else if (tur === 'importDev') {
      await tumSatirlarSil('mazeretler', {import: true});
    } else if (tur === 'ogrenciler') {
      await tumSatirlarSil('yoklama_detay');
      await tumSatirlarSil('yoklamalar');
      await tumSatirlarSil('mazeretler');
      await tumSatirlarSil('ogrenciler');
    } else if (tur === 'programlar') {
      await tumSatirlarSil('ders_programi');
    } else if (tur === 'iletisim') {
      await tumSatirlarSil('okul_ayarlari');
      await tumSatirlarSil('tur_kurallari');
    }
    await loadAll();
    render();
    showToast('✅ Veriler silindi');
  } catch(e) {
    console.error('Silme hatası:', e);
    showToast('Silme hatası: '+e.message, 'error');
  }
};

  await ayarSupabaseKaydet('sinif_ogr_tel_'+sinifId, tel);
  const sinif = APP.siniflar.find(x=>x.id==sinifId);
  APP.modal = null; // modalı kapat
  refreshMain();
  // Toast sonra göster (render sonrası)
  setTimeout(()=>showToast('✅ '+(sinif?sinif.ad+' ':'')+' sınıf öğretmeni kaydedildi'), 50);
};

function pgRaporlar() {
  // Tarih seçici: APP._raporTarih yoksa bugün
  if (!APP._raporTarih) APP._raporTarih = bugunTarih();
  const tarih = APP._raporTarih;
  const bugunStr = bugunTarih();
  const mazGoster = APP._mazGoster !== false; // default: göster
  const MAZ_TUR = {sevk:'Sevk',izin:'İzin',rapor:'Rapor',faaliyet:'Faaliyet',diger:'Diğer'};

  // ── Seçili tarihin devamsız öğrencileri ──
  const bugunYoklar = Object.values(APP.yoklamalar).filter(y=>y.tarih===tarih);
  const devMap = {}; // ogrId → {saatler:[], sinifId, kaynak}

  // 1) Yoklama kayıtları
  bugunYoklar.forEach(y=>{
    const det = APP.yoklamaDetay[y.id]||{};
    Object.entries(det).forEach(([ogrId,d])=>{
      if(d==='A'){
        if(!devMap[ogrId]) devMap[ogrId]={saatler:[],sinifId:y.sinif_id,devTip:null,kaynak:'yoklama'};
        devMap[ogrId].saatler.push(Number(y.saat));
      }
    });
  });

  // 2) Excel import verisi — o tarihte mazeretler tablosunda kayıt varsa ekle
  APP.ogrenciler.forEach(o=>{
    const ogrIdStr = String(o.id);
    const impList = (APP.importDevamsizlik||{})[ogrIdStr]||[];
    impList.forEach(imp=>{
      if(imp.tarih!==tarih) return;
      if(devMap[ogrIdStr]) return; // yoklamada zaten var
      devMap[ogrIdStr] = {saatler:[], sinifId:o.sinif_id, devTip:imp.devTip==='TAM'?'TAM GÜN':imp.devTip==='SY'?'SY':'OY', kaynak:'import', gun:imp.gun};
    });
  });

  // Devamsızlık tipini hesapla (sadece yoklama kayıtları için)
  Object.entries(devMap).forEach(([ogrId,info])=>{
    if(info.kaynak==='import') return; // import verisi zaten tipini biliyor
    const sabah=info.saatler.filter(s=>s<=5).length;
    const oglen=info.saatler.filter(s=>s>=6).length;
    const toplam=info.saatler.length;
    const alinanSayisi=bugunYoklar.filter(y=>y.sinif_id==info.sinifId).length;
    if(toplam>=Math.ceil(alinanSayisi*2/3)||( sabah>0&&oglen>0))info.devTip='TAM GÜN';
    else if(sabah>0&&oglen===0)info.devTip='SY';
    else if(oglen>0&&sabah===0)info.devTip='ÖY';
    else info.devTip='TAM GÜN';
  });

  const devListBugün = Object.entries(devMap).map(([ogrId,info])=>{
    const o = APP.ogrenciler.find(x=>x.id==ogrId);
    if(!o) return null;
    const maz = (APP.mazeretler[tarih]||{})[ogrId] || null;
    return {o,info,maz};
  }).filter(Boolean).sort((a,b)=>a.o.ad.localeCompare(b.o.ad));

  // Filtrele: mazeretsizler her zaman, mazeretliler seçime göre
  const gosterilen = mazGoster ? devListBugün : devListBugün.filter(x=>!x.maz);

  // ── Sınıf bazlı özet ──
  const raporlar = APP.siniflar.map(s=>{
    const ogr = sinifOgr(s.id);
    const sYoklar = bugunYoklar.filter(y=>y.sinif_id==s.id);
    // Saat bazlı tekil devam hesabı
    const saatDetay={};
    sYoklar.forEach(y=>{ const det=APP.yoklamaDetay[y.id]||{}; Object.entries(det).forEach(([oid,d])=>{ if(!saatDetay[oid])saatDetay[oid]={}; saatDetay[oid][y.saat]=d; }); });
    const mv=ogr.filter(o=>Object.values(saatDetay[o.id]||{}).some(d=>d==='P')).length;
    const ab=ogr.filter(o=>{const v=saatDetay[o.id]||{}; return Object.keys(v).length>0&&Object.values(v).every(d=>d==='A');}).length;
    const lt=ogr.filter(o=>Object.values(saatDetay[o.id]||{}).some(d=>d==='L')).length;
    const pct=sYoklar.length&&ogr.length?Math.round(mv/ogr.length*100):null;
    return {s,ogr,mv,ab,lt,pct,alinan:sYoklar.length>0};
  });

  // Mevcut yoklama tarihleri listesi (dropdown için)
  const mevcutTarihler = [...new Set(Object.values(APP.yoklamalar).map(y=>y.tarih))].sort().reverse();
  if (!mevcutTarihler.includes(tarih) && mevcutTarihler.length>0) {
    // Seçili tarih yoksa en son tarihe getir
  }

  return `<div class="page-header no-print">
    <div class="page-title"><i class="ti ti-report-analytics"></i>Raporlar</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-sm" onclick="raporTarihDegistir(-1)" title="Önceki gün"><i class="ti ti-chevron-left"></i></button>
      <input type="date" value="${tarih}" max="${bugunStr}"
        onchange="APP._raporTarih=this.value;refreshMain()"
        style="padding:5px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;color:var(--text);background:var(--bg);cursor:pointer">
      <button class="btn btn-sm" onclick="raporTarihDegistir(1)" ${tarih>=bugunStr?'disabled':''} title="Sonraki gün"><i class="ti ti-chevron-right"></i></button>
      ${tarih!==bugunStr?`<button class="btn btn-sm" onclick="APP._raporTarih=bugunTarih();refreshMain()"><i class="ti ti-calendar-today"></i>Bugün</button>`:''}
      <div style="width:1px;height:20px;background:var(--border)"></div>
      <button class="btn btn-sm ${mazGoster?'btn-primary':''}" onclick="APP._mazGoster=${!mazGoster};refreshMain()">
        <i class="ti ti-${mazGoster?'eye-off':'eye'}"></i>${mazGoster?'Mazeretlileri Gizle':'Göster'}
      </button>
      <button class="btn btn-sm btn-success no-print" onclick="window.print()"><i class="ti ti-printer"></i>Yazdır</button>
    </div>
  </div>

  <div class="print-header" style="margin-bottom:12px">
    <div style="font-size:18px;font-weight:700">Günlük Devamsızlık Raporu</div>
    <div style="font-size:13px;color:#555">${tarihTam(tarih)} · ${gosterilen.length} devamsız öğrenci${!mazGoster?' (mazeretliler hariç)':''}</div>
    <hr style="margin:8px 0">
  </div>

  <div class="card no-print">
    <div class="card-title" style="justify-content:space-between">
      <span><i class="ti ti-calendar-stats"></i>Sınıf Devam Özeti — ${tarihTam(tarih)}</span>
    </div>
    ${raporlar.every(r=>!r.alinan)
      ? `<div class="notif n-info" style="margin:0"><i class="ti ti-info-circle"></i>${tarihTam(tarih)} tarihi için henüz yoklama alınmamış.</div>
         <div class="tbl-wrap"><table>
           <tr><th>Sınıf</th><th>Toplam Öğrenci</th><th>Durum</th></tr>
           ${raporlar.map(r=>`<tr>
             <td><span class="badge b-blue">${r.s.ad}</span></td>
             <td>${r.ogr.length}</td>
             <td><span class="badge b-gray">Yoklama Yok</span></td>
           </tr>`).join('')}
         </table></div>`
      : `<div class="tbl-wrap"><table>
           <tr><th>Sınıf</th><th>Toplam</th><th>Mevcut</th><th>Devamsız</th><th>Geç</th><th>% Devam</th><th class="no-print">Durum</th></tr>
           ${raporlar.map(r=>`<tr>
             <td><span class="badge b-blue">${r.s.ad}</span></td>
             <td>${r.ogr.length}</td>
             <td style="color:var(--green);font-weight:700">${r.alinan?r.mv:'—'}</td>
             <td style="color:var(--red);font-weight:700">${r.alinan?r.ab:'—'}</td>
             <td style="color:var(--amber)">${r.alinan&&r.lt?r.lt:'—'}</td>
             <td>${r.pct!==null?`<span style="font-weight:700;color:${r.pct>=80?'var(--green)':'var(--red)'}">%${r.pct}</span>`:'—'}</td>
             <td class="no-print"><span class="badge ${r.alinan?'b-green':'b-gray'}">${r.alinan?'✓ Alındı':'Bekliyor'}</span></td>
           </tr>`).join('')}
         </table></div>`
    }
  </div>

  <div class="card no-print" style="background:var(--blue-bg);border-color:#b3d1f0;padding:10px 14px">
    <div style="font-size:12px;font-weight:700;color:var(--blue);margin-bottom:6px"><i class="ti ti-info-circle"></i> Mazeret Simgeleri</div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;font-size:12px">
      <span>🚑 <b>Sevk</b> — Sağlık kurumuna sevk</span>
      <span>📅 <b>İzin</b> — İzinli/Mazeretli</span>
      <span>📋 <b>Rapor</b> — Doktor raporu</span>
      <span>⭐ <b>Faaliyet</b> — Okul etkinliği/spor/yarışma</span>
      <span>📌 <b>Diğer</b> — Diğer mazeretler</span>
    </div>
    <div style="font-size:11px;color:var(--blue);margin-top:6px;opacity:.8">
      <b>SY</b> = Sabah Yarım Gün &nbsp;·&nbsp; <b>ÖY</b> = Öğleden Sonra Yarım Gün &nbsp;·&nbsp; <b>TAM GÜN</b> = Tam gün devamsız
    </div>
  </div>

  <div class="card">
    <div class="card-title" style="justify-content:space-between;flex-wrap:wrap;gap:6px">
      <span><i class="ti ti-user-exclamation"></i>${tarihTam(tarih)} Devamsız Öğrenciler
        <span class="badge b-red" style="margin-left:6px">${gosterilen.length} öğrenci</span>
        ${!mazGoster&&devListBugün.length>gosterilen.length?`<span class="badge b-gray" style="margin-left:4px">${devListBugün.length-gosterilen.length} mazeretli gizlendi</span>`:''}
      </span>
      <button class="btn btn-sm no-print" style="background:#217346;color:#fff;border-color:#217346" onclick="raporExcel('${tarih}',${mazGoster})">
        <i class="ti ti-file-spreadsheet"></i>Excel
      </button>
      <button class="btn btn-sm no-print" style="background:#25D366;color:#fff;border-color:#25D366" onclick="om('veliTopluBildirim',{tarih:'${tarih}',mazGoster:${mazGoster}})">
        <i class="ti ti-brand-whatsapp"></i>Velileri Bilgilendir
      </button>
    </div>
    ${gosterilen.length===0
      ? `<div class="empty-state" style="padding:20px"><i class="ti ti-mood-happy" style="font-size:28px"></i>${devListBugün.length===0?'Bu tarihte devamsız öğrenci yok':'Tüm devamsız öğrencilerin mazereti var'}</div>`
      : `<div class="tbl-wrap"><table id="dev-table">
          <tr><th>#</th><th>Öğrenci</th><th>No</th><th>Sınıf</th><th>Tip</th><th>Devamsız Saatler</th><th>Mazeret</th><th class="no-print">Mazeret Gir</th></tr>
          ${gosterilen.map(({o,info,maz},i)=>{
            const MAZ_ICONS = {sevk:'🚑',izin:'📅',rapor:'📋',faaliyet:'⭐',diger:'📌'};
            const MAZ_TURS  = ['sevk','izin','rapor','faaliyet','diger'];
            const tipRenk = info.devTip==='TAM GÜN'?'var(--red)':info.devTip==='SY'?'var(--amber)':'var(--purple)';
            const mazChip = (maz && maz.tur && maz.tur!=='__ozursuz__')
              ? `<span class="maz-chip maz-${maz.tur}" title="${MAZ_TUR[maz.tur]}${maz.not?' — '+maz.not:''}">${MAZ_ICONS[maz.tur]||'📌'} ${MAZ_TUR[maz.tur]}${maz.not?` <span style="font-weight:400;opacity:.8">— ${maz.not}</span>`:''}</span>`
              : '';
            // İkon tıklama — popup değil, inline seçim satırı
            const mazIkonlar = MAZ_TURS.map(t =>
              `<button onclick="mazeretHizliKaydet(${o.id},'${tarih}','${t}')" title="${MAZ_TUR[t]}"
                style="border:none;background:${maz&&maz.tur===t?'var(--blue)':'var(--bg)'};color:${maz&&maz.tur===t?'#fff':'var(--text2)'};
                border-radius:6px;padding:3px 6px;cursor:pointer;font-size:16px;line-height:1;
                outline:${maz&&maz.tur===t?'2px solid var(--blue)':'1.5px solid var(--border)'}">${MAZ_ICONS[t]}</button>`
            ).join('');
            return `<tr>
              <td style="color:var(--text2);font-size:11px">${i+1}</td>
              <td style="font-weight:600;white-space:nowrap">${o.ad}</td>
              <td style="font-size:11px;color:var(--text2)">${o.no||'—'}</td>
              <td><span class="badge b-blue">${sinifAd(o.sinif_id)}</span></td>
              <td><span style="font-size:11px;font-weight:700;color:${tipRenk}">${info.devTip}</span>
                ${info.kaynak==='import'?'<span style="font-size:9px;background:var(--blue-bg);color:var(--blue);padding:1px 4px;border-radius:4px;margin-left:3px">E-Okul</span>':''}</td>
              <td style="font-size:11px">${info.kaynak==='import'?(info.gun?info.gun+' gün':'—'):[...info.saatler].sort((a,b)=>a-b).map(s=>s+'.Ders').join(', ')}</td>
              <td>${mazChip}</td>
              <td class="no-print" style="white-space:nowrap">
                <div style="display:flex;gap:3px;align-items:center">

                  ${maz?`<button onclick="mazeretSil(${o.id},'${tarih}')" title="Mazereti sil"
                    style="border:1.5px solid var(--border);background:var(--red-bg);color:var(--red);border-radius:6px;padding:3px 6px;cursor:pointer;font-size:13px">✕</button>`:''}
                </div>
                ${maz&&maz.not!==undefined?`<input value="${maz.not||''}" placeholder="Not ekle…"

                  `<input placeholder="Not ekle…"
                  onchange="mazeretNotGuncelle(${o.id},'${tarih}',this.value)"
                  style="margin-top:4px;width:120px;font-size:11px;padding:2px 6px;border:1.5px solid var(--border);border-radius:6px;opacity:.5">`}
              </td>

        </table></div>`

// ── Mazeret işlemleri ──
// Tarih +/- delta gün (YYYY-MM-DD) — timezone-safe
window.tarihDelta = function(tarihStr, delta) {
  const d = new Date((tarihStr || bugunTarih()) + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

window.raporTarihDegistir = function(delta) {
  const yeni = tarihDelta(APP._raporTarih, delta);
  if (yeni > bugunTarih()) return;
  APP._raporTarih = yeni;
  refreshMain();
};

window.mazeretSil = async function(ogrId, tarih) {
  if (APP.mazeretler[tarih]) delete APP.mazeretler[tarih][ogrId];
  await mazeretSupabaseKaydet(ogrId, tarih, null);
  refreshMain();
};

// İkon tıklayınca anında kaydet — aynı tür seçilirse sil (toggle)
window.mazeretHizliKaydet = async function(ogrId, tarih, tur) {
  if (!APP.mazeretler[tarih]) APP.mazeretler[tarih] = {};
  const mevcut = APP.mazeretler[tarih][ogrId];
  if (mevcut && mevcut.tur === tur) {
    delete APP.mazeretler[tarih][ogrId];
    await mazeretSupabaseKaydet(ogrId, tarih, null);
  } else {
    const notVal = mevcut ? (mevcut.not||'') : '';
    APP.mazeretler[tarih][ogrId] = {tur, not:notVal, ts:Date.now()};
    await mazeretSupabaseKaydet(ogrId, tarih, APP.mazeretler[tarih][ogrId]);
  }
  refreshMain();
};

// Not alanı değişince kaydet
window.mazeretNotGuncelle = async function(ogrId, tarih, not) {
  if (!APP.mazeretler[tarih]) APP.mazeretler[tarih] = {};
  if (!APP.mazeretler[tarih][ogrId]) APP.mazeretler[tarih][ogrId] = {tur:'diger', not:'', ts:Date.now()};
  APP.mazeretler[tarih][ogrId].not = not.trim();
  await mazeretSupabaseKaydet(ogrId, tarih, APP.mazeretler[tarih][ogrId]);
};

// Eski modal bazlı kaydet (geriye uyumluluk)
window.mazeretKaydet = async function() {
  const ogrId = Number($('maz-ogr-id').value);
  const tarih = $('maz-tarih').value;
  const tur   = $('maz-tur').value;
  const not   = ($('maz-not').value||'').trim();
  if (!APP.mazeretler[tarih]) APP.mazeretler[tarih] = {};
  APP.mazeretler[tarih][ogrId] = {tur, not, ts:Date.now()};
  await mazeretSupabaseKaydet(ogrId, tarih, APP.mazeretler[tarih][ogrId]);
  closeModal();
  refreshMain();
};

// ── WhatsApp Toplu Bildirim ──
window.waTopluBildirim = function(tarih, mazGoster) {
  const MAZ_TUR = {sevk:'Sevk',izin:'İzin',rapor:'Rapor',faaliyet:'Faaliyet',diger:'Diğer'};
  const BOLGE_KODU = '90'; // Türkiye

  // Devamsız listesini yeniden hesapla (raporExcel ile aynı mantık)
  const tarihYoklar = Object.values(APP.yoklamalar).filter(y=>y.tarih===tarih);
  const devMap = {};
  tarihYoklar.forEach(y=>{
    const det = APP.yoklamaDetay[y.id]||{};
    Object.entries(det).forEach(([ogrId,d])=>{
      if(d==='A'){
        if(!devMap[ogrId]) devMap[ogrId]={saatler:[],sinifId:y.sinif_id};
        devMap[ogrId].saatler.push(Number(y.saat));
      }
    });
  });
  Object.entries(devMap).forEach(([ogrId,info])=>{
    const sabah=info.saatler.filter(s=>s<=5).length, oglen=info.saatler.filter(s=>s>=6).length, toplam=info.saatler.length;
    const alinan=tarihYoklar.filter(y=>y.sinif_id==info.sinifId).length;
    if(toplam>=Math.ceil(alinan*2/3)||(sabah>0&&oglen>0))info.devTip='Tam Gün';
    else if(sabah>0&&oglen===0)info.devTip='Sabah Yarım Gün (SY)';
    else info.devTip='Öğleden Sonra Yarım Gün (ÖY)';
  });

  let rows = Object.entries(devMap).map(([ogrId,info])=>{
    const o = APP.ogrenciler.find(x=>x.id==ogrId);
    if(!o) return null;
    const maz = (APP.mazeretler[tarih]||{})[ogrId]||null;
    return {o,info,maz};
  }).filter(Boolean);
  if (!mazGoster) rows = rows.filter(x=>!x.maz);
  rows.sort((a,b)=>a.o.ad.localeCompare(b.o.ad));

  // Okul adını bul
  const okulAd = document.title.replace(' — Dijital Yoklama Sistemi','') || 'Okulumuz';
  const tarihGoster = tarihTam(tarih);

  // Modal içeriği oluştur
  const listHTML = rows.map(({o,info,maz})=>{
    // Telefonu normalize et: başında 0 varsa kaldır, 90 ekle
    let tel = (o.veli_tel||'').replace(/\s|-|\(|\)/g,'');
    if (!tel) return `<div style="padding:8px 0;border-bottom:1px solid var(--border);opacity:.5">
      <b>${o.ad}</b> — <span style="color:var(--red);font-size:12px">Telefon kayıtlı değil</span>
    </div>`;
    if (tel.startsWith('0')) tel = BOLGE_KODU + tel.slice(1);
    else if (!tel.startsWith(BOLGE_KODU)) tel = BOLGE_KODU + tel;

    const saatStr = [...info.saatler].sort((a,b)=>a-b).map(s=>s+'.ders').join(', ');
    const mazStr = maz ? `
Mazeret: ${MAZ_TUR[maz.tur]||maz.tur}${maz.not?' ('+maz.not+')':''}` : '';

    // Mesaj şablonu
    const mesaj = `Sayın ${o.veli_ad||'Veli'},

${tarihGoster} tarihinde ${o.ad} adlı öğrencimiz ${info.devTip} devamsız görünmektedir.

Devamsız olduğu dersler: ${saatStr}${mazStr}

Bilgilerinize saygılarımızla,
${okulAd}`;

    const waUrl = `https://wa.me/${tel}?text=${encodeURIComponent(mesaj)}`;

      <div style="font-size:11px;color:var(--text2);margin-bottom:8px">
        Veli: ${o.veli_ad||'—'} · ${o.veli_tel||'—'} · <b style="color:${info.devTip.includes('Tam')?'var(--red)':'var(--amber)'}">${info.devTip}</b>
        ${maz?`<span class="maz-chip maz-${maz.tur}" style="margin-left:4px">${MAZ_TUR[maz.tur]}</span>`:''}
      </div>
      <a href="${waUrl}" target="_blank" rel="noopener"
        style="display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:#25D366;color:#fff;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;margin-bottom:6px">
        <i class="ti ti-brand-whatsapp" style="font-size:14px"></i>Mesaj Gönder
      </a>
      <details style="margin-top:6px">
        <summary style="font-size:11px;color:var(--text2);cursor:pointer;user-select:none">Mesaj önizleme</summary>
        <div style="margin-top:6px;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:11px;white-space:pre-wrap;color:var(--text)">${mesaj}</div>
      </details>
    </div>`;
  }).join('');

  // Modal göster
  APP._waModal = {html: listHTML, sayi: rows.length, tarih};
  // Modal sistemi üzerinden aç
  om('waToplu', {listHTML, sayi: rows.length, tarih});
};

// Excel çıktısı
window.raporExcel = function(tarih, mazGoster) {
  const MAZ_TUR = {sevk:'Sevk',izin:'İzin',rapor:'Rapor',faaliyet:'Faaliyet',diger:'Diğer'};
  // Yoklama kayıtları
  const tarihYoklar = Object.values(APP.yoklamalar).filter(y=>y.tarih===tarih);
  const devMap = {};
  tarihYoklar.forEach(y=>{
    const det = APP.yoklamaDetay[y.id]||{};
    Object.entries(det).forEach(([ogrId,d])=>{
      if(d==='A'){
        if(!devMap[ogrId]) devMap[ogrId]={saatler:[],sinifId:y.sinif_id,kaynak:'yoklama'};
        devMap[ogrId].saatler.push(Number(y.saat));
      }
    });
  });
  // Excel import verisi — o tarihte kayıt varsa ekle
  APP.ogrenciler.forEach(o=>{
    const ogrIdStr = String(o.id);
    const impList = (APP.importDevamsizlik||{})[ogrIdStr]||[];
    impList.forEach(imp=>{
      if(imp.tarih!==tarih) return;
      if(devMap[ogrIdStr]) return;
      devMap[ogrIdStr]={saatler:[],sinifId:o.sinif_id,kaynak:'import',
        devTip:imp.devTip==='TAM'?'TAM GÜN':imp.devTip==='SY'?'SY':'ÖY', gun:imp.gun};
    });
  });
  Object.entries(devMap).forEach(([ogrId,info])=>{
    if(info.kaynak==='import') return;
    const sabah=info.saatler.filter(s=>s<=5).length, oglen=info.saatler.filter(s=>s>=6).length, toplam=info.saatler.length;
    const alinanSayisi=tarihYoklar.filter(y=>y.sinif_id==info.sinifId).length;
    if(toplam>=Math.ceil(alinanSayisi*2/3)||(sabah>0&&oglen>0))info.devTip='TAM GÜN';
    else if(sabah>0&&oglen===0)info.devTip='SY';
    else info.devTip='ÖY';
  });
  let rows = Object.entries(devMap).map(([ogrId,info])=>{
    const o = APP.ogrenciler.find(x=>x.id==ogrId); if(!o) return null;
    const maz = (APP.mazeretler[tarih]||{})[Number(ogrId)]||(APP.mazeretler[tarih]||{})[ogrId]||null;
    // Mazeret: __ozursuz__ veya yoksa boş bırak
    const mazTurGoster = maz && maz.tur && maz.tur!=='__ozursuz__' ? (MAZ_TUR[maz.tur]||maz.tur) : '';
    const mazNot = maz && maz.tur && maz.tur!=='__ozursuz__' ? (maz.not||'') : '';
    return {o, info, maz, mazTurGoster, mazNot};
  }).filter(Boolean);
  if (!mazGoster) rows = rows.filter(x=>!x.maz||x.maz.tur==='__ozursuz__');
  rows.sort((a,b)=>sinifAd(a.o.sinif_id).localeCompare(sinifAd(b.o.sinif_id))||a.o.ad.localeCompare(b.o.ad));

  const ws_data = [
    ['Günlük Devamsızlık Raporu — ' + tarihDMY(tarih)],
    [],
    ['#','Öğrenci Adı','No','Sınıf','Devamsızlık Tipi','Devamsız Saatler','Kaynak','Mazeret Türü','Mazeret Notu'],
    ...rows.map(({o,info,mazTurGoster,mazNot},i)=>[
      i+1, o.ad, o.no||'', sinifAd(o.sinif_id), info.devTip,
      info.kaynak==='import'?(info.gun?info.gun+' gün':'—'):[...info.saatler].sort((a,b)=>a-b).map(s=>s+'.Ders').join(', '),
      info.kaynak==='import'?'E-Okul':'Yoklama',
      mazTurGoster, mazNot
    ])
  ];
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(ws_data);
  ws['!cols'] = [{wch:4},{wch:28},{wch:6},{wch:8},{wch:12},{wch:22},{wch:8},{wch:12},{wch:20}];
  // Başlık satırını birleştir
  ws['!merges'] = [{s:{r:0,c:0},e:{r:0,c:8}}];
  XLSX.utils.book_append_sheet(wb, ws, 'Devamsızlık');
  XLSX.writeFile(wb, `devamsizlik_${tarih}.xlsx`);
};

      </button>` : `<button class="btn btn-sm btn-success" onclick="APP.yokSinif=${s.id};APP.yokSaat=null;APP.yokSaat=null;gp('yoklamaAl')">

function pgYoklamaAl() {
  const u = APP.user;
  const benim  = ogretmenSiniflari(u.id);
  const siniflar = APP.siniflar.filter(s => benim.includes(s.id));
  const gun    = bugunGun();
  const simdiki = simdikiSaat();
  const SAAT_LABELS_GUN = (APP._saatAralikGunluk && APP._saatAralikGunluk[gun])
    ? APP._saatAralikGunluk[gun].filter(x=>!x.pasif).reduce((o,x)=>({...o,[x.s]:x.bas}),{})
    : {1:'08:30',2:'09:20',3:'10:10',4:'11:00',5:'11:50',6:'13:20',7:'14:10',8:'15:00'};
  const SAAT_BIT_GUN = (APP._saatAralikGunluk && APP._saatAralikGunluk[gun])
    ? APP._saatAralikGunluk[gun].filter(x=>!x.pasif).reduce((o,x)=>({...o,[x.s]:x.bit}),{})
    : {1:'09:10',2:'10:00',3:'10:50',4:'11:40',5:'12:30',6:'14:00',7:'14:50',8:'15:40'};
  const SAAT_LABELS = SAAT_LABELS_GUN;
  const SAAT_BIT    = SAAT_BIT_GUN;

  // ── YOKLAMA DETAY GÖRÜNÜMÜ ──────────────────────────────────────────────
  if (APP.yokSinif && APP.yokSaat) {
    const s = APP.siniflar.find(x => x.id === APP.yokSinif);
    if (!s) { APP.yokSaat = null; return pgYoklamaAl(); }

    const mevcutYok  = bugunYoklamaSaat(APP.yokSinif, APP.yokSaat);
    const kilitli    = !!(mevcutYok && mevcutYok.kilitli);

    // Bu saat+sınıf için yokDataMap key'i
    const _yk = APP.yokSinif + '_' + APP.yokSaat;
    if (!APP.yokDataMap[_yk] || Object.keys(APP.yokDataMap[_yk]).length === 0) {
      APP.yokDataMap[_yk] = {};
      if (mevcutYok) Object.assign(APP.yokDataMap[_yk], APP.yoklamaDetay[mevcutYok.id]||{});
    }
    const yokData = APP.yokDataMap[_yk];
    const ogr = sinifOgr(APP.yokSinif);
    ogr.forEach(o => { if (yokData[o.id] === undefined) yokData[o.id] = 'P'; });

    const oncekiYok = Object.values(APP.yoklamalar)
      .filter(y=>y.sinif_id==APP.yokSinif&&y.tarih===bugunTarih()&&Number(y.saat)<Number(APP.yokSaat))
      .sort((a,b)=>Number(b.saat)-Number(a.saat))[0]
      || Object.values(APP.yoklamalar)
      .filter(y=>y.sinif_id==APP.yokSinif&&y.tarih!==bugunTarih())
      .sort((a,b)=>b.tarih.localeCompare(a.tarih)||Number(b.saat)-Number(a.saat))[0]
      || null;
    const oncekiDetay = oncekiYok ? (APP.yoklamaDetay[oncekiYok.id]||{}) : null;

    const dersler = ogretmenSinifDersleri(u.ad, s.id, gun);
    const seciliDers = dersler.find(d => d.saat == APP.yokSaat);
    const cnt = {P:0,A:0,L:0};
    ogr.forEach(o => { const d=yokData[o.id]||'P'; if(cnt[d]!==undefined) cnt[d]++; });

    return `<div class="page-header">
      <div>
        <div class="page-title" style="font-size:16px">
          <i class="ti ti-clipboard-check"></i>${s.ad} · ${APP.yokSaat}. Ders
        </div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">
          ${SAAT_LABELS[APP.yokSaat]||''}–${SAAT_BIT[APP.yokSaat]||''}
          ${seciliDers?` · <b>${seciliDers.ders}</b>`:''}
          ${APP.yokSaat==simdiki?' · <b style="color:var(--blue)">⭐ Şu an</b>':''}
        </div>
      </div>
      <button class="btn btn-sm" onclick="APP.yokSaat=null;refreshMain()">
        <i class="ti ti-arrow-left"></i>Dersler
      </button>
    </div>

    ${kilitli?`<div class="notif n-error" style="margin-bottom:10px">
      <i class="ti ti-lock" style="flex-shrink:0"></i>
      <div><b>Kilitlendi</b> — müdür yardımcısı tarafından değişiklik engellendi.</div>
    </div>`:''}

    <div class="sumbar" style="margin-bottom:8px;grid-template-columns:repeat(3,1fr)">
      <div class="sum-item" style="background:var(--green-bg);color:var(--green)"><span class="sum-n">${cnt.P}</span>Mevcut</div>
      <div class="sum-item" style="background:var(--red-bg);color:var(--red)"><span class="sum-n">${cnt.A}</span>Devamsız</div>
      <div class="sum-item" style="background:var(--amber-bg);color:var(--amber)"><span class="sum-n">${cnt.L}</span>Geç</div>
    </div>

    ${!kilitli?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      <button class="btn btn-sm btn-success" onclick="tumunuAyarla('P',${APP.yokSinif},${APP.yokSaat})">
        <i class="ti ti-check-all"></i>Sınıf Tam
      </button>
      <button class="btn btn-sm btn-danger" onclick="tumunuAyarla('A',${APP.yokSinif},${APP.yokSaat})">
        <i class="ti ti-user-off"></i>Tümü Devamsız
      </button>
      ${oncekiDetay?`<button class="btn btn-sm" style="background:var(--purple-bg);color:var(--purple);border-color:#c5c0f5"
        onclick="oncekiGibi(${APP.yokSinif},${APP.yokSaat})">
        <i class="ti ti-copy"></i>Önceki Gibi
        <span style="font-size:10px;opacity:.7">(${oncekiYok.tarih===bugunTarih()?oncekiYok.saat+'. ders':tarihGoster(oncekiYok.tarih)})</span>
      </button>`:''}
    </div>`:''}

    <div class="card" style="padding:0;margin-bottom:10px">
      ${ogr.map(o => {
        const d = yokData[o.id]||'P';
        const oncekiD = oncekiDetay?(oncekiDetay[o.id]||'P'):null;
        const R = {P:['var(--green-bg)','var(--green)'],A:['var(--red-bg)','var(--red)'],L:['var(--amber-bg)','var(--amber)'],E:['var(--blue-bg)','var(--blue)']};
        const [bg,col] = R[d]||R.P;
        return `<div class="row" style="padding:10px 14px;background:${d!=='P'?bg:''}">
          <div style="width:34px;height:34px;border-radius:50%;background:${bg};color:${col};
               display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">
            ${d==='P'?'✅':d==='A'?'❌':d==='L'?'⏰':'📋'}
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;color:${d!=='P'?col:'var(--text)'}">${o.ad}</div>
            <div style="font-size:11px;color:var(--text2)">No: ${o.no}${oncekiD&&oncekiD!=='P'?
              ` · önceki: ${oncekiD==='A'?'❌':oncekiD==='L'?'⏰':'📋'}`
            :''}</div>
          </div>
          ${!kilitli?`<div style="display:flex;gap:5px">
            <button class="att-btn${d==='A'?' sel-A':''}" onclick="setAtt(${o.id},'A',${APP.yokSinif},${APP.yokSaat})"
              style="display:flex;flex-direction:column;align-items:center;padding:5px 10px;font-size:10px;gap:2px;min-width:54px">
              <span style="font-size:18px">❌</span><span style="font-weight:700">Devamsız</span>
            </button>
            <button class="att-btn${d==='L'?' sel-L':''}" onclick="setAtt(${o.id},'L',${APP.yokSinif},${APP.yokSaat})"
              style="display:flex;flex-direction:column;align-items:center;padding:5px 10px;font-size:10px;gap:2px;min-width:54px">
              <span style="font-size:18px">⏰</span><span style="font-weight:700">Geç</span>
            </button>
          </div>`:`<span class="badge ${d==='P'?'b-green':d==='A'?'b-red':'b-amber'}">
            ${d==='P'?'✅ Mevcut':d==='A'?'❌ Devamsız':'⏰ Geç'}
          </span>`}
        </div>`;
      }).join('')}
    </div>

    ${!kilitli?`<button class="btn btn-primary btn-block" style="padding:13px;font-size:15px"
      onclick="kaydetYoklama(${APP.yokSinif},${APP.yokSaat})">
      <i class="ti ti-device-floppy"></i>
      ${mevcutYok?'Güncelle':'Kaydet'} — ${ogr.length} öğrenci
    </button>`:''}`;
  }

  // ── OTOMATİK SAAT SEÇİMİ: Şu an aktif ders varsa ve yoklama alınmamışsa otomatik aç ──
  if (!APP.yokSinif && !APP.yokSaat && simdiki) {
    // Bu öğretmenin şu an aktif dersini bul
    for (const s of siniflar) {
      const dersler = ogretmenSinifDersleri(u.ad, s.id, gun);
      const aktifDers = dersler.find(d => d.saat === simdiki);
      if (aktifDers) {
        const mevcutYok = bugunYoklamaSaat(s.id, simdiki, u.id);
        // Yoklama henüz alınmamışsa otomatik aç
        if (!mevcutYok) {
          APP.yokSinif = s.id;
          APP.yokSaat  = simdiki;
          return pgYoklamaAl(); // detay ekranına git
        }
        break;
      }
    }
  }

  // ── ANA LİSTE: TÜM SINIFLAR × GÜN PROGRAMI ────────────────────────────
  // Tüm sınıfların bu günkü derslerini saat sırasına göre düz listeye topla
  const tumDersler = [];
  siniflar.forEach(s => {
    const dersler = ogretmenSinifDersleri(u.ad, s.id, gun);
    dersler.forEach(d => {
      const saatYok     = bugunYoklamaSaat(s.id, d.saat);
      const saatKilitli = !!(saatYok && saatYok.kilitli);
      const saatDetay   = saatYok ? (APP.yoklamaDetay[saatYok.id]||{}) : {};
      const saatAlindi  = !!(saatYok && Object.keys(saatDetay).length > 0);
      const saatMv = saatAlindi ? Object.values(saatDetay).filter(x=>x==='P').length : 0;
      const saatAb = saatAlindi ? Object.values(saatDetay).filter(x=>x==='A').length : 0;
      const saatLt = saatAlindi ? Object.values(saatDetay).filter(x=>x==='L').length : 0;
      tumDersler.push({...d, sinif: s,
        mevcutYok: saatYok, kilitli: saatKilitli,
        yokAlindi: saatAlindi, kayitliDetay: saatDetay,
        mv: saatMv, ab: saatAb, lt: saatLt});
    });
  });
  // Aynı saat+sınıf kombinasyonunu tekleştir (aynı saatte iki ders olsa bile bir kez göster)
  const gorulenKey = new Set();
  const tumDerslerTekli = tumDersler.filter(item => {
    const key = item.sinif.id + '_' + item.saat;
    if (gorulenKey.has(key)) return false;
    gorulenKey.add(key);
    return true;
  });
  tumDersler.length = 0;
  tumDerslerTekli.forEach(x => tumDersler.push(x));
  tumDersler.sort((a,b) => a.saat - b.saat || a.sinif.ad.localeCompare(b.sinif.ad));

  return `<div class="page-header">
    <div class="page-title"><i class="ti ti-clipboard-check"></i>Yoklama</div>
    <span style="font-size:12px;color:var(--text2);font-weight:600">${gun}${simdiki?` · ${simdiki}. saat`:''}</span>
  </div>

  ${tumDersler.length === 0
    ? `<div class="empty-state"><i class="ti ti-calendar-off"></i>Bugün girilmiş ders programı yok.</div>`
    : `<div style="display:flex;flex-direction:column;gap:8px">
        ${tumDersler.map(item => {
          const aktif  = item.saat === simdiki;
          const yokAlindi = item.yokAlindi;
          const kilitli   = item.kilitli;

          const ogr = sinifOgr(item.sinif.id);
          const mv  = item.mv || 0;
          const ab  = item.ab || 0;
          const lt  = item.lt || 0;

          let saatBg  = 'var(--bg)';
          let saatBrd = 'var(--border)';
          let saatCol = 'var(--text)';
